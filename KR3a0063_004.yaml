body:
  text: 先聖大訓卷四宋楊簡撰始誅第二十八孔子為魯司寇於是此疑有闕文史記曰與聞國政朝政七日而誅亂政大夫少正卯戮之於兩觀之下尸於朝三日子貢進曰夫少正卯魯之聞人也今夫子為政而始誅之或者為失乎孔子曰居吾語女以其故天下有大惡者五而竊盜不與焉一曰心逆而險二曰行辟而堅三曰言僞而辨四曰記醜而博醜者不善之類五曰順非而澤其和順之貌亦有光澤之可觀而非也非謂非道似是而實非此五者有一於人則不免君子之誅而少正卯兼有之其居處足以撮徒成黨其談說足以飾褒榮衆其强禦足以反是獨立此乃人之姦雄有不可以不除夫殷湯誅尹諧文王誅潘正周公誅管蔡太公誅華士管仲誅付乙子産誅史何凡此七子皆異世而同誅者以七子異世而同惡故不可赦也詩云憂心悄悄愠于羣小小人成羣斯足憂矣孔子為魯大司寇有父子訟者夫子同狴執之狴邊迷反狴獄牢三月不别其父請止夫子赦之季孫聞之不說曰司寇欺余曩告余曰國家必先以孝余今戮一不孝以教民孝不亦可乎而又赦之何哉冉有以告孔子子喟然嘆曰嗚呼上失其道而殺其下非理也不教以孝而聽其獄是殺不辜也三軍大敗不可斬也獄犴不治不可刑也子路片言可以折獄者以子路信義足以感人心人不敢欺故片言而囚即以誠對然則獄犴之不治當反求諸己己之德禮猶有闕不可唯以刑加之也何者上教之不行罪不在民故也夫慢令謹誅賊也徵斂無時暴也不試責成虐也政無此三者然後刑可即也書云義刑義殺勿庸以即汝心惟曰未有遜事言必教而後刑也尚書康誥曰用其義刑義殺勿庸以次汝封乃汝盡遜曰時敘惟曰未有遜事即猶次也王肅注家語云即就也刑殺當以義勿用以就汝心之所安當謹自謂未有順事且陳道德以服之以無刑殺而後為順是家語作順事簡考家語多差誤既陳道德以先服之而猶不可尚賢以勸之又不可即廢之又不可而後以威憚之若是三年而百姓正矣其有邪民不從化者然後持之以刑則民咸知罪矣詩云天子是毗俾民不迷毗輔也俾使也是以威厲而不試刑錯而不用今世則不然亂其教繁其刑使民迷惑而陷焉又從而制之故刑彌繁而盜不勝也夫三尺之限空車不能登者何哉峻故也百仞之山重載陟焉何哉陵遲故也其陵遲緩而不急峻今世俗之陵遲久矣雖有刑法民能勿踰乎言上失其道禮樂刑政廢壞人心流放之久五刑第二十九冉有問曰古者三皇五帝不用五刑信乎孔子曰聖人之設防貴其不犯也制五刑而不用所以為至治也凡民之為姦邪竊盜靡法妄行者大戴記盛德篇不言冉有孔子問答其間有大略同者靡作止生於不足不足生於無度無度則小者偷惰大戴記作墮大者侈靡各不知節是以上有制度則民知所止民知所止則不犯故雖有姦邪賊盜靡法妄行之獄而無陷刑之民不孝者生於不仁不仁者生於喪祭之禮不明喪祭之禮所以教仁愛也能致仁愛則服喪思慕祭祀不懈人子饋養之道喪祭之禮明則民孝矣內則篇首曰后王命冢宰降德于衆兆民繼言子事父母饋養之禮甚詳蓋施禮於民使民遵行孔子曰所重民食喪祭喪祭禮之大者饋養之禮乃其同類故此并及饋養之禮皆使民遵行故雖有不孝之獄而無陷刑之民弒上者生於不義義所以别貴賤明尊卑也貴賤有别尊卑有序則民莫不尊上而敬長朝覲之禮所以明義也義明則民不犯故雖有弒上之獄而無陷刑之民鬭變者生於相陵大戴記變作辨相陵生於長幼無序而遺敬讓鄉飲酒之禮所以明長幼之序而崇敬讓也長幼必序民懷敬讓故雖有鬭變之獄而無陷刑之民淫亂者生於男女無别男女無别則夫婦失義婚禮聘享所以别男女明夫婦之義也男女既别夫婦既明故雖有淫亂之獄而無陷刑之民此五者刑罰之所從生各有源焉不豫塞其源而輒繩之以刑是謂為民設穽而陷之也刑罰之源生於嗜欲不節夫禮度者所以禦民之嗜欲而明好惡順天道也禮度既陳五教畢修而民猶或未化尚必明其法典以申固之其犯姦邪靡法妄行之獄者則飭制量之度有犯不孝之獄者則飭喪祭之禮其飭人子饋養之禮不言可知矣有犯弒上之獄者則飭朝覲之禮有犯鬭變之獄者大戴記變皆作辨則飭鄉飲酒之禮有犯淫亂之獄者則飭昏聘之禮三皇五帝之所以化民者如此雖有五刑不用不亦可乎孔子曰大罪有五而殺人為下逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世謀鬼神者罪及二世手殺人者罪止其身故曰大罪有五而殺人為下矣鬼神人之所尊敬今也敢謀之非一世之積也故并罪其父至於逆人倫則其罪又大故罪及三世逆人倫之罪雖大然其間或其在上者之不德以致逆亂至於文王武王聖人大君天下之所同尊同敬而忽有妄言誣之者故罪及四世至於天地人心之所尊敬又過於文武矣敢逆焉其惡益大其積習必益久而後至於此故罪及五世自身之外餘所及者當有等差文王罪人不孥以此知餘所及者有等差冉有問曰先王制法使刑不上於大夫禮不下於庶人然則大夫犯罪不可以加刑庶人之行事不可以治於禮乎孔子曰不然凡治君子以禮御其心所以屬之以亷恥之節也故古之大夫其有坐不廉汙穢而退放之者不謂之不亷汙穢則曰簠簋不飭有坐淫亂男女無别不謂之淫亂男女無别則曰帷幕不修也有坐罔上不忠者不謂之罔上不忠則曰臣節未著有坐罷軟不勝任者不謂之罷軟不勝任則曰下官不職有坐干國之紀者不謂之干國之紀則曰行事不請此五者大夫既自定有罪名矣而猶不忍斥然正以呼之也既而為之諱所以愧恥之是故大夫之罪其在五刑之域者聞而譴發則白冠氂纓盤水加劍造乎闕而自請罪君不使有司執縛牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也曰子大夫自取之耳吾遇子有禮矣是以刑不上大夫而大夫亦不失其罪者教使然也所謂禮不下庶人者以庶人遽其事而不能充禮故不責之以備禮也冉有跪然免席曰言則美矣求未之聞退而記之仲弓第三十仲弓問曰雍聞至刑無所用政至政無所用刑至刑無所用政桀紂之世是也至政無所用刑成康之世是也信乎孔子曰聖人之治必刑政相參焉太上以德教民而以禮齊之其次以政導民以刑禁之刑不刑也疑不下有闕文化之而弗變導之而弗從傷義以敗俗於是乎用刑矣顓五刑必即天論顓剸也剸裁制也以剸記音古書多此類以女為汝以士為事以􅀈為繕以尢為郵以宥為又王制云凡制五刑必即天論鄭康成注云論或為倫簡觀下言必原父子之親立君臣之義以權之己見依人倫以權度定刑之意而未及乎天凡制五刑之道當即天心以論之有毫毛不與上天同則其制刑也必有差此用刑之大要豈論字之誤歟行刑罰則輕無赦王制云凡作刑罰輕無赦刑罰雖盡心致慎至於無疑情必不可不刑必不可不罰則罪雖輕不可赦若至是而又赦則為不善者無所懲矣刑侀也侀成也一成而不可更故君子盡心焉仲弓曰古之聽訟尤罰麗於事不以其心可得聞乎王肅云尤過也麗附也王制尤作郵亦猶剸作顓尤罰罪之小者事狀明白即加罰焉不必更原其心以罰輕可略也若大罪則必原其心此古意歟孔子曰凡聽五刑之訟必原父子之情立君臣之義以權之意論輕重之序慎測淺深之量以别之悉其聰明正其忠愛以盡之本心之正自有忠愛王制正作致大司冦正刑明辟以察獄獄必三訊焉有指無簡則不聽也王制指作㫖訟辭必書諸簡無諸簡而空以口陳㫖意不麗於事事狀不明白則不聽也附從輕赦從重疑獄則泛與衆共之王制泛作泛疑則赦之皆以小大之比成之王制云必察小大之比以成之鄭康成云己行故事曰比是故爵人必於朝與衆共之刑人必於市與衆棄之古者公家不畜刑人大夫弗養也士遇之途弗與之言屏諸四方唯其所之弗及與政與以也下文執左道與亂政者殺亦以作與記音者之訛弗欲生之也仲弓曰聽獄獄之成成何官孔子曰成獄成於吏吏以獄之成告於正王肅云吏獄官吏正獄官正王制云成獄辭史以獄成告於正正聽之正既聽之乃告大司冦大司冦聽之乃奉于王王命三公卿士參聽棘木之下外朝左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉然後乃以獄之成疑于王王三宥之以聽命而制刑焉所以重之也王制云正以獄成告于大司冦大司冦聽之棘木之下大司冦以獄之成告于王王命三公參聽之三公以獄之成告於王王三又然後制刑周官鄉士辨其獄訟異其死刑之罪而要之旬而職聽於朝司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺肆之三日若欲免之則王㑹其期遂士則要之二旬而職聽于朝云云就郊而刑殺之各於其遂肆之三日若欲免之則王令三公㑹其期縣士則要之三旬而職聽于朝云云各就其縣肆之三日若欲免之則王命六卿㑹其期夫自吏與正與大司寇與三公卿士節節聽其辭節節得其成至于再奉于王而猶以疑為言其恤刑之誠篤至如此仲弓曰其禁何禁孔子曰巧言破律遁名改作執左道與亂政者殺與以也王制云析言破律亂名改作執左道與亂政者殺作淫聲造異服設竒伎竒器以蕩上心者殺行僞而堅言詐而辨學非而博順非而澤以惑衆者殺假於鬼神時日卜筮以疑衆者殺此四誅者不以聽此四罪非殺人也而必殺者何也其在後世習亂之久滔滔者天下皆是又甚於衰周之時則固難於殺若夫古者大治禮樂刑政備具君民皆安於正而忽有此四罪則不可不殺矣夫民皆安於正而忽有亂之使君民皆失其正開大亂之門豈容不殺所謂非正者言其大體為邪衆人之心本正本善今也使惑焉疑焉則其非正也可知矣王肅云不聽棘木之下仲弓曰其禁盡於此而已孔子曰此其急者其餘禁者十有四焉命服命車不粥於市粥賣也車服君所命而粥之是不敬也圭璋璧琮不粥於市寶玉世所貴用以祀神用於盛禮不可輕粥於市宗廟之器不粥於市義同上兵車旍旗不粥於市大夫猶不藏甲此非臣民用器或國工惰其事而取之亦不可犧牲秬鬯不粥於市非臣民所可用者固不可粥於市雖古大夫得用索牛士得用羊庶人用狗雞皆當自牧養致誠不可取諸市戎器兵車不粥於市義見上用器不中度不粥於市布帛精粗不中數廣狹不中量不粥於市不中度數此敗亂之門端不可長文錦珠玉之器雕飾靡麗不粥於市啓人侈靡之心故禁之衣服飲食不粥於市衣服飲食所當自造若取諸市長其怠荒茍亂果實不時不粥於市五木不中伐不粥於市鳥獸魚鱉不中殺不粥於市果實不時不惟不利於人或生疾而失其正是人心失正之一茍開其端則寖滋不已王制木上無五字然今匠者猶有五木之稱意謂柱桁梁楣桷之屬周禮仲冬斬陽木仲夏斬隂木伐不以時亦失正周禮四時之仲月始田乃取鳥獸春獻鱉蜃秋獻龜魚其取之非時及殺之不以其道者皆謂之不中殺不中殺不仁足以起人不仁之心故禁之已上皆治古之法後世習亂之久未嘗過而問焉書曰惟皇上帝降衷于下民若有恆性克綏厥猷惟后志曰放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之大禹謨之三事曰正德利用厚生惟和和合三者蓋寓正德於利用厚生之中即民之所日用而教之以正也自漢以來君臣皆不知治道當如此皆茍道也故人心不善天下多亂國祚不永積習久固士大夫遂不復知有古者治民之道其視四誅十四禁一不知其故往往謂迂濶不切於事矣凡執此禁以齊衆者不赦過也其罰既輕故不赦過以防人心樂山第三十一孔子曰知者樂水仁者樂山知者動仁者靜知者樂仁者壽他日子張問曰仁者何樂山乎子曰夫山者巋然高子張曰高則何樂爾子曰夫山草木殖焉鳥獸蕃焉財用出焉直而無私焉興吐風雲以通乎天地之間隂陽和合雨露之澤萬物以成百姓咸饗此仁者之所以樂乎山也此章見孔叢子孔子曰未知焉得仁今欲言仁當先言知明乎知則明乎仁矣明乎樂水則明乎樂山矣不明乎道不足以為知知者之所樂孔子不能言之將以啓誘學者不得已惟曰水知學者必未悟其㫖故又曰動而其所以為動之㫖孔子又不能詳言惟曰樂而止參是三者亦明白可通矣然而自孔子以來學者能通之者有幾顔子能通之故視聽言動三月惟一一者何也如水焉流行不息而水無思也無為也無思無為而視聽言動四達惟一是謂動中之妙非如木如石頑無動用故特曰動彼陷於虛空之穽沉於止靜之濘者何足以知道何足以為知知尚無之何足以言仁人心自仁有蔽焉故不仁人心即道故書曰道心此心虛明實無一物昏者立我生私故窒塞而不虛故不明無我無私虛明無際視聽言動如四時之錯行如日月之代明是道也思則失之為則失之故甚難於言雖孔子亦難於言然既曰樂水矣而又曰樂山者何也山之草木生焉鳥獸蕃焉財用出焉直而無私焉興吐風雲以通乎天地之間隂陽和而雨露降澤潤萬物百姓咸饗此亦水之無思無為而流行不息澤潤萬物之道也惟知者初明乎道舊習尚未盡釋日與萬物交舊習忽動則亦不能不隨以暫動故猶未及乎仁者之靜故又取山以為喻山亦非徒靜而無用惟以别知者之猶未至靜非謂水自有水之道山自有山之道也非謂動自有動之道靜自有靜之道也道一而已人自有淺深之殊道一而已孔子姑别其動靜之殊惟知者而後知此惟入其中者而後可以語此顔子則知此矣日月至者則知此矣未至者必不信孔子斯言為日至已上者發為萬世之至乎道者發嗚呼至矣子張之問夫子惟答曰夫山者巋然高嗚呼至矣可謂至語實語直以盡告子張之語而子張不領也然則何謂巋然高高者高也巋然者巋然也惟難於解釋孔子曰天有四時春秋冬夏無非教也知此則知巋然高矣孔子又曰地載神氣神氣風霆風霆流形庶物露生無非教也知此則知巋然高矣孔子又曰哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也知此則知巋然高矣聖言如此明告而學者猶莫之解者非孔子之祕其說也學者以思為之心觀之故不解也不立我不起意生私則本無可疑者矣及子張再問夫子不得已雖言之頗詳往往學者亦不能不疑唯知者則不疑矣如何而植如何而蕃如何而出如何而興吐如何而和合又如何而成此無說也無思也無為也是謂直而無私又謂之忠信忠信無思也無為也思之則不忠信矣為之則不忠信矣則私矣則不直矣世以疾之頑不知覺為不仁然則知覺為知常覺常明為仁常覺常明何思何慮如水如山如月如日又如鑑萬象畢照虛明寂然又如四時變化雜然而無所思焉無所為焉草木以此而植鳥獸以此而蕃財用以此而出風雲以此而興吐而通乎天地之間隂陽以此和合雨露之澤以此降萬物以此成百姓以此饗故曰百姓日用而不知嗚呼至哉孔子亟稱於水曰水哉水哉孔子之㫖備見前釋孟子曰何取於水也原泉混混不舍晝夜盈科而後進放乎四海有本者如是是之取爾此孟子之㫖爾非孔子之㫖也孔子之㫖無本末非動靜不可以口說宣唯曰水哉水哉終不能詳言其故孔子大聖而猶不能言而孟子乃能言之乎孟子深信本心之善而未大通也孔子亦嘗言水矣曰以其不息遍與諸生而不為也嗚呼至矣如此言水則無間然矣孔子觀東流之水子貢問曰君子見大水必觀焉何也子曰以其不息且遍與諸生而不為也夫水似乎德其流也則卑下倨邑必循其理此似義浩浩乎無屈盡之期此似道流行赴百仞之溪而不懼此似勇至量必平之此似法盛而不求槩此似正綽約微達此似察發源必東此似志以出以入萬物就以化潔此似化君子之觀之非既思其遍與諸生而不為又思其流下必循其理又思其無屈盡之期又思其赴百仞之溪而不懼又思其至量必平之又思其盛而不求概又思其綽約微達又思其發源必東似志萬物就以化潔似化也使觀必遍思亦勞矣而孔子云云如右者何也此心清明何思何慮有叩斯應衆妙畢形至妙無彼此清明非動靜知其不息遍與諸生而不為則知之矣義道勇法正察志化皆人為之名至妙不可以言而盡學者多執道以為大體之全名以其餘為枝葉則失之矣是妙無精粗無本末無偏全致本末偏全之說者皆意也非妙也不息遍與諸生而不為水之妙也水何待於聖人言其妙聖人將即水以明人人皆有此不息應酬萬物而不為之妙孔子曰心之精神是謂聖百姓日用此不息不為之妙而不自知也故繼曰夫水似乎德人日用云為或謂之義或謂之道或曰勇或曰法曰正曰察曰志曰化雖日用不息如日月之光無思無為而萬物畢照子思問曰物有形類事有真僞必審之奚由子曰由乎心心之精神是謂聖推數究理不以物疑周其所察聖人難諸心無體質德本虛明如日月照臨如水鑑燭物不必勞神自能推見自能究知若馳神於彼周悉致察雖聖人猶難何則勞動則昏孔子曰不逆詐不億不信而自能先覺在彼之詐者為善也孔子所以明人人自有本心之神至於逆詐億不信則反昏矣孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與孔子非貴操而賤舍後學不達遂謂常操者為聖人不觀夫出入無時孔子亦未嘗貴入而賤出辭㫖坦然孔子哭顔淵至於慟矣而不自知謂之操存可乎負手曵杖莞爾而笑謂之操存可乎變化云為如四時之錯行如日月之代明感而遂通而亦未始不寂然也心者天下之所同然操之則在舍之則無忽然而出又忽焉而入卒莫知其鄉域人心之神如此惟昏惟蔽自迷自亂一日而覺本神本明無勞外求學者不知愈操愈失操無所益舍無所損貴操賤舍斯失之矣孔子曰心之精神是謂聖孟子曰仁人心也孟子又深言正心之為害曰必有事焉而勿正心言乎心無不正無俟乎復正復加正之之意是猶未明本心之善人之所以為不善者非其心之罪也一昏而動於意則差矣孔子惟戒學者以毋意未嘗戒學者以無心此心無我惟有至神雖以孔子之聖猶不能自知其鄉而况於他人乎今或獨取操存則有其鄉矣不能如四時之變化矣孔子何以曰吾有知乎哉無知也貴操賤舍是猶未離乎意孟子所以必有事焉者改過也藝苗也非正其心也此心之靈豈容微置其意孟子此論有所自來蓋𫝊之子思子思𫝊之曽子曽子𫝊孔子者然孟子前曰茍得其養無物不長茍失其養無物不消而遂繼以孔子操存舍亡之言則孟子猶不能無蔽心無體質不可以消長言有消有長未脫乎意始小而終大始弱而後强者非心之有小大强弱也此心虛明無方無體尚不可以大言矧可以小言尚不可以强言矧可以弱言始梏乎意故小故弱所梏既釋故强故大如日月本明雲氣蔽之故昏日月之本明未嘗失也如鏡積塵故昏而鏡之本明不息及塵漸去則漸明大去則大明非始明小而後明大也明則一特塵積之去有多寡前後之不同爾孟子猶未覺此心之神本不可以小大消長言也故誤認孔子操存之旨每以存心操心為言雖知勿正心之理而又不能無蔽於此學者未至於大通故有若是差雜孔子曰知我者其惟春秋乎罪我者其惟春秋乎又曰其義則丘竊取之矣孔子曰吾志在春秋行在孝經孔子因魯春秋筆削成書凡以明道而已矣不知道者觀春秋自天子以下皆致其貶又可恕者不恕可貶者不貶是為罪其知道者謂孔子之作春秋豈得已而不已孔子之時周道大衰道久不明於天下以是為非以非為是似是而非似非而是私意橫生異端並作臣弒君子弒父天下大亂孔子不得已作春秋大明其道深明乎疑似之間取天下後世之私意盡去之不留毫髮許挽天下後世人心盡歸諸道蓋大道人心之所自有人心即道故書曰道心動乎意而失其正為昏為亂春秋不作則天下後世盡胥而為禽獸之歸矣自子路好義著於天下而猶曰名不必正亂父子之大倫而况於他乎春秋之義一而已矣明此以南面則堯之所以為君也明此以北面則舜之所以為臣也以此而為父則父父以此而為子則子子以此而為夫則夫夫以此而為婦則婦婦禮樂刑政衆善萬行如四時之錯行如日月之代明而無二道也其曰竊取之者謙辭也非取之外也取之心也此道人心之所自有而天地萬物盡在其中者人皆昏而孔子獨明則孔子不得不明其道以開人心是義之所不可已是天命孔子作春秋孔子不得而違也春秋之義唯得道者能知之唯得大道備盛德而後能盡知之其餘則知其略而已孔子之志即孔子之行孝經即春秋而孔子必别而言之者以春秋之貶削迹疑於嚴或者不達則流於嚴將寖失本心所自有慈愛恭敬也故曰行在孝經孔子曰我欲託之空言不如載之行事之深切著明也此㫖其謂作春秋乎孔子曰道二仁與不仁而已矣孔子曰仁不可為衆也孟子曰國君好仁天下無敵謂仁不可以衆敵有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰小子聽之清斯濯纓濁斯濯足矣自取之也孔子曰唐虞禪夏后殷周繼其義一也孔子曰今大道既隱天下為家各親其親各子其子而此謂其義一者何也禹未嘗不薦益於天及其後天下朝覲訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也啓在當時往往固辭辭不獲而後嗣位則啓之繼即唐虞之禪也至于有扈氏不服啓不遜於有德不辭于益而往伐戰于甘孔子於此亦不與啓其作書序著其情焉湯未必不以與伊尹伊尹以太甲悔過而復君之伊尹義當立太甲則商之繼即唐虞之禪也自餘不能讓于有德繼世少肖生民被其禍則與唐虞之義不同矣萬章問於孟子曰或謂孔子於衛主癰疽於齊主侍人瘠環有諸乎孟子曰否不然也好事者為之也於衛主顔讎由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子曰有命孔子不悅於魯衛遭宋桓司馬將要而殺之微服而過宋是時孔子當厄主司城貞子為陳侯周臣孔子去魯曰遲遲吾行也去齊滰淅而行今孟子滰作接說文云孟子曰夫子去齊滰淅而行滰其兩反浚乾漬未也字亦有作摬者接誤孟子曰去魯遲遲去父母之道也去齊滰淅去他國之道也孔子嘗為委吏矣曰㑹計當而已矣嘗為乘田矣曰牛羊茁壯長而已矣孔子曰舜其至孝矣五十而慕衆人雖孝至年長大則心放逸寖異乎幼稚之時矣舜年五十而其戀慕父母之心一無以異於幼稚之時嗚呼至矣此精一無二之心即道故舜曰道心文王之德之純者此也孔子不知老之將至者此也孔子夫孝天之經地之義者此也孟子曰孔子為魯司冦不用從而祭膰肉不至不稅冕而行不知者以為為肉也其知者以為為無禮也乃孔子則欲以微罪行不欲為茍去君子之所為衆人固不識也論語曰齊人歸女樂季桓子受之三日不朝孔子行史記謂魯定公十四年孔子年五十六由大司冦攝行相事誅魯大夫亂政者少正卯與聞國政三月粥羔豚者弗飾賈男女行者别於塗塗不拾遺四方之客至乎邑者不求有司齊人聞而懼曰孔子為政必霸霸則吾地近焉為先并矣犂鉏請曰先嘗沮之於是選國中女子好者八十人皆衣文衣而舞康樂文馬三十駟遺魯君陳女樂馬於魯城南高門外季桓子微服往觀再三將受乃語魯君為周道游往觀終日怠於政事子路曰夫子可以行矣觀此則孔子之行乃因季桓子受女樂人謂孔子為茍去故因膰肉不至不脫冕而行則魯國之罪微孔子非茍去孟子之言當矣孔子曰過我門而不入我室我不憾焉者其惟鄉原乎鄉原德之賊也孟子謂鄉原之言曰何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何為踽踽涼涼生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也孟子曰非之無舉也刺之無刺也同乎流俗合乎汚世居之似忠信行之似亷潔衆皆悅之自以為是而不可與入堯舜之道故曰德之賊也張大光曰神女賦願字作平聲則鄉原為鄉願古音蓋通曽子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣縮直也惴恐之也以威加人也禮曰古者冠縮縫今也衡縫千乘第三十二公曰千乘之國受命於天子通其四疆教其書社循其灌廟建其宗主設其四佐列其五官處其朝市為仁如何周通四疆皆所統治周禮詳於比閭族黨之制書社者其黨有庠術有序之謂乎學校政之大者皆致其教祀廟首灌鬯宗廟祭祀禮之大者灌廟其當時之常談乎既循其禮而行之卿大夫謂之主建而立之設四佐列五官面朝後市致治之大略舉矣不知如何而為仁也子曰不仁國不化公曰何如之謂仁子曰不淫於色人心未始不仁動而生意意欲亂其清明故不仁魯君之大蔽在色故云子曰良久而又言故再書子曰立妃設如太廟然乃中治中治不相陵不相陵斯庶嬪遧音章遧則事上靜靜斯潔信在中朝大夫必慎以恭出㑹謀事必敬以慎言長幼小大必中度此國家之所以崇也立妃設喻如太廟然則有敬愛而無淫縱則中治中猶內也無淫則無妬忌無妬忌則不相陵犯不相陵犯則庶嬪周遧退聽則事君上不以色而靜靜則潔潔不亂事理之勢由中以達外其在中朝信其果能敬愛靜正而潔則大夫必慎必敬長幼小大必中度蓋有源必有流有諸中必有諸外君不惑於色則德性昭明賢否自辨小人自退聽君子益敬益慎諸侯有出㑹之事或使大夫出㑹有所謀事必敬而慎言言不慎則致禍速敗故及於慎言大禹謨曰后克艱厥后臣克艱厥臣政乃乂黎民敏德治亂安危在慎不慎敬不敬而已人有長幼事有小大言無不治矣國治則尊崇立子設如宗社宗社先示威威明顯見辨爵集德是以母弟官子咸有臣志莫敢援於外孔子既言立妃中治以答為仁之問矣而又及乎立子設喻如宗廟社稷且曰先示其威者何也孔子灼見魯國之勢在君弱臣强故因言立妃遂及立子今之世子即他日之君宜及今為之所何者凡威勢當以漸致不可亟成宗社之尊嚴蓋人情事理之自然未嘗用威而人自尊敬畏服魯政在三家魯君微弱為日久矣而况於世子乎必其衰索沮喪無復有威明之可畏孔子之治國如良醫之治病治其本源扶其尤弱之處故設宗社示威之喻周官諸子之職國有道大事則帥國子而致於大子唯所用之若有兵甲之事則授之車甲合其卒伍置其有司以軍法治之此理王世子之事然諸侯之世子宜略同魯雖失正而虛文未盡廢故孔子因致其事助使辨爵爵當其德集其有德之人集其有德之事德人心之所共服則母弟官子咸臣服之莫敢援於外母弟者世子之諸弟官子者羣臣之子時魯多强臣力足以援其子若世子有德足以服其官子之心則官子莫敢援於外自世子言之則為外置有司則有爵矣故言辨爵孝經世保爵祿則大夫士皆稱爵大夫中婦私謁不行此所以使五官治執事政也夫政以教百姓百姓齊以嘉善故蠱佞不生此之謂良民國有道則民昌此國家之所以大遂也子之所以辨爵集德固惟無私而後能而君之欲以興邦而振衰亦本於無私夫人心之所以服者公也所以不服者私也大夫中婦私謁皆不行則公矣公者道也未有由道而國不治民不化者也是時魯國公室既衰私謁又行故益衰人心益不服故國益不振聖人醫國灼見受病之處在此故因言立子而及此今欲振衰起弱但私謁不行則五官治矣執事正矣五官言其大執事言其小政正通言正即治即無私正本於君心達於五官執事以及於百姓教百姓以正百姓同歸於善嘉猶善也蠱佞不生是謂良民國有道不特民良而已民咸歸之故昌盛國家大遂蓋根本於不受私謁而已卿設如大門大門顯美小大尊卑中度開明閉幽內祿出災以順天道近者間焉逺者稽焉君發禁宰受而行之以時通乎地散布於小理天之災祥地寶豐省及民共享其祿共任其災此國家之所以和也為國急務莫如善任大臣故言卿設喻如大門大門必顯美喻德不顯美則無以為卿矣其小大其高卑咸中法度則為大門矣微意喻魯卿太强太大太尊不敢明言故託諸喻託諸隱庶諸卿聞之或有感動而改過遷善也門開則明閉則暗喻君臣之情開通無疑間則善不通和則生患三家根固不可去況因君失政三家寖専非一人之罪今為魯計為當通和不可疑阻此則為魯之道也道不可以一端而盡唯不用己私則在道一無己私與天同則在道故曰天道由此而行則福祿至災害去故曰內祿出災以順天道人物皆由門出入故因喻焉間習也卿順天道誠實無僞近者習知而信之無疑逺者則觀而效焉君發禁令宰受而行之王朝謂之冡宰侯國止稱宰歟上卿也君令臣行天道也務農重穀政之大者欲教民必先富之家給人足而後可使為善地者地政也謂農穀也農時最不可失故言時禮樂刑政其事多矣此則達乎地者略舉大政不復悉言小理者治之小事言大政既舉散布于小理無不得理天災行則地寶寡省天祥至則地寶豐多有祥則與民共饗其祿有災則與民共受其災憂樂與民同之不自豐而不恤下則上下和矣不和則禍將及之矣此公室與三家之所同患也國有四輔輔卿也卿設如四體毋易事毋假名毋重食凡事尚賢進能使知事爵不世能官之不愆凡民戴名以能食力以時成以事立此所以使民讓也民咸孝弟而安讓此所以怨省而亂不作也此國之所以長也孔子言卿甚詳者魯之政在卿使卿聞言省過而改也再設喻如四體卿為君之四體則當君臣如一身無輕易其事以政在三家季氏尤専勢强故肆志輕易其事其名則臣其實不臣有假名無真實也性本善庶聞聖言而心感動也重其祿食吝於養士此當時實事故孔子致戒是時三家能尚賢進能則國治家亦安使知爵稱其事當其德官人不以世能則官之無有愆忒未有不能而獲爵者爵不當事是之謂愆此亦有以默感三家世襲之心使知愧也能亦賢能之總稱四民各不同能亦異觀其戴士之名則知能士之事戴農工商之名則能農工商之事時是也以是各食其力必責其事之成立事不成立則食不給矣困窮矣自上及下皆不可怠於事皆不可有名而無實卿假名則卿無其實矣凡爵不稱其事則爵者無其實無其實者怠於政事也無怠無荒之謂道怠荒則失道未有無道而能治者未有無道而不亂者民皆不亂於事而食足食足則善心易興所以可使遜讓孝弟民本有孝心凍餒迫之或不能安而或失之今食足則安乎讓矣自上而達乎下皆由乎道安乎善則怨尤寡省禍亂不作此國之所以長久也國長久則臣民皆被其福季孫失之故囚於家臣下無用則國家富上有義則國家治長有禮則民不爭立有神則國家敬兼而愛之則民無怨心以為無命則民不偷昔者先王立此六者而樹之德此國家所以茂也權歸君上下無専用則國家富矣時公室之政在季氏季氏之政又在陽貨皆下者用事故國家貧治國家之道不可以私盡去其私意唯義之徙則無不治矣禮者敬而已矣位有尊卑貴賤心無不敬禮者義之達於文為制度者而已矣無私意也民安於禮義故無爭時魯之君臣失禮義多矣故國家不治民好爭立神而敬事之諸侯祭社稷祭境內之山川祭五祀祭宗廟上修禮敬則其下皆敬矣時魯豈不祀神祭不敬故及之歟時魯國之民分矣必不能兼而愛之又其視國之民與鄰國之民天下之民有異矣必不能兼而愛之義雖有逺近親疏之不同而泛愛則同也仁者兼愛故民無怨天下無敵時無兼愛之心故民有怨心時魯公室衰弱往往公以為命偷安怠惰不復進德修業季氏衰弱往往季孫亦以為命不可推移偷安怠惰不復進德修業上之人偷怠民亦化之皆偷惰當時魯國情狀可考而知也國家之不治皆上之人自取之從孔子之言固可復治而復興也此六者皆當時魯國之切務而曰本之先王者治國理民之道古今之所同也備而列之雖不勝其多舉其切於時之六者謂先王之所立可也此六者皆所以樹德也設其四佐而官之司徒典春以教民之不則時不若不全時上疑闕不字民有不循典則者教之春農事方興最不可失時患其不時也故教之患其雖教之而有不順令也若順也又患其雖順令而猶有不全盡也故皆教之成長幼老疾孤寡以時通于四疆長幼老病孤寡六者或任其勞或輕其任或助其事或安其所或補其所不足使慈幼養老寬疾恤孤寡各有以成之宜之四疆之內通如一家周禮大司徒令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙施其法于邦國有闔而不通有煩而不治則民不樂生不利衣食闔者閉也閉而不相通融四疆之內境土廣民多或煩亂而不治則民不樂生衣食將闕矣比鄰以上皆有長宰分治凡民之藏貯以及山川之神明加于民者發國功謀齊戒必敬㑹時必節日厯巫祝執伎以守官俟命而作祈王年禱民命及畜穀蜚征庶虞草民之藏貯及山川皆有神明凡神明之加于民者國皆祀之發作也國作其祀事功事也謀思慮也事功必思慮乃成齊戒以祀必敬與祀事者其人不一故必㑹祀必有其時其時其禮皆不踰節日厯之官審祀日之甲子巫祝之官所以接神各執伎能以守官俟命而行禮祈王年愛上之誠也禱民命及六畜九穀庶虞羣蟲之害稼者皆所憂虞故曰虞乎蜚飛也有不飛而唯能征行者草者稂莠之類皆禱之畜穀欲其畢蕃愛民之至其詳盡如此方春三月緩施施用刑生育刑則緩之唯有生育之事動作百物於時有事享于皇祖皇考朝孤子八人以成春事方春天地生育萬物陽氣發動人事當順之亦致凡生育之事動作百物朝孤子必有以惠撫之必八人者八木之成數春屬木亦順之也前言成長幼老疾孤寡則四疆之內孤子必不止於八人其惠恤之則均其朝其人以應天數則其體異其八人得非大夫士之孤子歟天地人同此一氣宜和順而無乖且人一身之內不容有二氣必和同無乖違而後無疾而安平據此則諸侯四時皆有廟祭而禮又曰諸侯禴則不禘禘則不嘗嘗則不蒸則四時唯有二祭按周禮春祭曰祠夏曰禴秋曰嘗冬曰蒸則禴不禘禘不嘗之禮異代之禮歟諸侯五廟而此曰皇祖者曽高而上總稱祖歟司馬司夏以教士車甲凡士執伎論功修四衛强股肱質射御才武聰慧治衆長卒可以為儀綴於國出可以為率誘於軍旅四方諸侯之遊士國中賢餘秀興閲焉方夏三月養長秀蕃庶物於時有事享于皇祖皇考爵士之有慶者七人以成夏事自五家為伍而上皆有長士率之教士則率伍從之矣士各執伎司馬論其功蓋次第論之司馬總之四疆之內凡民皆軍伍也皆所以衛吾國也修其教具故曰修四衛質者驗其實也既教閲之則或射或御伎能咸可覩矣既閲習之則才武聰慧其能治衆長卒之才可覩其可以為儀表於國出可以為將率能導誘軍旅者皆有其質狀可驗矣於是四方諸侯之游士及國中之賢者及其餘秀士皆可以興起考閲焉其賢士可施慶賞者爵其七人成數所以順天地長養蕃物之氣司寇司秋以聽獄訟治民之煩亂執權變叔向曰先王議事以制不為刑辟然則古者非如今皆有定法故曰執權變謂隨情定罪民中凡民之不刑萌本以安或萌作崩安作要非閒作起不敬以欺惑憧愚作於財賄六畜五穀曰盜誘居室家有君子曰義子女専曰餝者妖媚也餝音飾飾也謂女専貞而美飾也五兵及木石曰賊以中情出小曰間大日講利辭以亂屬曰讒以財投長曰貸凡犯天子之禁陳刑制辟以追罔民之不率上教者民人之中凡民之不法者其萌不言之本初未至於甚自不覺其非安而行之及其久也縱也間或作起不敬至於欺惑憧愚憧亦愚願柔順之謂音童作於財賄畜穀之間曰盜謂欺惑之而潛取之又有誘引居室家之良男女當時孔子對語之次盡情詳說曰彼自居室家之中有君子曰義子謂循義理之子有専貞之女曰餝謂美而飾而為賊者誘導之取子之財取女之色其甚者有脅取之以五兵傷之懼之或以木以石傷之懼之强取其財色此大惡名之曰賊記言者雖詳記當時孔子所言而記者不善於屬文辭㫖不明白難遽解然審觀則辭情已著矣又有內情偏愛小者特出之謂表之是謂間大謂右其小者使加諸大者不順也又有日日講習憸利之辭以亂屬類天下事理自有倫類之常而憸人以利口巧辭故亂之是謂讒舜曰朕堲讒說殄行震驚朕師者謂此也易曰正辭者正此等之辭也舜命禹納言者慮其或有此等利口亂正之言辭也又有以財與人而取其長息者投與也長去聲謂之貸右舉其大略凡犯天子之禁則司寇陳刑制辟追罔民之不率上教者罔民非民也常民不如此故謂犯禁者為罔民故追而治之夫是故一家三夫道行三人飲食哀樂平無獄自司徒教民典則治其農政民足衣食司馬教士興賢司寇又治其不刑之民大略舉矣故言其居家也大略得三夫之地其養之也有餘其出而行于道路其行三人有别而不亂飲食哀樂養生送死安平而無獄井田之法曰夫三為屋一夫百畝寬以計之故大略一家三夫道路男子由右婦人由左車從中央其無車則人亦行焉男近右女近左故曰三人歟四則亂矣方秋三月收斂以時於時有事嘗新于皇祖皇考食農夫九人以成秋事農夫多矣唯食九人者自近而始自長而輪次之歟抑皆食之取九人異其禮以順金氣歟九者金之成數秋屬金故數用九以順天地之氣司空司冬以制度制地事準揆山林規表衍沃畜水行衰灌浸以節四時之事治地逺近以任民力以節民食太古食壯之食攻老之事井地溝洫皆有制度水之可畜者畜之可行者行之畜水行水必觀地勢先揆度大體兼用平準之法以審定高下又規模其大略表其平衍水勢所注沃之地畜水而行之行於衰下磽瘠之地以待浸灌之用度四時所用水而節之不妄開塞治地逺近以便民居而任其力言不以大水阻隔司空治溝洫與司徒治井田稼穡之事相關通矣司空司冬故司水伯禹作司空故治水冬則禾稼盡納宜於此時制節民食民食或不能自節則必有以節之愚者不計後縱口腹之欲則後饑餓故上之人必制其節先王之慮之其詳至於此太古亦非三皇五帝之世具見下文公曰功事不少而餱糧不多乎子曰太古之民秀長以夀者食也在今之民羸醜以􅗃者事也􅗃者脅腹枯瘠腸臟隱然露見故或謂􅗃人子腸或作胔月令掩骨埋胔疾智反凡事從肉者為月而云人子腸者疵雌二音以義推之當通月令鄭注云肉腐太古無游民食節事時民各安其居樂其官或作宫室者非服事信上上下交信地移民在今之世上治不平民治不和百姓不安其居不樂其官老疾用財壯狡用力於兹民游薄事貪食於兹民憂古者雖攻老之事然而無游民雖食壯之食然而食亦有節不貪食後世雖老疾用財壯狡用力窮民之力也而有游民不肯盡心服事而薄於事雖不得食壯之食而上亦不節之故貪食大抵治得其道則每事皆善治失其道則每事皆不善古者任民以事有時非如後世使民不以時使民數數則民不得安其居古者雖服役於官而樂之者以使民有時民咸信其上也民雖有移地而居而不之他國民猶在國中古者殷書為成男成女名屬升于公門此以氣食得節作事得時民勸有功夏服君事不及暍暍音謁熱也冬服君事不及凍是故年穀不成天之饑饉道無殣者在今之世男女屬散名不升于公門此以氣食不節作事不時天之饑饉於時委民不得以疾死古者子生閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯命藏諸州府男女皆書名屬屬謂某之子某閭某州此書甚盛故曰殷書歟殷盛也此以氣食得節作事三十而娶國中自七十以及六十野自六十以及六十有五皆征之食人四釜或三釜士不二羔胾庶人耆老不徒食民皆有時而不妄故民相勸勉服事故事功成夏服君事不及暍暍大暑也冬服君事不及凍凍大寒也其恤民如此是故雖年穀不成饑饉而亦道無殣者今男女之生其屬散而而不收名不升于公門是故幼壯老之氣食皆失其節政失節則皆亂作事不時使民無時及饑饉則盡委弃其民不加恤民不得以疾死而餓死是故立民之居必於中國之休地因寒暑之和六畜育焉五穀宜焉辨輕重制剛柔和五味以節食時事東辟之民曰夷精以僥至于大逺有不火食者矣僥堅堯反健也南辟之民曰蠻信以朴至于大逺有不火食者矣西辟之民曰戎徑以剛至于大逺有不火食者矣北辟之民曰狄肥以戾至于大逺有不火食者矣及中國之民曰五方之民咸有安居和味咸有實用利器知通之信令之及量地度居邑有城郭立朝市地以度邑以度民以觀安危距封後利先慮久固依固可守為奧可久孔子因言古者遂及王者之事因發明君人者之本職愛民之至治其民如一家教養之如子古之王者至于四方之大逺不火食者亦養之教之而況於國中之民乎周官職方氏辨邦國都鄙四夷八蠻七閩九貊五戎六狄之人民與其財用九穀六畜之數要周知其利害使同貫利合方氏掌通天下之財利除其怨惡同其好善訓方氏誦四方之𫝊道布而訓四方而觀新物小行人以萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書古王者之教養其民如此故其立民之居必於中國休美之地因寒暑之和周官大司徒辟其多暑多寒之地求地中隂陽之所和而物阜安乃建王國焉職方氏云豫州其畜六擾皆宜其穀五種皆宜其在四方亦各擇其國中之休地中國國中也詩曰中林林中也中逵逵中也就彼偏方亦有寒暑之和其六畜五穀雖不皆宜亦就其所宜之地居其民辨其民俗之尤重於此或輕於彼民性之剛者制之使毋過以暴柔者使之安立所以教訓和調其僥徑剛戾凡不正之性不特此又和其五味以養其氣無傷其生食皆有節使不至乏絶其役之也以時辟偏也四方皆其偏地故曰辟至于大逺有不火食者咸教養之使五方之民咸有安居和味咸有實用利器實用其玉帛皮革衣服之類乎利器其釡鼎槃盂几席之類乎以知慮周通之思其逺近大小無所不盡以信令之言所令民咸信之至于衰世則雖令之下不信矣又量地度居邑有城郭立朝市量地之廣狹可建國邑多寡可以居民多寡若地少民多地多民少皆失其宜又觀其安乎危乎至于封建之後果利乎距至也必先慮其可久可固其固可守為邑必深奧山水之深處皆謂之奧今為邑奧果可久乎嗚呼古王者其慮民如此其詳其審無所不盡及後世大槩私其已而已其民之安不安治不治視之亦薄乎云爾任其自安自危自生自死建國居民乃周官大司徒之職孔子因公問古者之事遂及大體而漢博士乃悉歸之司空蓋觀此篇辭㫖之不詳審故也能節四時之事霜露時降方冬三月草木落庶虞藏五穀必入于倉於時有事蒸于皇祖皇考息國老六人以成冬事節四時之事王朝則六官咸有之侯國則四輔咸有之四輔雖分司四時而合事聨治率相關通各有四節之節此則合司空司徒之事因復終言司空司冬之事老之當息者何止六人以六人行禮以順應天地之氣爾一二三四五為五行生數六七八九十為五行成數天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之六人外當息皆息夫人民咸知孤寡之必不末也司徒成其孤寡是以孤寡為先不末之也咸知有大功之必進等也司馬爵士所謂大功蓋由德性而發諸事者也不由乎德雖偶有功不可以言大功雖偶有大功唯當厚賜或漸進等而教之必不可以為大夫咸知用勞力之必以時息也老則息又役之有時推而內之水火入也弗之顧矣而況有强敵在前有君長正之者乎公曰善哉後世亦知有恤孤寡之為善而恤之者矣而詔書徒掛墻壁後世亦有有大功而進者矣而不能以皆然或為小人所攘所誣而無德無功者受上賞故雖賞功而人不信或偃息在床或不已于行勞者不得息而不勞者無時而不息下不信其上唯怨其上此其根源由人君不改過遷善故昏而不明賢不肖不分不肖者進賢者退而政亂政亂則民怨矣四代第三十三公曰四代之政刑論其明者可以為法乎子曰何哉四代之政刑皆可法也四代虞夏商周公曰以我行之其可乎子曰否不可臣願君之立知而以觀聞也知者心有知也公雖聞四代政刑而未嘗深入其心則安能行故願先立知而以觀所聞四代之政刑君若用之則緩急將有所不節不節君將約之約之卒將棄法棄法是無以為國家也今未立知而遽用之則緩急將不能節節遵其法不能節則將約之約少也略行之不能多行之也不能多行之則卒於將棄其法此蓋由不深入其心公曰巧匠輔繩而斫胡為其棄法也公猶自謂巧匠也子曰心之未度習之未狎此以數踰而棄法也狎熟夫規矩準繩鈞衡此昔者先王之所以為天下也小以及大近以知逺今日行之可以知古可以察今其此耶水火金木土穀此謂六府廢一不可進一不可民並用之今日行之可以知古可以察今其此耶昔夏商之未興也伯夷謂此三帝之眇大抵人之常情泛聞不如心知而況公生長深宫汨汨衮衮雖習聞四代政刑如水沃石爾心實未知今公欲行之故孔子欲公先立知自其眇少甚易知之事使公心親之心知之規矩準繩鈞衡先王所以為天下也故書曰同律度量衡語曰謹權量小者用此大者亦用此不惟在近有此雖甚逺必知其有此此甚易知者今日行規矩準繩鈞衡可以知古必如此可以知今必如此此四代之政耶六府廢一進一不可民並用之此亦四代之政今日行之可以知古如此知今亦如此此有虞氏之政伯夷嘗言此眇少之政乃三帝之政三帝其堯舜及古帝歟謂者言論也雖三帝猶謹此眇少之政此雖甚易之甚眇少孔子知公實未之知公曰長國治民恆幹論政之大體以教民辨歷大道以時地性興民之陽德以教民事上服周室之典以順事天子修政勤禮以交諸侯大節無廢小眇其後乎子曰否不可後也長國君國也恆常也公謂君國治民者常幹治辨論政之大體以教民歷歷辨明其大道又以時治其地性稼穡作民之陽德五穀益氣氣屬陽血屬隂故大宗伯以天産作隂德以地産作陽德民事農事也孟子謂播百穀為民事公曰吾又上服周室之典以順事天子修政勤禮以交諸侯大節無廢小眇者其可後乎夫公言似有理而孔子確然以為不可何也德必務實必切乎心實知實行乃克有成徒務大體而無實德實心何以立政今欲使公切實切心以自其眇少至易者啓之則公心始樂從而實德興矣詩云東有啓明大東毛詩東有啓明西有長庚謂天欲明時東方有大星於時雞三號以興庶虞動蜚征庶虞衆蟲也釋見千乘篇作嗇民執功百草咸淳地傾水流之雞鳴而衆蟲興動嗇民咸作而執功事百草咸淳百穀長育淳和稂莠不害稼地傾水流之修治溝洫也孔子此言蚤作之事則足以感公不怠惰之心言農事則使公知稼穡之艱難不怠惰知稼穡之艱難皆善心也善心即道心孔子知道故自其甚易者啓之是以天子盛服朝日于東堂以教敬示威于天下也威嚴也是以祭祀昭有神明燕食昭有慈愛宗廟之事昭有義率禮朝廷昭有五官無廢甲胄之戒昭果毅以聽天子曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死昭哀哀愛無失節是以父慈子孝兄愛弟敬此昔先王之所先施於民也君而後此則為國家失本矣凡孔子自上所言皆甚易知甚易行皆公已行時公心未深知其為四代之政也公心實忽之以為眇小而别圖其大者似大而實虛未有實德唯聖人知道甚明明知事有大小道無大小故即公所己知己行者發明之惟欲切公心言天子盛服朝日于東堂以教敬公之敬心興矣祭祀昭明其有神明也甚易知也燕禮昭慈愛公所自知也宗廟之事明其義當如是也朝廷之上有五官焉甚昭明也甚易知也甲胄武備公亦已自知其不可廢其戒備所以明果毅戒有司謹備以聽命已上皆公之所己知己行忽繼之以崩薨卒死亦以警公消公之意欲放恣死者人之所哀天屬人之所愛生則愛之死則哀之哀愛無失節則父慈子孝兄愛弟敬此先王所先施於民者而公之所務者皆不及此以為眇小而後之故孔子謂之失本嗚呼即公所己知己行者啓之非孔子孰能灼知其道在此公曰善哉已上皆公己知行雖有未盡亦甚易知易行故曰善子察教我也公既喜其易知易行故又欲孔子察教我察詳切也子曰鄉也君之言善就國之節也就或作執君先眇而後善中備以君之言可以知古可以察今奐然而興民一始善啓導人主者率因人主之所己知己行者道之則易故孔子曰鄉也君之所言自善乃成就其國之事節也但君今先自眇小者行之而後善也其中却備用君之言可以知古者亦如此察今亦當如此公切心立知其自眇小實履而行之然後備行君鄉之言由實心實德而發則奐然興民道心一由此以始奐然油然也詩云泮奐爾游矣音換一者齊也皆也公曰是非吾言也吾一聞於師也子吁焉其色曰嘻君行道矣公曰道耶子曰道也公聞夫子稱美鄉所言之善乃曰是非吾言也乃一聞之於師者孔子於是吁焉有吁歎之狀其色動焉卒作嘻音蓋敬歎之至也曰君今行道矣公駭焉不自知其為道也問孔子曰此為道耶孔子對曰此道也嗚呼至哉非孔子孰能發明人主之道心如此耶自有載籍以來未見有發明大道如此之平易明白者他書載聖人之言多矣道雖無二而言因事發唯此明白簡易為甚此篇載書大戴記以所記不精擇久不行于世簡編散亡𫝊訛承誤滋甚遂使大聖人之言明道之深切平易者不行于世無以開萬世之明道豈心外之物哉人心即道故舜曰道心孔子曰心之精神是謂聖心無體質清明無際畔變化云為無非大道唯因物遷動起而為意始昏始亂始失本有之道道無實體意起而為不善始失之然則舉天下之人心無非道者唯人不自知不自信且人不敢自矜推善於師亦多有之而人自不以為道也何獨此凡人茍不為不善則人人心皆道也人人皆能事親事上皆有敬有愛茍不以私意亂之則道心人人所同也人人皆可以為堯舜禹湯文武周公孔子而人不自信也嗚呼安得孔子斯言行于世哉公曰吾未能知人未能取人子曰君何為不觀器視才公曰視可明乎言視其才疑於難明子曰可以表儀可以即其表儀觀之公曰願學之子曰平原大藪瞻其草之高豐茂者必有怪鳥獸居之且草可財也如艾而夷之其地必宜五穀高山多林必有怪虎豹蕃孕焉深淵大川必有蛟龍焉民亦如之君察之此可以見器見才矣公曰吾猶未也猶未解子曰羣然威然頥然睪然踖然柱然柚然首然僉然湛然淵淵然淑淑然齊齊然節節然穆穆然皇皇然見才色修聲不視聞怪物怪命不改志舌不更氣君見之舉也得之取也有事事也事必與食食必與位無相越踰昔虞舜天德嗣堯取相十有六人如此公曰嘻美哉子道廣矣曰由徑徑吾恐惛而不能用也何以哉表外也即其外之儀狀可以知其中矣且平原大藪見其草之高豐茂則知其中必有怪鳥獸焉怪異也喻人之大才必有異於衆也且草高茂可取之為財用如芟艾而夷之則其地必宜五穀此皆即其外儀之異知其財之美即其高山多林知其中必有怪物虎豹蕃孕焉怪物虎豹亦喻人之大才觀其淵之深川之大知其中必有蛟龍民人也人才如之可以即外而知中孔子告公以觀器視才之法可謂甚要亦易曉而公猶未曉解故孔子又詳言人才之狀曰羣然者衆人羣然從逐隨之也威然者道德之威人自尊憚之也頥養雍容和緩睪然如目視之精明有光也英華之發於外者自光明也踖然敬之至也如柱然安止不動也柚然者應萬變如輪軸之圓轉不窮也如首然自是與羣衆不同有穎異之狀也僉然者衆論皆與之歸之也如水之澄湛不動淵深難窺見淑淑者善美之至也齊齊然有道之容自有此整整之妙也節節者衆善變化之不一而一一中節也不亂也穆穆然和靜也皇皇然有高大之德容而非子張之堂堂也嗚呼道心中虛何思何慮而光華外著自有若是纍言難盡之妙然公道心終未明孔子又慮其或未解又指事實告之曰見才美之色與聲音之修長者皆聲色之異者衆人皆視而此人不視怪物怪命衆無不震駭者而此人不動不改其志人驚駭甚者舌氣為之變更今舌氣亦略不更改如上所陳詳矣備矣君見此人即舉之得之即取用之若有事使任其事既任以事必與之食以公有重以食與人之失故云也既與之食必與之位以公任焉有疑二不決之失也又謂無令他人與越之欲其任之専也簡詳觀此視才之才唯孔子足以當之孔子雖不敢謂天下無人然孔子亦自知罕出己右矣而孔子言之者亦天下後世之公言也亦羣才皆可以此法參驗之全者大才不全者亦中才公聞孔子之言詳明漸解其㫖歎曰美哉子道廣矣又曰由此路以觀人頗覺有其徑路可由而終疑也故曰徑徑又曰恐不能用何以哉公曰請問圖德何尚子曰聖知之華也聖者無所不通之謂謂之知之華知仁之實也知至於仁而後為實孔子曰知及之仁不能守之雖得之必失之仁信之器也仁之為德大矣然不過忠信而已矣當時蓋曰所謂仁者即不欺罔之信是也即此物也非有高竒也記者其文辭微失真爾嗚呼非聖人孰能發明仁道平易如此信義之重也此誠信之中義為重公舍義從利者多矣故云義利之本也委利生孽人之所以棄義而從利者謂義無利也不知義乃利之本也初雖似未利而利實由義而生故曰本人之義者人心皆與之鬼神與之天與之而人之棄義從利者人心皆不與之鬼神不與之多生災孽然則棄義者是委棄其利而生災孽公曰嘻言之至也孔子言之明白利害甚著故公喜而嘆道天地以民輔之聖人何尚子曰有天德有地德有人德此謂三德三德率行乃有隂陽陽曰德隂曰刑孔子信義之論其明道也著矣公猶未覺雖歎服其言之至而實不得於心故又别問嗚呼夫道即信義而已矣天地亦即信義之道矣公既未達而又問道天地以民輔之孔子亦隨順答之公謂道者天地也又治民事以輔之聖人於此三者何尚孔子灼知公未知三才一貫之道姑隨公心而曰三德以事迹觀之誠可言三而孔子不敢有所取舍而勉公率行公誠躬行則入道矣既導公以行又致隂陽之說庶公漸知天地之隂陽乃在公躬行中矣聖人之循循善誘如此公曰善哉再聞此矣曰再聞則知公未達達則通矣陽德何出子曰陽德出禮禮出刑刑出慮慮則節事於近而揚聲於逺禮者德性之節文違禮則入刑刑者所以約人歸諸禮於是漸啓公一貫之道刑不可以不慎故出慮慮刑則事有節而不妄仁聲逺聞公之所大闕者思慮也前言立知其㫖同故此因言刑又及於慮又詳言之善且有聲聞公曰善哉載事何以公知思慮之為要矣又問欲載之於事則何以子曰德以監位當以德監察在位之臣必曰德者明不可他求也位以充局局以觀功功以養民民於此乎上事各有局局設官不一充足其事局各有事功事功雖各局不同同於飬民夫君臣同心悉力皆注乎養民則民之所以感其上也當如何上尚通猶君之也記是篇者不善屬辭公曰祿不可後乎公本重於與士祿食因聖言啓導故本心漸明子曰食為味味為氣氣為志言味養氣氣養志明羣臣之志所以成事功祿不可後也發志為言發言定名名以出信信載義而行之祿不可後也言公發志為言命某人居是位職位職有名名於是乎定矣既命以是位而不與之祿是不信是非義故總結曰祿不可後公曰所謂民與天地相參者何謂也古多有是言孔子前言三德亦不異之子曰天道以視地道以履人道以稽廢一曰失統恐不長饗國公愀然其色天道所視者是也地道所履者是也人道皆可稽觀也是三者廢一則曰失統失其大體也失其大體而國有不亡者幸也夫孔子前之所言於公者皆甚平易而此忽致其嚴使公愀然者何也非嚴也以實告公亦欲切公心切於心庶乎恐懼而思所以入道公之所蔽在循循汨汨無所思慮故不知道也然所謂視者何也履者何也稽者又何也夫道一而已矣而三言者隨人之常情而言也有一不盡焉雖謂之不知道可也故曰失統此言通徹上下知道雖有淺深茍未至於全有一之廢其失統則均孔子之言何獨啓公所以啓天下後世之心也公昏愚疑未足語此然道無淺深雖自開闢以來千無一萬無一倍萬無一至於知全者又何止於萬萬無一也且自孔子以來知道之全者有幾然而不離乎所視也不離乎所履也不離乎所稽也不離乎前所謂信所謂義也天之所以覆者在是地之所以載者在是人之所以君君臣臣父父子子兄兄弟弟夫夫婦婦者在是禮樂刑政皆在是而不離乎所視所履所稽則甚近矣唯知道者乃知子曰君藏玉惟慎用之孔子見公愀然切心矣故又順導之謂此統乃自在君胸中喻以藏玉特未自知未自信爾君既自有玉今惟當慎用其玉人心即道故舜曰道心孔子曰心之精神是謂聖人心自神自明唯放逸而昏故入於不善若信此心之即道而縱欲亦非道雖敬慎而勿愛至哉聖言孔子之啓告魯君盡言無餘至於此曰公之庸愚而即告之以聖人之大道者以人皆有道心初無淺深唯當去人之蔽不可增人之蔽使公敬慎則足以防公放逸然因是有寶愛其玉人心則又失之蓋寶愛則心有所留止之意孔子每每止絶學者之固每每止絶學者之我記者總書曰絶四者此也民亦如之執事無貸五官有差喜無並愛卑無加尊淺無測深小無招大此謂楣機楣機賔薦不蒙昔舜徵薦此道於堯堯親用之不亂上下民亦如之者民亦雖當敬而不可私愛也孔子非謂民不可愛也以公有姑息愛之不以其道故也言無定法唯以啓蔽執事無貸虞戴德篇曰民亦無貸以公嘗有過於愛而貸其所不可貸者故救其蔽也道無精粗事理無二也所以繼言於藏玉之次者此也五官才德有等差而公待之一無等差則國何由治故戒以喜無並愛公又以卑而加尊愛其膚淺之才而使謀測其深以小而使招致其大機者枅音之訛而字亦訛歟楣大枅小喻大才居大任小才居小任薦進也若如賔客之並進無擇無别顧不昏蒙乎徵證也言而證驗於往事也徵薦此道於堯堯親用之不亂上下其謂誅四凶歟公曰請問民徵前言羣臣徵驗之事故公於此因問民徵子曰無以為也難行夫公己德未明尚未能知人而欲遽求民之治甚難矣公曰願學之幾必能子曰貪於味不讓妨於政願富不久妨於政慕寵假貴妨於政治民惡衆妨於政為父不慈妨於政為子不孝妨於政大縱耳目妨於政好色失志妨於政好見小利妨於政變從無節撓弱不立妨於政剛毅犯神妨於政鬼神過節妨於政幼勿與衆克勿與比依勿與謀放勿與逰徼勿與事臣聞之弗薦非事君也君聞之弗用以亂厥德右所條皆公之過也願富而不久者無固志也慕大者之寵己欲假貴大之勢而不能自求多福既曰治民而又惡衆往往於民衆聚之時輒不樂不孝於其考廟墓見之歟或於言笑間見之歟失志者荒淫而昏亂歟多變以從人而無節守舍己從人何害公則昏愚有所聞即變以從後有聞又變以從而不復審詳輕變而無撙節大抵撓弱不立既剛毅犯鬼神又有過節以奉鬼神之事任意妄作之狀可觀矣幼弱者勿與以衆以公嘗使幼弱臨衆也公又嘗親比小人之好勝克者所與謀者皆依從公意之人所與游者多放逸之徒君聞之而弗用則君自亂厥德臣將薦其簡者蓋人有可知者焉貌色聲衆有美焉必有美質在其中者矣貌色聲衆有惡焉必有惡質在其中者矣此者伯夷之所以後出也孔子前言知人之道甚詳公既未深解故此又進其簡要之說觀其貌色聲於衆人中覺其獨有美焉則知其中必有美質於衆人中覺其有惡焉則知其中必有惡質伯夷前言三帝之眇後亦言此觀人之法子曰伯夷曰建國建政修國修政此亦引伯夷之言為獻謂欲建國則必建政欲修國則必修政言必用心建修不可無為而止伯夷以此進之於舜孔子今乃進之於公雖聖愚不同而伯夷之言亦正中公之病公之所蔽在乎未立乎知未切乎心未親用心修為孔子前既纍言此復中其意意謂不可泛泛悠悠即當用心修建公曰善哉虞戴德第三十四公曰昔有虞戴德何以深慮何及高舉安取公聞有虞氏之盛德曰戴者尊其德歟當時之常言歟抑𫝊流訛誤歟公問有虞之德何以深慮而得此高舉而不可及也安取此此問知公未得子曰君已聞之唯丘無以更也君之聞如未成也公之所蔽在乎泛聞而未切用心不在乎他故不復他言徒支離公心然亦非欺公公之未知即孔子之知即有虞之德此唯知道者信此故曰丘亦無以更也如而也特公雖聞而未成也未成者由公未切用其心也黃帝慕循之曰明法乎天明明施教于民行此以上明于天化也物必起是故民命而弗改也夫公方已為問曰安取而未知也而孔子既因而是之曰丘無以更又曰黃帝亦慕循乎此嗚呼非孔子深明乎大道何思何慮疑信一致正實無餘之妙則何以及此又舉黃帝之言曰明法于天明明施教于民孔子釋之曰行此以上明于天化也此謂即君之所聞也即天之明也即所施之教也黃帝所謂法于天明者甚明而無疑也施教于民者亦甚明而無疑也所以無疑者不動乎思為融融怡怡自不見天人之有二也君君臣臣父父子子兄兄弟弟夫夫婦婦即此道也天之所以運化無窮者即此也孔子又謂凡物必由是而起天地萬物誠無二道也是故民咸聽命而弗改也所以咸聽命而弗改者以民心之所同然者即此道也公雖未達孔子就以啓之人心自靈庶其或通也當時孔子對語甚明白坦夷故公即曉曰善哉以記者不善屬辭故人每患其難曉公曰善哉以天教與民可以班乎子曰可哉雖可而弗由此以上知所以行斧鉞也公既聞以天道教民之言問民與天可以班齊乎子曰可哉民雖可與天齊而弗由此以上知天道不循天道妄行逆施所以致有司之行斧鉞也道雖一茍失之則為無道甚則獲大罪言此所以防小人無忌憚之中庸也父之於子天也君之於臣天也有子不事父有臣不事君是非反天而到行耶故有子不事父不順有臣不事君必創順天作刑孔子於此益明道之即天又明不事父不事君之反天又明反天之必創則公之天性庶乎漸明人欲庶乎漸釋矣因言作刑亦必順天用刑而不同於天心必私必濫地生庶物是故聖人之教于民也率天如祖地能用民德是以高舉不過天深慮不過地質知而好仁能用民力此三帝之禮四代篇三帝或作三常此三帝亦三常之誤歟明而名不蹇明上疑更闕一禮字禮失則壞名失則惛孔子節節明人事即天道於是又言地生庶物明地亦此道也當時對語之辭必不止於此情狀必甚明白記者不善屬辭不能盡寫之辭或忘脫致辭㫖不甚明白如而通用前屢見之率天而祖地非天地有二道也能用民德即天地之道也有二道則無以為三才矣率即祖即用也高舉不過天深慮不過地彼淺者好論六合之外不知道無內外逺近也故不必求諸逺外但所知質實而好仁仁非有異道即知之常不惛也如此則能用民力受命而無遺者以由道而行十一而稅役不過三日故民樂之也此即古者三帝之禮禮明而名聞不蹇滯即播行于四方矣禮失則壞矣名失則惛矣惟惛故名失即其無名知其必惛是故上古不諱正天明也天子之官四通正地事也天子御珽諸侯御荼大夫服笏正民德也斂此三者而一舉之戴天履地以順民事上古不諱能受羣臣之諌此正天明也言即天清明之道也天子之官四達分職雖多皆地事也地道臣道也周禮典瑞王搢大圭玉藻云天子搢珽方正於天下也諸侯荼前詘之狀似之故以為名歟君子比德於玉方正之道屈遜之道竹笏正節之道皆所以正民之德也合此三者而一總舉之曰戴天履地無他所為一以順民事而已民事皆正德也前唯言德慮或又曰事公既知以天道教民天人班齊之大略孔子又每明三才一貫之道於是又一歸諸民事者慮公求之逺也天子告朔於諸侯率天道而敬行之以示威於天下也諸侯內貢於天子率名斆地實也是以不至必誅諸侯相見卿為分以教士畢行使仁守㑹朝于天子天子以嵗二月為壇于東郊建五色設五兵具五味陳六律品奏五聲聽明教置離抗大侯規鵠竪物九卿佐三公三公佐天子天子踐位諸侯各以其屬就位乃升諸侯諸侯之教士教士執弓挾矢揖讓而升履物以射其地心端色容正時以斆伎時有慶以地不時有讓以地天下之有道也有天子存國之有道也君得其正家之不亂也有仁父存是故聖人之教于民也以其近而見者稽其逺而明者天事曰明地事曰昌人事曰比兩以慶違此三者謂之愚民愚民曰姦姦必誅是以天下平而國家治民亦無貸居小不約居大則治衆則集寡則繆祀則得福以征則服此唯官民之上德也天子告朔於諸侯率循天道而敬行之以示威嚴而不可違者亦此道也諸侯內貢于天子率循名籍以斆其地實者亦此道也不至必誅亦此道也諸侯卿為分分何卿守何卿行以其所教之士畢行使仁者守國守國至重必選仁者凡此亦皆道也其朝㑹于天子天子以嵗二月為壇于東郊建五色設五兵具五味陳六律品奏五聲聽明教者亦此道也離偶也易曰離麗也禮曰離坐離立者謂偶坐偶立也天子六偶諸侯四偶置立離偶抗張大侯鵠為規圓之形竪立其物九卿佐三公三公佐天子天子踐位諸侯各以其屬就位乃升諸侯及諸侯之教士教士執弓挾矢揖讓而升履物以射心端色容正時以斆其伎皆此道也時是也時是音近而記者或不同歟時者禮容無失中多也故有慶以地不時者不是也謂禮容失不中也故有讓以地謂削之也謂諸侯不能教士也大射所以習禮樂觀德行也廢禮樂無德行亂之道也故先王謹之嚴之夫天下之有道也以其有天子存故也天子有道故天下服之君之天子無道則天下叛之不以為君國之有道也以其有國君存故也君有道一國皆服之君之魯謂之無君可也孔子為之隱唯泛言之又轉其辭曰君得其政家之不亂以有仁父此三者亦皆道也逺而明者天也聖人之教民近而可見即近而可以稽逺道無二故也在天則曰在上清明在地則曰生物而蕃昌在人則曰比兩者偶也慶者禮容無失而中多有慶也前言射故因此以為言他事之正者亦猶是也天下無二正也無二道也三者一也違此三者是違道也是謂愚民愚則姦皆邪道也故必誅誅其反道者也誅姦則正矣是以天下平而國家治民亦無貸四代篇亦曰執事無貸以公縱姦貸其所不可貸者有害治道故每言之也無貸姦則正則為由道而行道無大小故無所不利故居小不約人咸歸之居大則治居衆則衆心咸集居寡則人心輯睦繆睦也祀則受福征則服以其得道故無所往而不利也此官民之上德也官猶君之也唯者語助歟抑即為字歟公曰三代之相授必更制典物道乎子曰否猷德或作猶保保惛乎前以小繼大變民示也公泛言道乎不切故子曰否非謂非道也道之在人曰猷又曰德創業大政既保安斯民也又更制典物以保安之故曰保保雖曰人心咸服其間豈無異物布于天下於人心疑二未定之時新令既布有不得不遵從者一從則定矣此定亂保民之至慮以前者之惛聖人以小國而繼大統故更制典物所以變民視也示即視公曰善哉子之察教我也感孔子教我之察盡子曰丘於君唯無言言必盡於他人則否公曰教他人則如之何子曰否丘則不能君父至情豈他人比子曰否者言不與君同也於他人情輕故不能盡告昔商老彭及仲傀此疑闕曰字傀姑回反政之教大夫官之教士技之教庶人謂於搜田寓軍政教之武事技藝揚則抑抑則揚綴以德行不任以言三者教之雖不同而教之以中則同揚則太過故必抑之抑則不及故必揚之皆使無失中蓋中為德行不中皆人欲綴者不斷絶之謂也抑之揚之所以綴其德行使不斷絶未嘗専任言以教民任庶人以言猶以夏后氏之祔懷袍褐也行不越境人惟可以德教不可専以言教茍専以言人必不從故任庶人以言猶用夏后氏之時腐壞袍褐也服此以行不越境即破敗矣喻其不可行之甚也祔者腐字之訛歟懷者壞字之訛歟公曰善哉我則問政子事教我公謂我則問政子乃事事教我公猶未知道無二也裂事與政為二子曰君問已參黃帝之制制之大禮也孔子知公猶未明又舉初問以啓之初問即黃帝慕循之道言公已聞之是為大禮不必他求也公曰先聖之道斯為美乎子曰斯為美雖有美者必偏屬於斯昭天之福迎之以祥作地之穡制之以昌興民之德守之以長公曰善哉公問先聖之道獨此為美乎孔子曰此為美餘雖有美者必偏爾亦統屬於此嗚呼聖言正矣雖昏庸如公孔子亦未嘗淺薄之即其初問方疑未決之際而遂稱善之大善之蓋孔子深明道無疑信無思慮故因以就之道本無偏全公既未洞達尚分彼此故孔子告以他美皆偏皆統屬於此則彼此亦一矣夫公問尚疑而孔子即謂之黃帝之道餘皆偏者正以道無二故也道無偏全因公裂彼此故始曰統屬於此以一之孔子言孝即曰夫孝天之經地之義言禮即曰禮本於大一分而為天地名稱雖殊而實一孔子於此方尊稱公問不必他求故餘所稱皆偏無不可者最不可執一執一定之說不可推移者皆牿於名不知實者也孔子亦嘗曰五聲六律十二管還相為宫五色六章十二衣還相為質五味六和十二食還相為質明乎此則物物皆本事事皆質本末偏全之名姑因人而言初無二也孔子於此又贊稱斯道之美謂斯道可以昭天之福即有祥之可迎可以作地之穡百穀蕃昌者斯實制之作之可以興民之德曰守之以長者以人情多勤始而怠終況公則尤甚前言願富而不久變從無節則公之情狀可覩矣故卒勉之夫孔子每言公每稱善者以公心曉悉無疑也而自千乘篇四代篇及此虞戴德篇皆取諸大戴所記者辭㫖多不明白人難遽解使當時孔子之言如此則安能曉公公每稱善簡考大戴所記他篇與家語同者知戴記不失真無剪截就文失㫖之患家語則甚有之由是觀之則自千乘篇以來多不明白者乃記者不善屬辭而其本語則存今靜思之則大㫖未嘗不明著簡於是反喜斯記之不失本真也誥志第三十五公曰誥志無荒以㑹民義齊戒必敬㑹時必節犧牲必全齊盛必潔上下禋祀外內無失節其可以省怨逺災乎子曰丘未知其可以省怨也公曰然則何以事神子曰以禮㑹時夫民見其禮則上下不援不援則樂樂斯無憂此以怨省而亂不作也夫禮㑹其四時四孟四季五牲五穀順至必時其節丘未知其可以逺災也誥者所以告諭臣民之典令志者所以記録庶事之書志公謂誥志無荒興舉改察以㑹民義謂凡政事之合義當施行者又齊戒必敬凡四時以禮而㑹不失其節犧牲全而無虧齊盛必精潔上下禋祀與凡外內無失節可以省怨逺災乎而孔子曰丘未知其可以省怨何也公之言大略亦善而其情則未有實德失其本矣何以省怨怨不寡省則災可逺乎孔子不以公言禮義之事全非唯公之行禮未能使民見其禮而上下不援無援上之心則士民安分而無貪則樂樂則無憂此實德非公之所能也此則省怨止亂之道夫禮㑹其四時或四孟或四季五牲五穀順奉而至必時其節違此未為逺災之道也公曰然則為此何以子曰知仁合則天地成天地成則庶物時庶物時則民財􅥚庶物時物也􅥚謂聚歟或作􅀈疑似歟似叙也次叙皆足歟民財􅥚以時作時作則節事節事以動衆則有極有極以使民則勸勸則有功有功則無怨無怨則嗣世久世久唯聖人是故政以勝衆非以陵衆衆以勝事非以傷事事以靖民非以微民微或作徵故地廣而民衆非以為災長之祿也知者知道徒知未為盡道孔子曰知及之仁不能守之雖得之必失之道無二而人有盡不盡故世有仁知之名孔子因世有二名故曰合知仁則道無不盡矣天地由此道而成三才同此道人失其道則乖戾之氣感觸天地故隂陽寒暑失節而庶物不得時令知仁合常覺常清明不乖戾乎天地之氣則庶物皆得時而民財足民財足而後可使以時作之則事節而不妄節事以動衆則有極極猶法則之謂有極以使民則民樂從更相勸勉則有功有功則民無怨無怨民則國君嗣世久𫝊世之久者為聖人唯者為之訛歟抑唯者語助歟故政以任衆勝任也非以陵衆衆以任事非傷事其有用衆而敗事者不得衆故也國之有事皆所以安靖其民非微其民而忽之勞之也故有廣土衆民非為災也所以長其祿也長去聲今俗語盛有也欲使民見禮而上下不援其本乃在於知仁合知仁合則天地猶成而況於人乎丘聞周太史曰改不率天不由人則凡事易壞而難成知仁合即天之道虞史伯夷曰明孟也幽幼也明音萌萌孟音微轉而實同明其同類也天清明地幽隂即人事之孟幼雌雄明幽雌雄也孟雄幼雌雌雄迭興而順至正之統也日歸于西起明于東月歸于東起明于西道至近至易至簡人事即天道魯君雖至昏庸孔子每啓之以大道以道即事事即道不必深求而逺索天下事物非孟即幼非雄即雌隂陽迭興互作而順則無非至正之統如日月互興天人無二而人自疑虞夏之厯正建于孟春於時冰泮發蟄百草權輿瑞雉無釋物乃嵗俱權輿始也百草春始發生當時有瑞雉無釋不散去也虞夏之時每春皆有瑞雉物乃俱豐嵗嵗皆如此生于東次順四時卒于冬方於時雞三號卒明載于青色撫十二月節卒于丑日月成嵗厯再閏以順天道此謂虞汁月月令孟春之月天子駕蒼龍載青旗仲季月同孟夏則駕赤駵載赤旗仲季月之季曰中央土駕黃駵載黃旗秋三月駕白駱載白旗冬三月駕鐵驪載𤣥旗歷五嵗再閏汁音協此謂有虞氏協時月典歟天曰作明日與維天是戴地曰作昌日與維地是事人曰作樂日與維民是嬉民之動能不逺厥事民之悲色悲者妃之訛歟亦猶明孟幽幼不逺厥德此謂表表裏裏時合物之所生而蕃昌之道如此人曰天之作為此明者以其日與無日則天無由而明人曰地之所以作昌萬物者又豈非以日之陽氣無陽氣則物無由昌所謂人者其日用凡以作樂而已皆求樂也其所以得作其樂者亦以有日也無日則純於暗夜何樂之能作凡非憂者皆樂也嬉嬉無憂即樂也孔子言及此極其平近人所甚忽而實道也自言虞夏厯自孟春冰泮發蟄百草權輿瑞雉無釋物乃嵗俱又泛言生于東卒于冬又言虞汁月之制雞三號天卒明帝乃載青色順春氣其撫順十二月之天氣咸有節文終於丑月於是成嵗其無窮之閏皆再閏也皆所以順成天道又縱言及於日之功言天以日而明又繼言人維天是戴言地得日而昌又繼言人維地是事謂稼穡之事孔子泛言雜言多不切之事其後總曰道如此嗚呼非聖人孰能發明大道坦夷平常不祕如此其間言民之動能不逺厥事民之妃色不逺厥德又曰時合物之所生而蕃昌之謂此等為道常情猶以為然至於三言日與則全無謂無義也而亦總謂之道嗚呼此正足以明大道之實孔子曰天下何思何慮又曰吾有知乎哉無知也禹安女止者正謂不足于意也禹曰豫何言豫思日孜孜爾隨山決川暨益稷播奏庶食懋遷有無爾而臯陶曰師爾昌言者知日用常行之正皆道也謂事為表謂德為裏猶因公未明姑隨俗而為言卒總之曰道如此無二道則表裏一矣此亦洪範㑹極歸極之謂也事不一故曰表表德亦不一稱故曰裏裏天生物地養物物備興而時用常節曰聖人主祭於天曰天子天子崩步于四川伐于四山卒葬曰帝天作仁地作富人作治樂治不倦財富時節是故聖人嗣則治文王治以俟時湯治以伐亂禹治以移衆衆服以立天下堯貴以樂治時舉舜舜治以德使力在國統民如恕在家撫官而因安之勿變勸之勿沮民咸廢惡如進良上撫善而行罰百姓盡於仁而遂安之此古之明制之治天下也仁者為聖貴次力次美次射御次孔子前既泛言雜言以明平常一貫之道總曰道如此猶縱言未已又曰天生物萬物資始於天地養物生而長養之物備興而時用之撙節有常是謂聖人然則聖人之道亦平夷無難矣其主祭于天則曰天子天子崩則步于四川伐于四山以供喪葬曰四者謂四方之川之山也卒於葬則曰帝此皆適意泛言及此益以明平常無非道天者道之大體其曰作仁也宜地作富則以百穀貨財也出焉故云人羣居天地之間則所作宜治不宜亂樂於為治而不倦財雖富而用之有時有節乃聖人之道是故聖人嗣則治文王治以俟時以三分天下其二分已歸餘猶未盡歸故服事殷非謂獨一節為合於道而他非道也孔子縱言偶及於俟時湯治以伐亂非謂獨伐亂一節為合於道而他非道也姑舉其大事爾禹治以移衆以衆乃舜之衆後移於禹禹能使衆服故立于天下為王堯雖貴為天子而樂於治時舉舜舜治德以使民之力使禹治水孔子又告公曰在國統民而恕在家撫官而因夫人世婦之屬皆官也因其常安之勿變其以公變從無節故因云歟勸之勿阻人情樂勸而惡阻如此則民咸廢惡而進於善良矣如而也撫善而行罰罰惡也以公好縱姦故言此行罰歟如此則百姓盡化於仁而永遂安寧矣古之明制古之治天下者如此仁者為聖人最上其次凡善而未仁者止可以言美其末則射御伎藝此則次序不可亂所以誘公於神聖歟人雖昏其心忽明則可以盡釋其舊習以人性本善本與堯舜禹湯文王同故也故古治天下者必聖人謂天子聖人有國則日月不食星辰不勃海不運河不滿溢川澤不竭山不崩解陵不弛川洛不處深淵不涸龍至不閉鳯降亡翼鷙獸亡攫爪鳥亡距蜂蠆不螫嬰兒蚊虻不食夭駒洛出服河出圖自上世以來莫不降仁國家之昌國家之臧信仁是故不賞不罰如民咸盡力車不建戈逺邇咸服𦙍使來往地賔畢極此賔其海濵之濵歟無怨無惡率惟懿德此無空禮無空名賢人並並疑無字憂殘毒以時省舉良良舉善善恤民使仁日斆仁賔也推本人生之初羣居乎天地之間未有君長人皆有欲欲而不得則爭爭而不已則相與聽命於長上之公平者此五家為比比有長之因也所至皆有長及羣長之不能相統一則又推其賢者相與尊之而聽命自此等而上之於是乎有國君而其疆場之事㑹禮之節又不能無爭必至相侵相伐不已於是求平於大國之君其德之足以服諸國之君者而聽命焉是為天子則古之治天下必聖人乃人情事勢之所必至又推本混沌未判之初一氣而已及重濁者下凝輕清者上浮浮陽凝隂隂陽之氣交而人物生焉故三才之氣常相感通人事亂乖戾之氣達于上下故日月星辰山川草木鳥獸亦乖戾惟聖人有國斯國統天下而言則日月不食星辰不勃海不運河不滿溢川澤不竭山不崩解陵不弛弛圯也川洛不處處止也壅而止也深淵不涸龍至不閉藏而常見鳯降而亡其翼飛鷙獸亡攫取之殺爪鳥亡距蜂蠆不螫嬰兒蚊虻不食夭駒洛出服馬也用為車之服歟河出馬圖今淮曰淮河漢曰襄河則洛宜為洛河孔子兼言河洛也以祥瑞貴重之以為服馬不以為旁驂歟其曰洛出龜書者緯書爾未可變字嗚呼此道之通達神靈感化至於此而衰世之說謂日月食乃厯數之前定不本諸君德不思唐虞及夏初將二百年不聞日食雖厯家之所共服唐一行之精算一行亦謂有非籌算之所及者然算亦多中者君德不正乖戾之氣所通此衰世之常故也本朝乾德三年二月朔司天監言日當食不食仁聖之君人尊之謂自天而降詩云湯降不遲昌盛也臧善也人心感其上之仁故仁德所感化不賞不罰而民咸盡力無違命如而也車不建戈逺邇咸服戈兵生於不服𦙍繼也使者相繼往來畢盡也極盡地濵海隅無有怨惡率皆懿德無有不善所致禮敬非虛禮乃誠實之禮其稱名曰仁曰聖非空為此名乃實有此德是時皆賢人在位無憂其殘毒也自鷙獸猶亡攫爪鳥猶亡距而況於人乎是時以時省察興舉良善重言之者明良善之不一也則恤民則使仁言所任使者仁人也不止於小善而已凡四方之賔來斆於王庭者亦皆仁人也日日日也古者萬國矧聖人在上宜其仁賔之多也先聖大訓卷四
