body:
  text: 先聖大訓卷六宋楊簡撰子路問第四十七子路問曰請釋古之道而行由之意可乎子曰不可昔東夷之子慕諸夏之禮有女而寡為内私壻終身不嫁嫁則不嫁矣亦非清節之義也蒼梧嬈娶妻而美讓與其兄讓則讓矣然非禮之讓也不慎其初而悔其後何嗟及矣今汝欲舍古之道行子之意庸知子意不以是為非以非為是乎後雖欲悔難哉曾子耘𤓰誤斬其根曾晳怒建大杖以擊其背曾子仆地而不知人乆之乃蘇欣然而起進於曾晳曰嚮也參得罪於大人大人用力教參得无病乎退而就房援琴而歌欲曾晳聞之知其體康也孔子聞之而怒告門弟子曰參來勿納曾子自以為無罪使人請於孔子子曰女不聞乎昔瞽瞍有子曰舜舜之事瞽瞍欲使之未嘗不在側索而殺之未嘗可得小棰則待過大杖則逃走故瞽瞍不犯不父之罪而舜不失烝烝之孝今參事父委身以待暴怒殪而不避既身死而陷父於不義其不孝孰大焉女非天子之民邪殺天子之民其罪奚若曾子聞之曰參罪大矣遂造孔子而謝過孔子在齊舍於外舘景公造焉賔主之辭既接而左右白曰周使適至言先王廟災景公復問災何王之廟也孔子曰此必釐王之廟也公曰何以知之孔子曰詩云皇皇上天其命不忒天之祐善必報其徳禍亦如之夫釐王變文武之制而作𤣥黄華麗之飾宫室崇峻輿馬奢侈而弗可振也言其敗壊不可振起故天所宜加其廟焉以是占之為然公曰天何不殃其身而加罰其廟也孔子曰葢以文武故也若殃其身則文武之嗣無乃殄乎故當殃其廟以彰其過俄頃左右報曰所災者釐王廟也景公驚起再拜曰善哉聖人之智過人遠矣孔子見羅雀者所得皆黄口小雀夫子問之曰大雀獨不得何也羅者曰大雀善驚而難得黄口貪食而易得黄口從大雀則不得大雀從黄口亦得孔子顧謂弟子曰善驚以遠害利食而忘患自其心矣而獨以所從為禍福故君子慎其所從以長者之慮則有全身之階随小人之戇呼貢反又音貢而有危亡之敗也孔子讀易至於損益喟然而歎子夏避席問曰夫子何歎焉孔子曰夫自損者必有益之自益者必有決之吾是歎也是此也子夏曰然則學者不可以益乎孔子曰非道益之謂也道彌益而身彌損夫學者損其自多以虚受人故能成其滿博也天道成而必變日中則昃月盈則食暑極則涼寒極則和凡持滿而能乆者未嘗有也故曰自賢者天下之善言不得聞於耳矣昔堯居治天下之位猶允恭以持之克讓以接下是以千嵗而益盛迄今而愈彰夏桀昆吾自滿而無極亢意而不節斬刈黎民如草芥焉天下討之如誅匹夫是以千載而惡著迄今而不滅滿也如在輿遇三人則下之遇二人則式之調其盈虚不令自滿所以能乆也子夏曰商請志之而終身奉之子夏問曰回之為人奚若子曰回之信賢於丘賜之為人奚若子曰賜之敏賢於丘由之為人奚若子曰由之勇賢於丘師之為人奚若子曰師之荘賢於丘子夏避席而問曰然則四子何為事夫子子曰居吾語女夫回能信而不能反孔子謂昭公知禮又背蒲盟而適衛皆不信也賜能敏而不能詘詘者敏之反音屈由能勇而不能怯師能荘而不能同兼四子者之有以易吾弗與也言大小之不等爾不以大易小以為喻爾非果弗與也子曰吾無行而不與二三子者但此道可以心通不可以言授此其所以事吾而弗貳也孔子曰回有君子之道四焉强於行義弱於受諫怵於待禄顔子不干禄待禄之至雖將西遊於宋怵焉懼其或失節慎於治身史鰌有君子之道三焉不仕而敬上不祀而敬鬼直己而曲於人曾子侍曰參昔者嘗聞夫子之三言而未之能行也夫子見人之一善而忘其百非是夫子之易事也見人之有善若己有之是夫子之不爭也聞善必躬行之然後道之是夫子之能勞也道言也先行而後言之勤勞力行也學夫子之三言而未能行以自知終不及二子也孔子曰吾死之後則商也日益賜也日損曾子曰何謂也子曰商也好與賢己者處賜也好説不若己者處不知其子視其父不知其人視其友不知其君視其所使不知其地視其草木故曰與善人居如入芝蘭之室乆而不聞其香即與之化矣與不善人居如入鮑魚之肆乆而不聞其臭亦與之化矣丹之所藏者赤漆之所藏者黒是以君子必慎其所與處者焉孔子曰富貴而下人何人不以富貴而愛人何人不親發言不逆人咸順聽可謂知言矣言而衆響之可謂知時矣衆應如響甚於不逆矣徳性無二自人稱其善則有知言知時之不同是故以富而能富人者欲貧不可得也以貴而能貴人者欲賤不可得也以逹而能逹人者欲窮不可得也孔子此言非以利教人明天下之常理明由道之必致大利聖智無所不照知如四時而一氣中人第四十八孔子曰中人之情有餘則侈不足則儉無禁則淫無度則逸從欲則敗是故鞭扑之子不從父之教刑戮之民不從君之令此言疾之難忍急之難行也故君子不急斷不急制使飲食有量衣服有節宫室有度畜積有數車器有限所以防亂之原也夫度量不可不明是中人所由之令孔子之㫖謂制度足以防亂鞭扑刑戮不可專恃以治故善治者先立制度孔子曰巧而好度必攻工作之精治曰攻勇而好問必勝智而好謀必成愚者反之是以非其人告之弗聽非其地樹之弗生得其人如聚沙而雨之言即入也非其人如㑹聾而鼓之夫處重擅寵專事妬賢愚者之情也位高則危任重則崩可立而待孔子曰舟非水不行水入舟則没君非民不治民犯上則傾是故君子不可不嚴也小人不可不整也齊高庭問曰庭不曠山不直地直猶遠也不以山為曠遠地為直遠而來見夫子衣穰而提䞇穰草為衣精氣以問事君子之道願夫子告之孔子曰貞以幹之貞正為本敬以輔之施仁無倦高庭所問淺矣而孔子亦啓之以道貞正即道也幹謂本也敬亦道也慈仁亦道也仁大矣而此曰施仁無倦無倦者乃慈仁之意也因高庭所曉以告之慈恕亦仁心之發亦道也見君子則舉之見小人則退之去女惡心而忠與之效其行脩其禮千里之外親如兄弟行不效禮不修則對門不女通矣夫終日言不遺己之憂終日行不遺己之患唯智者能之故自脩者必恐懼以除患恭敬以避難終身為善一言則敗之可不慎乎詩曰迨天之未隂雨徹彼桑土綢繆牖户今女下民或敢侮予孔子曰能治國家如此雖欲侮之豈可得乎周自后稷積行累功以有爵土公劉重之以仁及至太王亶父敦以徳讓其樹根置本備豫遠矣后稷公劉太王其道一也后稷見於功公劉成名於仁大王見於讓推其土地以與狄人而不爭也孔子欲言武庚終不能侮周由周積徳乆遠故取喻樹根置本又喻豫備初太王都豳狄人侵之事之以皮幣不得免焉事之以珠玉不得免焉於是屬耆老而告曰狄人之所欲吾土地也吾聞之君子不以其所以養人者害人二三子何患乎無君我將去之遂獨與太姜去而踰梁山邑于岐山之下豳人曰仁人也不可失也從之者如歸市天之與周民之去殷乆矣武庚惡能侮嗚呼夫道正而已矣不離乎日用之善心由是善而行天之所祐離是善而行天之所棄禍福存亡一自夫人君日用之心善惡邪正始而昧者不曉此明白簡易之道乃求之他嗚呼失之矣孔子遊於泰山見榮聲期王肅曰聲宜為啟或曰榮益期也行乎郕之野鹿裘帶索鼓琴而歌孔子問曰先生所以為樂者何也期對曰吾樂甚多而至者三天生萬物唯人為貴吾既得為人是一樂也男女之别男尊女卑故人以男為貴吾既得為男是二樂也人生有不見日月不免襁褓者吾既已行年九十五矣是三樂也貧者士之常死者人之終處常得終當何憂哉孔子曰善哉能自寛也孔子之言可謂中矣榮叟年大長於孔子又能自得其樂非惡也安得不稱善然非知道者故惟曰自寛然榮叟亦異乎奔競不止者矣疑若可啟之以道而孔子不啟告之者非果不啟之也云自寛亦微見其未至於道之㫖而榮叟又莫之覺則孔子已矣至是而又强告之則為動乎意而失道矣嗚呼孔子如天矣季桓子穿井獲如玉缶國語玉作土其中有羊焉使使問孔子曰吾穿井於費而於井中得一狗何也孔子曰以丘之所聞羊也丘聞之木石之怪䕫蝄蜽水之怪龍罔象土之怪羵羊韋昭曰或云罔象食人一名沐腫國語羵作墳唐云墳羊雌雄不成者栁宗元云史之記地坼犬出者有之矣近世京兆杜濟穿井獲土缶中有狗焉投之於河化為龍宗元遂以國語為誣簡竊謂傳記之誣者有矣亦安知非以古今氣類有變不可得而齊歟羊亦有無角似犬者又安知非傳聞之誤耶吳伐越隳㑹稽國語隳作墮史記越世家吳王擊越敗之夫椒越王句踐以餘兵五千人保棲於㑹稽吳王進而圍之獲巨骨一節專車吳王使聘於魯且問之仲尼曰無以吾命也賔既將事乃發幣於大夫及孔子孔子爵之既徹俎而燕客執骨而問曰敢問骨何為大孔子曰丘聞昔禹致羣神於㑹稽之山防風後至禹殺而戮之韋昭曰防風汪芒氏之君名也陳尸為戮其骨節專車此為大矣客曰敢問誰守為神孔子曰山川之靈足以紀綱天下者其守為神社稷之守為公侯山川之祀為諸侯皆屬於王舉其大者言之故曰羣神客曰防風何守孔子曰汪芒氏之君守封嵎山者為漆姓在虞夏為防風氏商為汪芒氏於周為長翟氏今曰大人客曰人長之極幾何孔子曰僬僥氏長三尺短之至也長者不過十之數之極也孔子在陳陳惠公賔之于上舘時有隼集于陳侯之庭而死楛矢貫之石砮砮石可以為矢鏃故世因名鏃曰砮其長尺有咫八寸為咫惠公使人持隼如孔子舘而問焉孔子曰隼之來遠矣此肅慎氏之矢昔武王克商通道于九夷八蠻使各以其方賄來貢而無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令徳之致遠物也以示後人使永監焉故銘其括曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以珍玉展親也分異姓以遠方之職貢使無忘服也故分陳以肅慎氏之貢君若使有司求諸故府其可得也使求得之金櫝如之邾隱公朝于魯子貢觀焉邾子執玉高其容仰定公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮生死存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能乆高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏五月公薨又邾子出奔孔子曰賜不幸言而中是使賜多言者也子貢學無本唯求諸外故孔子云晏子第四十九曾子從孔子于齊齊景公以下卿之禮聘曾子曾子固辭將行晏子送之曰吾聞遺人以財不若善言今夫蘭本三年湛之以鹿醯既成噉之則易之匹馬非蘭之本性也所以湛者美矣愿子詳其所湛者夫君子居必擇鄉遊必擇方仕必擇君擇君所以求仕擇方所以修道遷風易俗者嗜欲移性可不慎乎孔子聞之曰晏子之言君子哉依賢者固不困依富者固不窮馬蚿斬足而復行何也蚿胡㳙反以其輔之者衆孔子在陳陳侯就之燕焉與子遊行路之人云魯司鐸災及宗廟以告孔子孔子曰所及者其桓僖之廟陳侯曰何以知之子曰禮祖有功而宗有徳故不毁其廟焉今桓僖之親盡矣又功徳不足以存其廟而魯不毁是以天災加之三日魯使至問焉則桓僖也陳侯謂子貢曰吾乃今知聖人之可貴對曰君之知之可矣未若𫝊其道而行其化之善也陽虎既奔齊自齊奔晉適趙氏孔子聞之謂子路曰趙氏其世有亂乎子路曰權不在焉豈能為亂孔子曰非女所知夫陽虎親富而不親仁有寵於季孫又將殺之不克而奔求容於齊齊人囚之乃亡歸晉是齊魯二國已去其疾趙簡子好利而多信必溺其説而從其謀禍敗所終非一世可知也季康子問曰今周十二月夏之十月而猶有螽何也孔子曰丘聞之火伏而後蟄者畢今火猶西流司厯過也季康子曰所失者幾月也孔子曰於夏十月火既没矣今火見再失閏也吳王夫差將與哀公見晉侯春秋魯哀公十二年夏公㑹吳于槖臯十三年夏公㑹晉侯及吳子于黄池子服景伯對使者曰王合諸侯則伯率侯牧以見於王伯合諸侯則侯率子男以見於伯今諸侯㑹而君與寡君見晉君則晉成為伯矣且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之遂囚景伯景伯謂太宰嚭曰魯將以十月上辛有事于上帝先王季辛而畢何也世有職焉何景伯名自襄以來未之改也魯襄公若其不㑹則祝宗將曰吳實然杜預曰吳信鬼故以恐之嚭言於夫差歸之子貢聞之見於孔子曰子服氏之子拙於説矣以實獲囚以詐得免孔子曰吳子為夷徳可欺而不可以實是聽者之蔽非説者之拙也顔淵問曰臧文仲武仲孰賢孔子曰武仲賢哉顔淵曰武仲世稱聖人而身不免於罪是智不足稱也武仲為季武子廢其長子公鉏而立其所愛悼子後公鉏與孟氏合而譖之武仲乃出奔好言兵討而挫鋭於邾是智不足名也魯襄公四年冬邾人莒人伐鄫臧紇救鄫伐邾敗於狐駘國人誦之曰臧之狐裘敗我於狐駘我君小子侏儒是使侏儒侏儒使我敗於邾武子短小故曰侏儒文仲其身雖殁而言不朽惡有未賢孔子曰身殁言立所以為文仲也然有不仁者三不智者三是則不及武仲也顔子曰可得聞乎孔子曰下展禽子曰臧文仲其竊位者歟知栁下惠之賢而不與立也置六闗王肅曰六闗闗名魯本無此闗文仲置之以税行者故為不仁𫝊曰廢六闗非也妾織蒲蒲席三不仁設虚器王肅曰居蔡蔡天子之守龜非文仲所得有故曰虚器也縱逆祀夏公弗忌為宗伯躋僖公於閔公之上文仲縱而不止祀爰居海鳥曰爰居止于魯東門文仲以為神命國人祀之三不智武仲在齊齊將有禍不受其田以避其難武仲奔齊齊荘公将與之田武仲知荘公将有難故辭之以避禍是智之難也有武仲之智而不容於魯抑有由焉作而不順施而不恕也夫夏書曰念兹在兹順事恕施也廢長立少不順也己所不欲不施於人恕也使武仲為公鉏則豈欲人之廢已乎顔子問君子孔子曰愛近仁愛者仁心之發知愛則知仁矣度近智遵先王之法度則智者也為己不重為人不輕去其己私則大公矣君子也曰敢問其次子曰弗學而行弗思而得小子勉之所問次者又欲有所進也故孔子告之以弗學而行弗思而得之妙物我之私既去則本有清明之妙自著自無所不通視聽言動無非變化無思無為覺者自知顔子勉之及其覺也三月不違顔子問小人孔子曰毁人之善以為辯狡計懐詐以為智幸人之有過耻學而羞不能小人也顔子第五十顔子問曰小人之言有同乎君子者不可察也孔子曰君子以行言小人以舌言君子於為義之上相疾也退而相愛小人於為亂之上相愛也退而相惡之上今俗語猶有此君子惟義而已矣其有不合於義則相疾然而人皆有善退而相愛者愛其善也小人利而已矣故於為亂相愛者茍目前之利也退而相惡者實知為亂者之為小人也或以猶有不利於己者也又詳於責人不思彼猶有善心故也顔子問朋友之際如何孔子曰君子之於朋友也心必有非焉而弗能謂吾不知其仁人也人不能無過故心必有非焉非之則可以相規而弗可於他人之前言其非仁人於他人之前言吾不知其仁人也是訾之也非相規也弗能猶弗欲也不忘乆徳不思乆怨仁矣夫朋友相親之乆其間言語過差或不能無相失不能無怨是亦心必有非焉之一端也或行事有相怨乆怨不思由本心純明靜止本無怨也不忘乆徳亦以本心純明有感斯應而不忘也故曰仁矣夫顔子曰吾聞諸夫子言人之惡非所以美己言人之枉非所以正己故君子攻其惡無攻人之惡顔子謂子貢曰吾聞諸夫子身不用禮而望禮於人身不用徳而望徳於人亂也夫子之言不可不思也子路初見孔子子曰女何好樂對曰好長劒子曰吾非此之問也徒謂以子之所能而加之以學問豈可及乎葢孔子問其於學問中何所好樂也不料子路以長劒對徒猶只也子路年亞於孔子又好勇又其初見故稱其能順導之子路曰學豈益也哉子曰夫人君而無諫臣則失正士而無教友則失聽無相教之友則於所聞誤聽而差失矣御狂馬不釋䇿馬狂則䇿不可釋喻狂縱者必痛改操弓不反檠檠所以輔弓者王肅曰弓不反於檠然後可持木受繩則直人受諫則聖受學重問孰不順成毁仁惡士必近於刑謗毁仁者憎惡士人君子不可不學子路曰南山有竹不揉自直斬而用之逹於犀革言竹箭可以貫逹犀革以此言之何學之有子曰括而羽之鏃而礪之其入之不益深乎子路再拜敬受教子路將行辭於孔子子曰贈女以車乎贈女以言乎子路曰請以言子曰不强不逹强力通逹因子路之强導之使力學不勞無功勤勞乃有功亦因其强力就使之學不忠無親不信無復忠信亦子路所自有因以明之不恭失禮恭則子路之所闕言之於末亦不深違之慎此五者而已子路曰由請終身奉之敢問親交取親若何言寡可行若何長為善事而無犯若何子曰女所問包在五者中矣親交取親其忠也言寡可行其信也長為善事而無犯其禮也孔子為魯司寇見季康子康子不悦孔子又見之宰我進曰昔予也嘗聞諸夫子曰王公弗我聘則弗動今夫子之於司宼也日少而屈節數矣不可以已乎子曰然魯國以衆相陵以兵相暴之日乆矣而有司不治則將亂也其聘我者孰大於是哉孔子所以屈節而未去者以父母之國昭公君臣相攻大亂今雖小定而有司不治則將亂此其利害之甚大者康子雖不悦未至於甚故權其義之大小而留魯人聞之曰聖人將治何不先自遠刑罰自此之後國無爭者孔子謂宰我曰違山十里蟪蛄之聲猶在於耳故政事莫如應之蟪蛄蟬屬又名蛁蟟以其聲名之也為政不必以刑以力惟導之以徳齊之以禮而民自黙應而化亦猶蟪蛄之聲雖不及十里而聲猶在耳此理甚明而自漢以來君臣多莫之信吁可惜哉孔子侍坐於哀公公賜之桃與黍焉公曰請食孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪桃王肅曰雪拭非為食之也孔子對曰丘知之矣然夫黍者五穀之長郊禮宗廟以為上盛果屬有六而桃為下祭祀不用不登郊廟丘聞之君子以賤雪貴不聞以貴雪賤今以五穀之長雪果之下者是從上雪下臣以為妨於教害於義故不敢公曰善哉子貢曰陳靈公宣婬於朝泄冶正諫而殺之是與比干諫而死同可謂仁乎子曰比干於紂親則諸父官則少師忠報之心在於宗廟而已以死爭之冀身死之後紂將悔悟其本志情在於仁者也泄冶之於靈公位在大夫無骨肉之親懐寵不去仕於亂朝以區區之一身欲正一國之婬昬死而無益可謂損矣詩云民之多僻無自立辟其泄治之謂乎孔子相魯齊人患之曰孔子為政必霸霸則吾地近焉我之為先并矣盍致地焉犁鉏曰請先嘗沮之沮之而不可則致地庸遲乎於是選齊國中女子好者八十人皆衣文衣而舞康樂家語康樂作容璣及文馬四十駟以遺魯君陳女樂文馬於魯城南高門外季桓子微服往觀再三將受乃語魯君為周道游往觀終日怠於政事子路曰夫子可以行矣子曰魯今且郊若致膰於大夫是則未廢其常吾猶可以止也桓子既受女樂君臣婬荒三日不聽國政郊又不致膰俎孔子遂行宿於郭屯師已送家語已作以曰夫子非罪也孔子曰吾歌可乎歌曰彼婦之口可以出走彼婦之謁可以死敗優哉遊哉維以卒嵗家語婦下有人字謁作請維作聊孔子曰里語云相馬以輿相士以居弗可廢矣以容取人失之子羽以辭取人失之宰予史記澹臺滅明字子羽狀貌甚惡孔子以為材薄既以受業退而脩行行不由徑非公事不見卿大夫南游至江從弟子三百名施乎諸侯孔子聞之曰吾以言取人失之宰予以貌取人失之子羽所謂貌惡非謂醜陋司馬遷淺陋不識聖人之㫖當自柔懦茍簡之類自是有不善之貌而知人之難自有中心之微不見於外者孔子曰君子以其所不能畏人小人以其所不能不信人故君子長人之才長者上之也小人抑人而取勝焉孔蔑問行己之道子曰知而弗為莫如勿知親而弗信莫如勿親樂之方至樂而勿驕患之將至思而勿憂孔蔑曰行已乎心領其㫖子曰攻其所不能補其所不備毋以其所不能疑人毋以其所能驕人終日言無遺己之憂終日行無遺己之患惟智者有之楚昭第五十一楚昭王聘孔子孔子往拜禮焉路出于陳蔡陳蔡大夫相與謀曰孔子聖賢其所刺譏皆中諸侯之病若用於楚則陳蔡危矣遂使徒兵拒孔子孔子不得行絶糧七日從者皆病孔子絃歌不衰知弟子有愠心召子路而問曰詩云匪兕匪虎率彼曠野率循也吾道非乎奚為至於此子路愠而對曰君子無所困意者夫子未仁與人之弗吾信也意者夫子未智與人之弗吾行也且由也昔者聞諸夫子為善者天報之以福為不善者天報之以禍今夫子積徳懐義行之乆矣奚居之窮也子曰由女以仁者為必信也則伯夷叔齊不餓死首陽女以智者為必用也則王子比干不見剖心女以忠者為必報也則闗龍逢不見刑女以諫者為必聽也則伍子胥不見殺夫遇不遇者時也賢不肖者才也君子博學深謀而不遇時者衆矣何獨丘哉且芝蘭生於深林不以無人而不芳君子脩道立徳不為困窮而改節為之者人也生死者命也是以晉重耳之有霸心生於曹衛嘗困於曹衛越王勾踐之有霸心生於㑹稽勾踐為吳所敗以五千人保棲於㑹稽故居下而無憂者則思不逺處身而常逸者則志不廣庸知其終始乎重耳勾踐之况盖為子路而發子路未知道故因以感之使進徳若夫孔子則未嘗以困厄為憂何所損益嘗詳觀孔子之言率因人而發論語所載甚簡殆約其辭而記之歟此取諸家語當有此情狀子路出召子貢告如子路子貢曰夫子之道至大故天下莫能容夫子盍少貶焉子曰賜良農能稼不必能穡種之為稼歛之為穡良工能巧不能為順不能順從人意君子能修其道綱而紀之不必其能容今不修其道而求其容不修其道意指子貢賜爾志不廣矣思不遠矣子貢出顔淵入問亦如之顔淵曰夫子之道至大天下莫之能容雖然夫子推而行之謂非隱居不出世不我用有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰於是使子貢至楚楚昭王興師迎孔子子路問曰君子亦有憂乎子曰無也君子之脩行也其未得之謂未得爵位則樂其意意謂心也人心即道故舜曰道心孔子曰心之精神是謂聖此心無體虚明其樂無窮既得之又樂其治是以有終身之樂無一日之憂小人則不然其未得也患弗得之既得之又恐失之是以有終身之憂無一日之樂也趙簡子使聘孔子孔子自衛將入晉至河聞趙簡子殺竇犫鳴犢及舜華史記作竇鳴犢徐廣注云或作鳴鐸竇犫乃臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇犫鳴犢舜華晉之賢大夫也趙簡子未得志之時須此二人而後從政及其已得志也而殺之丘聞之刳胎殺天則麒麟不至其郊竭澤而漁則蛟龍不處其淵覆巢破卵則鳯凰不翔其邑何則君子諱傷其類者也鳥獸之於不義尚知避之况於人乎遂還息於鄒作槃操以哀之史記云還息乎陬鄉作為陬操以哀之其注王肅曰陬操琴曲名也家語亦王肅注曰槃操琴曲名也曰周道衰微禮樂陵遲文武既墜吾將焉師周遊天下靡邦可依鳯鳥不識珍寳梟䲭眷然顧之慘焉心悲巾車命駕將適唐都黄河洋洋悠悠之魚臨津不濟還轅息鄹鄒鄹通此操辭取諸孔叢子其不濟河還息鄹作操家語與孔叢子同傷予道窮哀彼無辜翺翔于衛復我舊廬從吾所好其樂只且子路問曰有人於此夙興夜寐耕耘樹藝手足胼胝以養其親然而名不稱孝何也孔子曰意者身不敬與辭不順與色不悦與古之人有言曰人與己與不女欺人與己與之言正中子路之蔽事親而不以孝稱豈親之難事與葢已猶有未盡其道故爾凡百皆然志曰治人不治反其智愛人不親反其仁此曰人與己與言不在人而在己此語不女欺今盡力養親而無三者之闕何為無孝之名乎孔子曰由女志之吾語女雖有國士之力而不能自舉其身非力之少勢不可矣夫内行不脩身之罪也行修而名不彰友之罪也行修而名自立故君子入則篤行出則交賢何謂無孝名乎前言三者之闕使求諸己次言行既修而名不彰者友之罪使無出位而侵友之職又曰行修而名自立終欲使毋求諸外君子自當篤行交賢名自随之孔子厄於陳蔡之間弟子餒病孔子絃歌子路入見曰夫子之歌禮乎孔子弗應曲終而曰由來吾語女君子好樂為無驕也君子謂貴人在位者樂所以節其淫是無驕也小人好樂為無懾也小人謂失位而賤者孔子自謂也雖窮厄而無懾故好樂其誰之子不我知而從我乎諷子路不知我子路悦援戚而舞三終而出孔子之宋匡人簡子以甲士圍之子路怒奮㦸將與戰孔子止之曰惡有脩仁義而不免俗者乎夫詩書之不講禮樂之不習是丘之過也若以述先王好古法而為咎者則非丘之罪也命也夫歌予和女子路彈琴而歌孔子和之曲三終匡人解甲而罷史記云孔子狀類陽虎陽虎嘗暴匡人匡人遂止孔子子貢問曰賜既為人下矣而未知為人下之道敢問之子曰為人下者其猶土乎汨之深則出泉樹其壤則百穀滋焉草木植焉禽獸育焉生則出焉死則入焉多其功而不意不以為意恢其志而無不容子貢未知道故姑使恢之歟恢容習熟則復乎本有之大矣抑記者差其㫖歟為人下者以此也夫道一而已矣随所問随所宜因以明之孔子適衛路出于蒲會公叔氏以蒲叛衛而止之孔子弟子有公良孺者為人賢長有勇力以私車五乗從夫子喟然曰昔吾從夫子遇難于匡又伐樹於宋王肅曰孔子與弟子行禮於大樹之下史記作習禮桓魋欲殺孔子拔其樹今遇困於此命也夫與其見夫子仍遇於難寧我鬬死挺劒而合衆將與之戰蒲人懼曰茍無適衛吾則出子以盟孔子而出之東門孔子遂適衛子貢曰盟可負乎子曰要我以盟非義也史記孔子曰要盟也神不聽衛靈公聞孔子來喜郊迎問曰蒲可伐乎對曰可哉靈公曰吾大夫以為蒲者衛之所以待晉楚也伐之無乃不可乎孔子曰其男子有死之志婦人有保西河之志王肅曰無戰意吾所伐不過四五人靈公曰善卒不果伐他日靈公問陳孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也明日與孔子語見蜚鴈仰視之色不在孔子孔子遂行五帝第五十二季康子問曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔者丘也聞諸老耼曰天有五行水火金木土分時化育以成萬物木春火夏金秋水冬或曰土旺於夏之季或曰土旺四季或曰土徧於四時其神謂之五帝古之王者易代而改號取法五行五行更王終始相生亦象其義故其生為明王者死而配五行是以太皥配木炎帝配火黄帝配土少皡配金顓頊配水康子曰太皥氏其始之木何如孔子曰五行用事先起于木木東方萬物之初皆出焉是故王者則之而首以木徳王天下其次則以所生之行轉相承也觀孔子之言則自太皥而上未有帝王出而統治天下者至太皥即伏羲始作八卦造書契始脩大君之政始稱木徳以配天使後世知居帝王之位者必徳配天而後可康子曰吾聞勾芒為木正祝融為火正蓐收為金正𤣥㝠為水正后土為土正此五行之主而不亂稱曰帝者何也孔子曰凡五正者五行之官名五行是間疑闕之神二字佐成上帝而稱五帝太皥之屬配焉亦云帝從其號昔少皥氏之子有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收脩及熈為𤣥㝠顓頊氏之子曰黎為祝融共工氏之子曰勾龍為后土此五者各以其所能業為官職生為上公死為貴神别稱五祀不得同帝康子曰如此之言帝王改號於五行之徳各所綂則其所以相變者皆主何事王肅曰怪木家而尚赤所以問也孔子曰所尚則各從其所王之徳次焉自所王之徳外餘皆為次焉夏后氏以金徳王而尚黒大事歛用昏戎事乗驪鐵色馬戎事用馬多矣豈能一一皆驪其以三代時用衆不多其車寡耶牲用𤣥夏后氏不用金徳之白而尚黒者何也本徳不用其先聖王特以明道即使人思而覺耶易曰無思無為者此也文王不識不知者此也或者難曰本徳不可用也何必專尚耶應之曰易代改號雖聖徳足以服天下其間不無小人或有異志則更所尚之色以一天下之心此弭亂之道聖王愛民之心也殷人用水徳王尚白大事歛用日中戎事乗翰王肅云白色馬牲用白周人以木徳王尚赤大事歛用日出日中白日出赤戎事乗騵牲用騂騂赤色而周禮牧人陽祀騂牲隂祀黝牲望祀各以其方之色牲外祭用厖何也非皆用騂牲尚騂牲而貴之也與此三代之所以不同康子曰唐虞二帝其所尚者何色孔子曰堯以火徳王色尚黄舜以水徳王色尚青王肅謂土家宜尚白土者五行之主王於四季五行用事先起於木色青殷水家宜尚青而尚白者避土家之尚青嗚呼王説穿鑿甚矣使古果有是説則孔子宜具釋康子必請所疑今孔子不言康子不疑而不問者以孔子所言明白無可疑者孔子所言各從其所王之徳次焉言其餘皆為次唯王者所欲尚則尚之别無義也當時語話詳明記者約其言唯曰次焉致後學生疑古記多此類康子曰陶唐有虞夏后殷周獨不得配五帝意者徳不及上古耶將有限乎孔子曰古之平治水土及播殖百穀者衆矣唯勾龍兼食於社而棄為稷神易代奉之無能益者明不可與等故自太皥以降逮於顓頊其應五行而王數非徒五而配五帝是其徳不可以多也命性第五十三魯哀公問曰人之命與性何謂也孔子對曰分於道謂之命形於一謂之性化於隂陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人始生而有不具者五焉目無見不能食不能行不能言不能化及生三月而微煦煦音詡又吁句反煦烝也俗謂之變烝然後有見八月而生齒然後能食期而生臏然後能行三年顖合然後能言十有六而精通然後能化隂窮反陽故隂以陽變陽窮反隂故陽以隂化是以男子八月生齒八嵗而齓女子七月生齒七嵗而齓本作齔义謹初靳二反説文云毁齒也十有四而化少隂之數八少陽之數七二七十四一陽一隂竒耦相配然後道合化成性命之端形於此也人之性命即道而未有知之者故孔子因哀公之問以言之命者性之始虚名爾非有命性之二體也曰分者何也道則一人則衆因人之常情而言自一而散殊故曰分於道自形而言也人與道實未始分也分則異矣何以曰道易曰百姓日用而不知則人之用無非道者分形於至一之中謂之性故性未始不一以一陽一隂竒耦相配謂之道合化成嗚呼聖人之明道如此切的彼不知道與知道之未大明者安知斯妙易曰歸妹天地之大義也又曰男女正天地之大義也昏禮行事必用昏昕所以示隂陽之交天人無二道也人惟動於意慾始邪始淫而失道矣有始必有終者形氣也性命之妙有清明而無生死也曰形於此者於此著明也非形氣之形也惜乎哀公之不能深悟其㫖又不能致疑而發問也孔子曰清明在躬又曰立則見其參於前在輿則見其倚於衡曾子曰皜皜此有所見矣亦可以言形矣而實無體公曰男子十六精通女子十四而化是則可以生民矣而禮男必三十而有室女必二十而有夫也豈不晩哉孔子曰夫禮言其極不是過也男子二十而冠有為人父之端女子十五許嫁有適人之道於此而往則自婚矣羣生閉藏乎隂而為化育之始故聖人因時以合偶男女窮天數霜降而婦功成嫁娶者行焉正嵗夏正九月霜降九者天數之窮又為化育之始因時合偶所以配天也又况婦功是時亦成冰泮而農桑始婚禮而殺於此男子者任天道而長萬物者也易曰乾道成男男即天道顧人自不知天生萬物男子亦生子姓立萬事亦明天人一道知可為知不可為知可言知不可言知可行知不可行者也是故審其倫而明其别謂之知所以効匹夫之聽也王肅曰聽宜為徳女子者順男子之教而長其理者也勞勤而任其理之所當為亦足以長益其家事是故無專制之義而有三從之道幼從父兄既嫁從夫夫死從子言無再醮之端鄭康成曰酌而無酬酢曰醮冠禮醮無酬酢婚禮父醴女而俟迎者不言女有酬酢故曰醮故再嫁謂之再醮與教令不出於閨門事在供酒食而已無閫外之非儀也不越境而奔喪事無擅為行無獨成參知而後動可驗而後言晝不遊庭夜行以火所以効匹婦之徳也參知謂從夫而請於舅姑與孔子遂言曰女有五不取逆家子者亂家子者世有刑人子者遭刑之人有惡徳有惡疾子者慮其氣類相𫝊喪父長子者無父兄主之慮無檢束凡此五不取之意所以謹其始故卒曰重婚姻之始也婦有七出三不去七出者不順父母者無子者淫僻者嫉妬者惡疾者多口舌者竊盗者三不去者謂有所取無所歸與共更三年之喪先貧賤後富貴凡此聖人所以順男女之際重婚姻之始也孔文子第五十四衛孔文子將攻太叔疾文子使太叔出其妻而以女妻之疾誘其初妻之娣為之立宫與文子女如二妻文子怒孔子舎蘧伯玉家就訪焉孔子曰簠簋之事則嘗學之矣兵甲之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥乎孔子之始至衛也靈公夫人南子使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北靣稽首夫人自帷中再拜環珮玉聲璆音求然孔子曰吾鄉為弗見見之禮答焉子路不悦孔子矢之曰予所不者天厭之天厭之衛出公使人問孔子曰寡人之任臣無大小一一自言問觀察之猶復失人何故答曰如君之言此乃所以失之也人既難知非言問所及觀察所盡且人君之慮者多多慮則意不精以不精之意察難知之人宜其有失也君未之聞乎昔者舜臣堯官才任士堯一從之左右曰人君用士當自任耳目而取信於人無乃不可乎堯曰吾之舉舜已耳目之矣今舜所舉人吾又耳目之是則耳目人終無已也君茍付可付則己不勞而賢才不失矣子貢問曰昔孫文子以衛侯哭之不哀知其將為亂不敢捨其重器而行盡寘諸戚而善晉大夫二十人或稱其知何如孔子曰吾知其為罪人未知其為知也子貢曰敢問何謂也子曰食其禄者必死其事孫子知衛君之將不君不念伏死以争而素規去就尸利攜貳非人臣也臣而有不臣之心明君所不赦幸哉孫子之以此免戮也衛孫文子得罪於獻公居戚公卒未葬文子擊鐘焉延陵季子適晉過戚聞之曰異哉夫子之在此猶燕之巢於幕也懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克己服義可謂善改矣齊伐魯季康子使冉求率左師禦之樊遲為右師入齊軍齊軍遁冉有用戈故能入焉孔子聞之曰義也季孫謂冉有曰子之於戰學之乎性逹之乎對曰學之季孫曰從事孔子惡乎學冉有曰即學之孔子孔子大聖無不該文武並用兼通求也適聞其戰法猶未之詳也季孫悦樊遲以告孔子子曰季孫可謂悦人之有能矣南宫説仲孫何忌既除喪而昭公在外未之命也定公即位乃命之辭曰先臣有遺命焉囑家老使二臣必事孔子而學禮以定其位公許之二子學於孔子孔子曰能補過者君子也詩云君子是則是傚孟僖子可則傚矣懲己所病以誨其嗣大雅所謂詒厥孫謀以燕翼子是類也夫昭公如楚孟僖子為介不能相儀又不能荅郊勞故懲己所病誨其嗣使學於孔子孔子前稱季孫此稱孟僖子不以人之悦己崇己為嫌者聖人無己私故也楚靈王汰侈右尹子革侍坐子革鄭丹左史倚相趨而過王曰是良史也子善視之是能讀三墳五典八索九丘對曰夫良史者記君之過揚君之善而此子以潤辭為官不可為良史臣又嘗聞焉昔周穆王欲肆其心將遍行天下使皆有車轍馬跡焉祭公謀父作祈招之詩以止王心王是以獲殁於祇宫春秋傳祇作祗臣問其詩而不知也若問遠焉其焉能知王曰子能乎對曰能其詩曰祈招之愔愔乎春秋𫝊無乎字式昭徳音思我王度式如玉式如金式者發語助辭刑民之力而無醉飽之心王肅曰刑傷民力用之不節無有醉飽之心言無厭足春秋𫝊刑作形王揖而入饋不食寢不寐數日不能自克以及於難孔子讀其志曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱於乾谿子革之非左史所以風也稱詩以諫順哉叔孫穆子避難奔齊宿於庚宗之邑庚宗寡婦通焉而生牛穆子返魯以牛為内豎相家牛讒叔孫二子殺之叔孫有病牛不通其饋不食而死牛遂輔叔孫庻子昭而立之取東鄙三十邑以與南遺昭子既立朝其家衆曰豎牛禍叔孫氏使亂大從殺嫡立庶又披其邑以求舎罪罪莫大焉必速殺之遂殺豎牛孔子曰叔孫昭子之不勞不以立己為功勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺徳行四國順之昭子有焉寛猛第五十五鄭子産有疾謂子太叔曰我死子必為政唯有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛難疾數月而卒太叔為政不忍猛而寛鄭國多盗取人於萑苻之澤苻音蒲太叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盗盡殺之盗少止孔子曰善哉政寛則民慢慢則紏之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和詩云民亦勞止汔許訖反可小康惠此中國以綏四方施之以寛也毋從詭随以謹無良式遏宼虐慘不畏明糾之以猛也柔遠能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百禄是遒和之至也孔子善子太叔能糾之以猛而言則每以寛和始終首言施之以寛次言平之以和又言和之至聖人深慮人之復偏於猛也及子産卒孔子聞之出涕曰古之遺愛也吳伐陳楚昭王曰吾先君與陳有盟不可以不救乃救陳師于城父卜戰不吉卜退不吉王曰然則死也再敗楚師不如死杜預曰前已敗於柏舉今若退還亦是敗棄盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啓申子西結子期啓子閭皆昭王兄五辭而後許將戰王有疾是嵗也有雲如衆赤鳥夾日以飛三日昭王使問諸周太史周太史曰其當王身乎杜預曰日為人君妖氣守之故以為當王身雲在楚上唯楚見之故禍不及他國若禜之可移於令尹司馬王曰除腹心之疾而寘諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂弗禜及昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不徳河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡家語有作在其行作厥道滅而作底滅又曰允出兹在兹由已率常可矣昭王無我唯道義之從略不以死亡為意故曰知大道昭王攻大冥卒于城父子閭退曰君王舎其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也與子西子期謀師閉塗逆越女之子章立之而後還衛孔文子之將攻太叔訪於孔子孔子曰甲兵之事未之聞也退命駕而行文子遽止之將止聖人無意必魯人以幣召之乃歸季孫欲以田賦使冉有訪諸孔子孔子曰丘不識也三發卒曰子為國老待子而行若之何子之不言也孔子不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足此據春秋左𫝊國語云季康子欲以田賦使冉有訪諸仲尼仲尼不對私於冉有曰先王制土籍田以力而砥其遠邇賦里以入而量其有無任力以夫而議其老幼於是乎有鰥寡孤疾有軍旅之出則徵之無則已其嵗收田一井出稯禾秉芻缶米不是過也家語先載國語次載左𫝊首言季康子欲以一井田出法賦焉聘禮十斗曰斛十六斗曰藪十藪曰秉今文藪為逾四秉曰筥四筥曰稯國語韋昭注曰缶庾也引聘禮十六斗曰庾十庾曰秉秉一百六十斛也稯六百四十斛也賈侍中云田一井也周制十六井賦戎馬一匹牛二頭一井之田而欲出十六井之賦昭謂此數甚多似非也下雖云收田一井凡數從夫井起故云井爾且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽春秋哀公十二年用田賦哀公十四年春西狩於大野叔孫氏之車子鉏即鋤字商獲獸如麕而肉角以為不祥以賜虞人冉有以告曰豈天之妖乎孔子曰今何在吾將觀焉遂往謂其御高柴曰若求之言其必麟乎到視之果信魯人聞之乃取之子游問曰飛者宗鳯走者宗麟其難致也敢問今見其誰應之子曰天子布徳將致太平則麟鳯龜龍先為之祥今周宗將滅天下無主孰為來哉遂泣曰予之於人猶麟之於獸也麟出而死吾道窮矣乃歌曰唐虞世兮麟鳯遊今非其時來何求麟兮麟兮我心憂杜預謂反袂拭靣稱吾道窮非事實曰吾無取焉簡則不敢𫝊記固多差訛而簡於此未見其為決然非事實也以衆人而度之則曰何至於泣又曰何為以麟自喻自矜也是安知聖人大公無私樂以天下憂以天下無思無為寂然不動未為得道之全喜怒哀樂如四時之錯行如日月之代明豈衆人之所能識況語子游師弟子至情無偽非言於他人齊陳恒弑其君簡公于舒州孔子三日齊而請伐齊三哀公曰魯為齊弱乆矣子之伐之將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告三子孔子曰以吾從大夫之後不敢不告也君曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也春秋左𫝊公曰子告季孫政在季孫故云論語公曰告夫三子然公必曰并告二子故論語云衛孫桓子侵齊遇敗焉齊人乗之新築人仲叔于奚以其衆救桓子桓子乃免衛人以邑賞仲叔于奚于奚辭請曲縣之樂諸侯軒縣闕其一方其形曲繁纓以朝馬纓見禮器郊特牲謂五采交錯如樊籬歟鄭康成改作鞶周禮巾車作樊許之書在三官王肅云司徒書名司馬書服司空書勲子路仕衛見其故以訪孔子子曰惜也不如多與之邑惟噐與名不可以假人君之所司名以出信信以守器噐以藏禮禮以行義義以生利利以安民政之大節也若以假人與人政也政亡則國家從之弗可止也已樊遲問曰鮑牽事齊君執政不撓可謂忠矣而君刖之其為至闇乎孔子曰古之士國有道則盡忠以輔之無道則退身以避之今鮑莊子食於淫亂之朝不量主之明闇以受大刑是智之不如葵葵猶能衛其足葵傾向日随日以轉子貢問曰晉文公實召天子而使諸侯朝焉夫子作春秋云天王狩于河陽何也孔子曰以臣召君不可以訓亦書其率諸侯事天子而已宰我問君子尚辭乎孔子曰君子以理為尚博而不要非所察也繁辭富説非所聽也唯知者不失理子張問曰禮三十而室昔舜三十徵庸而書云有鰥在下曰虞舜何謂也曩者師聞諸夫子曰聖人在上君子在位則内無怨女外無曠夫堯為天子而有鰥在下何也孔子曰夫男子二十而冠冠而後娶古今通義也舜父頑母嚚莫能圖室家之端焉故逮三十而謂之鰥也詩云娶妻如之何必告父母父母在則宜圖婚若已殁則己之娶必告其廟今舜之鰥乃父母之頑嚚也雖堯為天子其如舜何季桓子問書曰兹予大享于先王爾祖其從與享之何謂也孔子曰古之王者臣有大功死則必祀之於廟所以殊有績勸忠勤也盤庚舉其事以勵其世臣故稱焉桓子曰天子之臣有大功者則既然矣諸侯之臣有大功者可以如之乎孔子曰勞能定國功加於民大臣死難雖食之公廟可也桓子曰其位次如何孔子曰天子諸侯之臣生則有列於朝死則有位於廟其序一也定公問書曰維高宗報上甲微此何謂也孔子對曰此謂親盡廟毁有功而不及祖有徳而不及宗故於每嵗之大嘗而報祭焉所以昭其功徳也公曰先君僖公功徳前行可以與於報乎孔子曰丘聞昔虞夏商周以帝王行此禮者則有矣自此以下未之知也定公問曰周書所謂庸庸祗祗威威顯民何謂也孔子對曰不失其道明之於民之謂也庸庸祗祗威威皆道夫能用可用則正治矣正政也敬可敬則尚賢矣畏可畏則服刑恤矣其可以威畏之者則畏之是慎於用刑是謂恤也君審此三者以示民而國不興未之有也孔子見齊景公梁丘據自外而至公曰何遲對曰陳氏戮其小臣臣有辭焉是故遲公笑而目孔子曰周書所謂明徳慎罰陳子明徳也罰人而有辭非不慎矣孔子對曰昔康叔封衛統三監之地命為孟侯周公以成王之命作康誥焉稱述文王之徳以成勑誡之文其書曰惟乃丕顯考文王克明徳慎罰克明徳者能顯用有徳舉而任之也慎罰者并心而慮之衆平然後行之致刑錯也此言其所任不失徳所罰不失罪不謂己徳之明也公曰寡人不有過言則安得聞君子之教也書曰其在祖甲不義惟王公西赤曰聞諸晏子湯及太甲祖乙武丁天下之大君夫太甲為王居喪行不義同稱大君何也孔子曰君子之於人計功以除過太甲即位不明居喪之禮而干冡宰之政伊尹放之於桐憂思三年追悔前愆起而復位謂之明王以此觀之雖四於三王不亦可乎季桓子以粟千鍾餼夫子夫子受之而不辭既而以頒門人之無者子貢進曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之意乎子曰何也對曰季孫以為惠也子曰然吾得千鍾所以受而不辭者為季孫之惠且以為寵也夫受人之財不以成富與季孫之惠於一人豈若惠數百人哉秦莊子死孟武伯問於孔子曰古者同寮有服乎子曰然同寮有相友之義貴賤殊等不為同官聞諸老耼昔者虢叔閎夭太顛散宜生南宫括五臣同寮比徳以賛文王及虢叔死四人者為之服朋友之服古之逹禮者行之也公父文伯死室人有從死者其母怒而不哭相室諫之其母曰孔子天下之賢人也不用於魯退而去是子素宗之而不能随今死而内人從死者二人焉若此於長者薄於婦人厚也既而夫子聞之曰季氏之婦尚賢哉子路愀然曰夫子亦好人之譽已乎夫子死而不哭是不慈也何善爾子曰怒其子之不能随賢所以爲尚賢者吾何有焉其亦善此而已矣孔子適齊齊景公讓登夫子降一等景公三辭然後登既坐曰夫子降徳辱臨寡人寡人以為榮而降階以遠自絶於寡人未知所以為罪孔子對曰君惠顧外臣君之賜也然以匹夫敵國君非所敢行也雖君私之其若義何孔子使宰我使于楚楚昭王以安車象飾因宰我以遺孔子焉宰我曰夫子無以此為也王曰何故對曰自臣侍從夫子以來竊見其言不離道動不違仁貴義尚徳清素好儉仕而有禄不以為積不合則去退無吝心妻不服綵妾不衣帛車器不彫馬不食粟道行則樂其治不行則樂其身此所以為夫子也若夫觀目之靡麗窈窕之淫音夫子過之弗之視遇之弗之聽也故臣知夫子之無用此車也王曰然則夫子何欲而可對曰方今天下道徳寢息其志欲興而行之天下誠有欲治之君能行其道則夫子雖徒歩以朝固猶為之何必遠辱君之重貺乎王曰乃今而後知孔子之徳也大矣宰我歸以告孔子子曰二三子以予之言何如子貢對曰未盡夫子之美也夫子徳高則配天深則配海若予之言行事之實也子曰夫言貴實使人信之舎實何稱乎是賜之華不若予之實也顔讎善事親子路義之後讎以非罪執於衛將死子路請以金贖之衛人將許之既而二三子納金於子路以入衛或謂孔子曰受人之金以贖其私昵義乎子曰義而贖之貧取於友非義而何愛金而令不辜陷辟凡人且猶不忍況二三子於由之所親乎詩云如可贖兮人百其身茍出金可以生人雖百倍古人不以為多故二三子行其欲由也成其義非女之所知也孔子適衛衛將軍文子問曰吾聞魯公父氏不能聽獄信乎孔子曰不知其不能也夫公父之聽獄有罪者懼無罪者耻文子曰有罪者懼是聽之察刑之當也無罪者耻何乎孔子曰齊之以禮則民耻矣刑以止刑則民懼矣文子曰今齊之以刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也以刑齊民譬之於御則鞭也執轡於此而動於彼御之良也無轡而用策則馬失道矣文子曰以御言之右手執轡左手運䇿不亦速乎若徒轡無䇿馬何懼哉孔子曰吾聞古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛於禮而薄於刑故民從命今也廢禮而尚刑故民彌暴文子曰吳越之俗無禮而亦治何也孔子曰夫吳越之俗男女無别同川而浴民輕相犯故其刑重而不勝由無禮也中國之教為内外以别男女異噐服以殊等類故其民篤而法其刑輕而勝由有禮也孔子曰民之所以生者衣食也上不教民民匱其生飢寒切於身而不為非者寡矣故古之於盜惡之而不殺也今不先其教而一殺之是以罰行而善不反刑張而罪不眚夫赤子知慕其父母由審故也況乎為政興其賢而廢其不賢以化民乎知審此二者則上盜先息子張問曰書云兹殷罸有倫何謂也孔子曰不失其理之謂也今諸侯不同徳每君異法折獄無倫以意為限是故知法之難子張曰古之知法者與今之知法者異乎孔子曰古之知法者能遠獄今之知法者不失其罪不失其罪其於恕寡矣能遠於獄其於防深矣寡恕近乎濫防深治乎本書曰惟敬五刑以成三徳言敬刑所以為徳也書曰非從惟從孔子曰君子之於人也有不語也無不聽也況聽訟乎必盡其辭聽訟者或從其情或從其辭辭不可從必斷以情書曰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚灾適爾既道極厥辜時乃不可殺曾子問聽獄之術孔子曰其大法有三焉治必以寛寛之之術歸於察察之之術歸於義是故聽而不寛是亂也寛而不察是慢也察而不中義是私也私而民怨故善聽者聽不越辭辭不越情情不越義書曰上下比罰亡僭亂辭仲弓問書曰哀矜折獄何謂也孔子曰古之聽訟者察貧賤哀孤獨及鰥寡老弱不肖而無告者雖得其情必哀矜之死者不可生斷者不可屬若老而刑之謂之悖弱而刑之謂之克不赦過謂之逆率過以小罪謂之枳音咫説文開也猶濫歟故宥過赦小罪老弱不受刑先王之道也書曰大辟疑赦又曰與其殺不辜寧失不經子張問書曰若保赤子聽訟可以若此乎孔子曰可哉古之聽訟者惡其意不惡其人求所以生之不得其所以生乃刑之君必與衆共焉愛民而重棄之也今之聽訟者不惡其意而惡其人求所以殺是反古之道也孟氏之臣叛武伯問孔子曰如之何子曰臣人而叛天下所不容也其將自反子姑待之三旬果自歸孟氏武伯將執之訪於夫子子曰無也子之於臣禮意不至是以去子今其自反罪以反除又何執焉子修禮以待之則臣去子將安徃武伯乃止夫子閒居喟然而嘆子思再拜請曰意子孫不修將忝祖乎羡堯舜之道恨不及乎子曰爾孺子安知吾志子思對曰伋於進膳亟聞夫子之教其父析薪其子弗克負荷是謂不肖伋每思之所以大恐而不懈也夫子忻然笑曰然乎吾無憂矣世不廢業其克昌乎道徳非外惟好學不懈而已矣書云后克艱臣克艱政乃乂民敏徳子思問曰為人君者莫不知任賢之逸也而不能用賢何故子曰非不欲也所以官人失能者由不明也其君以譽為賞以毁為罰賢者不居焉子思問曰亟聞夫子之詔正俗化民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰堯舜之化百世不輟仁義之風遠也管仲任法身死則法息嚴而寡恩也若管仲之知足以定法材非管仲而專任法終必亂成矣哀公使以幣如衛迎孔子而卒不能當故夫子作丘陵之歌曰登彼丘陵峛崺其阪峛崺山卑長也或作邐迤音同仁道在邇求之若遠遂迷不復自嬰屯蹇喟然囘慮題彼泰山題其􅂒之訛歟視也􅂒音悌鬱確其高梁甫囘連枳棘充路言天下宵人欲用事如枳棘充路陟之無縁將伐無柯患兹蔓延賢如晏子子西猶以私不以公而況於他乎程子華故深責晏子惟以永嘆涕霣潺湲霣音隕説文雨也孔子弟子梁鱣字叔魚年三十未有子欲出其妻商瞿謂曰昔吾年三十八無子吾母為吾更取室夫子使吾之齊母欲請留夫子曰無憂也瞿過四十當有五子今果然吾恐子自晚生耳未必妻之過從之二年而有子叔仲㑹魯人字子期少孔子五十嵗與孔璇年相比執筆記事於夫子二人迭侍左右孟武伯見孔子曰此二孺子之幼也於學豈能識於壯哉孔子曰然少成則若性也習慣若自然也齊太史子與適魯見孔子孔子與之言道子與悦曰聞子之名不覩子之形乆矣乃今而後知泰山之為高淵海之為大惜乎夫子之不逢明王道徳不加於民而將垂寳以貽後世退而謂南宫敬叔曰今孔子先聖之嗣自弗父何以來世有徳讓天所祚也孔子生於衰周先王典籍錯亂無紀乃論百家之遺記考正其義祖述堯舜憲章文武刪詩述書定禮理樂制作春秋讃明易道垂後為法文徳著矣凡所教誨三千餘人或者天欲素王之乎夫何其盛也敬叔曰殆如吾子之言吾聞聖人之後而非繼世之統其必興者焉今孔子之道至矣乃將施之無窮雖欲辭天之祚故未得耳子貢聞之以二子之言告孔子子曰豈若是哉亂而治之滯而起之自吾志天何與焉孔子明此心即道道者天人之所同而二子乃求諸外魯哀公十有六年夏左氏傳四月己丑孔子卒杜預注云四月十八日乙丑無己丑己丑五月十二日然一行謂長厯多差孔子蚤作負手曵杖曵杖則手背而向後矣故曰負消揺於門歌曰泰山其頽乎梁木其壊乎哲人其萎乎萎紆危反既歌而入當户而坐子貢聞之曰泰山其頽則吾將安仰梁木其壊哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賔主夾之也周人殯於西階之上則猶賔之也而丘也殷人也予疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗予予殆將死也葢寢疾七日而没孔子之喪有自燕來觀者舎於子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉昔者夫子言之曰吾見封之若堂者矣見若坊者矣見若覆夏屋者矣見若斧者矣從若斧者焉鄭康成云封築土為壟堂形四方而高坊形旁殺乎上而長夏大也鄭止謂門廡未安覆夏屋下廣而上鋭斧則下不廣而上鋭夫子從若斧者取其易成而難登歟其狀似馬鬛馬鬛封之謂也今一日而三斬板而已封尚行夫子之志乎哉先聖大訓卷六
