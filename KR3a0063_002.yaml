body:
  text: 先聖大訓卷二宋楊簡撰問冠第十邾隱公既即位將冠使大夫因孟懿子問禮於孔子子曰其禮如世子之冠冠於阼者以著代也東序為阼以明代父醮於客位加其有成鄭康成謂戶西為客位蓋本於士冠禮既冠則筵于戶西而醴孔子曰雖天子之元子猶士也其禮無變三加彌尊導諭其志每加皆有祝辭冠而字之敬其名也雖天子之元子猶士也其禮無變天下無生而貴者故也行冠事必於祖廟以祼享之禮以將之祼灌鬯也以金石之樂節之世子冠禮與士同唯祼享金石樂異故特言於其末所以自卑而尊先祖示不敢擅也懿子曰天子未冠即位長亦冠乎孔子曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有懿子曰然則諸侯之冠異天子與孔子曰君薨而世子主喪是亦冠也己人君無所殊也懿子曰今邾君之冠非禮也孔子曰諸侯之有冠禮夏之末造也有自來矣今無譏焉天子冠者武王崩成王年十有三而嗣立周公居冢宰攝政以治天下明年夏六月既葬冠成王而朝于祖以見諸侯亦為君也周公命祝雍作頌辭曰使王近於民遠於年遠長也祝其壽嗇於時嗇惜也惜時言勤於進德惠於財財者人之所嗇今使惠以及人親賢而任能其頌曰令月吉日王始加元服元首也去王幼志心服衮職舜曰豫欲觀古人之象日月星辰山龍華蟲作繪宗彝藻火粉米黼黻絺繡以五采彰施于五色作服是為十二章周升三辰於旗而衮九章司服云公之服自衮冕而下如王之服鄭康成謂周衮九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻絺以為繡則衮之衣五章裳四章康成唯言其名不言其義諸儒皆無説夫以大舜之聖猶使禹明其義則後世學者奚敢遽言然此云心服衮職則其義不可以不明人心即道故書曰道心此道聖愚之所同有百姓之所日用學者不明乎道無以修身無以事君無以輔君而行道簡姑以所覺略言之道心無體變化無方而利澤萬物龍似之雖變化云為而實寂然不動山靜止而生物似之由是心而發諸禮樂政事焕乎其有文章華蟲似之徒質而無文非道之全火之明象道心之照用火之溫燠象道心之惠和民非水火不生活火能熟物以養民象道心之惠養萬物宗廟之彝尊象道心之孝德藻其以水之難形容姑為藻以寓其象歟水之為德至矣水流行不息而無心焉清明洞徹而潤澤萬物實象道心之妙米以養人君之所以養人者常患乎不溥博粉而散之則所被廣矣黼為斧形鐵黑而刃白如道心之剛斷當斷不斷反受其亂剛雖非道之所尚而亦道之所有徒柔而無剛亦足召亂是剛是斷匪生於私匪動於意此心明照當斷自斷如雷如霆西色白北色黑二者之間乾卦序焉有天道之象威斷不可出於人為當同天道黻形如兩己相背其色半黑半青北黑東青東北艮位萬物之所成終成始是為冬春之際一歲之分象道心之辨察是是非非也自夏后氏而上建寅周雖建子猶兼用夏時日正歲衮職如此奚可不心服之服事也當從事乎斯道也周雖升三辰於旗其在旗猶在服也九章即十二章之道也夫道一而已矣舜起於畎畝雖未詳明其義而舜之道心已明矣敘陳其義舜必心合而首肯欽若昊天六合是式率爾祖考永永無極此周公之制也懿子曰諸侯之冠其所以為賔主何如孔子曰公冠則以卿為賔無介公自為主迎賔揖升自阼立于席北其醴也則如士饗之以三獻之禮既醴降自阼諸侯非公而自為主者其所以異皆降自西階玄端與皮辨異朝服素韠士冠禮始加緇布冠服玄端再加皮辨服三加爵辨服醴畢冠者降自西階此曰異朝服素韠者謂異於士朝服公衮侯伯鷩子男毳皆素韠不加爵辨服公冠四加玄冕祭王肅云著祭服玉藻諸侯玄端以祭裨冕以朝玉藻玄端以祭祭先君也此加玄冕祭服裨冕祭於王之服也雜記大夫冕而祭於公辨而祭於已則知公助祭於王必非玄端簡謂玄冕在衮冕之下在四加之中爾三加玄冕四加衮冕與末特言公冠四明唯此與諸侯異及前所言降自阼其酬幣于賔則束帛乘馬王太子庶子之冠擬焉擬其酬賔束帛乘馬之禮皆天子自為主其禮與士無變饗食賔也皆同大戴禮記公冠篇公冠自為主迎賔揖升自阼立于席北既醴降自阼其餘自為主者其降也自西階以異其餘皆與公同也公玄端與皮辨皆韠朝服素韠公冠四加玄冕饗之以三獻之禮無介無樂皆玄端其酬幣朱錦采四馬其慶也同太子擬焉太子與庶子其冠皆自為主其禮與士同其饗賔也皆同大戴禮記是篇不言孔子孟懿子問答其甚異者太子庶子冠皆自為主夫冠禮既行之於廟則天子自為主也宜火戴所記其後世尊君卑臣之習改雜於其間歟懿子曰始冠必加緇布之冠何也孔子曰示不忘古太古冠布齊則緇之其緌也吾未之聞鄭云緌纓飾太古質蓋無飾白布冠今之喪冠禮喪冠不緌纓之餘垂者曰緌今則冠而敝之可也懿子曰三王之冠其異何也孔子曰周辨殷冔夏收一也三王共皮辨素積委貌周道也章甫殷道也母追夏后氏之道也鄭云辨名出於槃槃大也冔名出於幠幠覆也收言所以收斂髮也其制之異未聞委猶安也言所以安正容貌母發聲也追猶堆也以形名之其制之異同未聞章文明也甫美也大也釋氏語無或作謨今閩音亦然史記帝堯黃收純衣虞夏因之歟鄭云皮辨者以白鹿皮為冠積猶辟也以素為裳質素象道故三王不變廟制第十一衛將軍文子將立先君之廟於其家使子羔訪於孔子子曰公廟設於私家非古禮之所及吾弗知子羔曰敢問尊卑上下立廟之制可得而聞乎孔子曰天下有王分地建國設祖宗乃為親踈貴賤多少之數是故天子七廟三昭三穆與太祖之廟而七太祖近廟皆月祭之遠廟為祧有二祧焉享嘗乃止諸侯五廟二昭二穆與太祖之廟而五曰祖考廟享嘗乃止大夫三廟一昭一穆與太祖之廟而三曰皇考廟享嘗乃止士一廟曰考廟王考無廟合而享嘗乃止庶人無廟四時祭於寢此自有虞以至于周之所不變也凡四代帝王之所謂郊者皆以配天其所謂禘者皆五年大祭之所及也太祖其廟不毁不及太祖雖在禘郊其廟則毁古者祖有功而宗有德非謂有功者無德謂其以功著也創始者必有功謂之祖宗者其廟皆不毁子羔問曰祭典云昔有虞氏祖顓頊而宗堯夏后氏亦祖顓頊而宗禹此謂夏后氏殆啓以後若禹之時則往往宗舜殷人祖契而宗湯周人祖文王而宗武王此四祖四宗或乃異代或其考祖之有功德其廟可也若有虞宗堯夏祖顓頊皆異代之有功德者也亦可以存其廟乎大戴記帝繫篇黃帝産玄囂玄囂産蟜極蟜極産高辛是謂帝嚳帝嚳産放勳是謂帝堯黃帝産昌意昌意産高陽是謂帝顓頊顓頊産鯀鯀産文命是謂禹顓頊産窮蟬窮蟬産敬康敬康産句芒句芒産蟜牛蟜牛産瞽叟瞽叟産重華是為帝舜據此帝繫所載則堯舜皆雖本於黃帝而異支闊遠則亦可以言異代至於謂顓頊産鯀鯀産禹則正其祖非異代而此子羔所問孔子所答乃為異代何耶又家語宰我問禹孔子曰高陽之孫鯀之子也史記亦本此文然則必有一是一非簡觀家語宰我所問黃帝顓頊帝嚳堯舜禹一篇大有可疑言旨殊覺淺陋殆非孔子之言謂帝舜承受大命依于二女淺陋太甚家語此類亦多然則謂禹為高陽之孫未可遽謂孔子之言故闕不敢録録此子羔所問孔子所答司馬遷亦謂帝繫姓儒者或不傳此千古同然之心也況姑據帝繫自顓頊六世而後及舜而又謂顓頊生鯀鯀生禹世次長短斷斷乎非矣孔子曰善如女所問也如殷周之祖宗其廟可以不毁其他祖宗者功德不殊雖在殊代亦可以無疑矣詩云蔽芾甘棠勿翦勿伐召伯所憩周人之於召公也愛其人猶敬其所舍之樹况祖宗其功德而可以不尊奉其廟與曾子問第十二曾子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南太祝裨冕執束帛升自西階盡等不升堂命毋哭祝聲三告曰某之子生敢告鄭云聲噫歆警神也某夫人之氏也升奠幣于殯東几上哭降衆主人卿大夫士房中皆哭不踊鄭云衆主人君之親也房中婦人也盡一哀反位遂朝奠鄭云反朝夕哭位小宰升舉幣三日衆主人卿大夫士如初位北面太宰太宗太祝皆裨冕少師奉子以衰祝先子從宰宗人從入門哭者止子升自西階殯前北面祝立于殯東南隅祝聲三曰某之子某從執事敢見子拜稽顙哭鄭云奉子者拜哭祝宰宗人衆主人卿大夫士哭踊三者三降東反位皆袒子踊房中亦踊三者三襲衰杖鄭云踊襲衰杖成子禮也奠出太宰命祝史以名遍告于五祀山川鄭云因負子名之喪於禮略也曾子問曰如已葬而世子生則如之何孔子曰太宰太宗從太祝而告于禰三月乃名于禰以名遍告及社稷宗廟山川未葬不告宗廟宗廟同哀可略也不告社稷殆闕文也諸儒曲説不通葬後不言五祀其告甚明不言可知孔子曰諸侯適天子必告于祖奠于禰鄭云皆奠幣以告之互文也鄭説殆未安孔子繼曰凡告用牲幣鄭又云牲字誤當為制幣鄭蓋以覲禮侯氏釋幣于禰不言牲故也不思覲禮者當時所行之禮孔子所言垂教於萬世之禮亦猶相司徒敬子之喪多變禮答顏子為邦之問曰行夏時乘商輅舞韶樂康成於禮學雖詳博惟不知道率多牽合奠之為義何止於幣於祖言告於禰言奠非不告于禰也尊無二上既告于祖則次乃告禰告不主于禰也故特曰奠以明斯義祖言告則奠可知矣繼言凡告用牲幣明凡告皆奠况卿大夫出聘猶釋幣于禰則國君宜加牲事理甚明康成信覲禮而疑孔子之言不可冕而出視朝命祝史告于社稷宗廟山川乃命國家五官而後行道而出鄭云祖道也聘禮記出祖釋軷祭酒脯告者五日而遍過是非禮也凡告用牲幣反亦如之諸侯相見必告于禰下言反必親告于祖禰此不及祖非略於祖其適諸侯之禮當略也朝服而出視朝命祝史告于五廟所過山川既親告于禰則命祝史所告實四廟而曰五廟者慮或者以為其禮殺而不遍告五廟也亦命國家五官道而出反必親告于祖禰乃命祝史告至于前所告者而後聽朝而入曾子問曰並有喪如之何何先何後孔子曰葬先輕而後重其奠也先重而後輕禮也自啓及葬不奠行葬不哀次反葬奠而後辭於殯遂修葬事鄭云殯當為賔聲之誤也辭於賔謂告將葬啓期也康成每輕於改經文康成惟據既夕禮既夕哭請啓期告于賔及夙興設陳之後商祝升西階聲三啓三而已不聞有辭故改曰辭于賔不思夫先輕後重乃變禮不可執常禮以論其反葬也奠于室而後辭于殯其辭告以輕喪之既葬今將啓歟凡禮皆緣情而制若夫既奠而告賔以啓期乃禮之常奚以特言為况葬光輕後重孔子於此不言並卜二日則至是始當卜後葬之日豈得遽告啓期也哉使卜先葬之時並卜二日無乃不專敬乎使先葬者雨不克則後葬之日尤難預卜况孔子初無並卜之文今定從經文不改其先葬自啓及葬不奠者以盛奠不可特及其輕而遺重也今反葬其重則奠如常孔疏云行葬不哀次者次謂大門外之右平生待賔之處葬柩車出門至此孝子悲哀柩車暫停今為父喪在殯故行葬母之時出門外孝子不得為母伸哀於所次之處遂行而去其虞也先重而後輕禮也孔子曰宗子雖七十無無主婦非宗子雖無主婦可也曾子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何鄭云冠者賔及贊者孔子曰內喪則廢外喪則冠而不醴徹饌而掃即位而哭如冠者未至則廢如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠於此當有曾子曰闕文與除喪不改冠乎孔子曰天子賜諸侯大夫冕辨服於大廟歸設奠服賜服於斯乎有冠醮無冠醴冠禮以醴為正若不醴則醮用酒鄭云服此賜服酌用酒尊賜也不醴明不為改冠皇云謂諸侯及大夫幼弱天子賜之孔疏云此孔子引類答不答改冠諸侯幼弱未冠總角從事因朝天子天子賜冕辨服於天子大廟之中歸設奠於已宗廟服此賜服不改冠也郊特牲云無大夫冠禮而有其昏禮古者五十而後爵何大夫冠禮之有然則今賜大夫冠服衰世之禮也雖衰世之禮而不改冠合於義故孔子取焉父沒而冠則已冠掃地而祭於禰已祭而見伯父叔父而後饗冠者曾子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬於賔賔弗舉禮也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也曾子問曰大功之喪可以與於饋奠之事乎孔子曰豈大功耳自斬衰以下皆可禮也曾子曰不以輕服而重相為乎疑輕已喪服而重其相為孔子曰非此之謂也天子諸侯之喪斬衰者奠大夫齊衰者奠士則朋友奠不足則取於大功以下者不足則反之反之者謂執一事已反而再執事曾子問曰小功可以與於祭乎孔子曰何必小功耳自斬衰以下與祭禮也曾子曰不以輕喪而重祭乎孔子曰天子諸侯之喪祭也不斬衰者不與祭大夫齊衰者與祭士祭不足則取於兄弟大功以下者曾子問曰相識有喪服可以與於祭乎孔子曰緦不祭又何助於人曾子問曰廢喪服可以與於饋奠之事乎孔子曰説衰與奠非禮也以擯相可也鄭云執事於人之神為其忘哀疾也鄭説殊未安禮三年之喪祥則可以鼓琴可以笙歌謂與奠為忘哀疾甚非禮意禮惟有服及朋友與奠今相識非朋友故曰非禮擯相則輕矣故可曾子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母鄭云父使人弔之辭云某子聞某之喪某子使某如何不淑母則若云宋蕩伯姬聞薑氏之喪伯姬使某如何不淑父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而後嫁之禮也女之父母死壻亦如之曾子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服於外次女入改服於內次然後即位而哭曾子問曰除喪則不復昏禮乎孔子曰祭過時不祭禮也又何反於初孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭於禰成婦之義也曾子問曰女未廟見而死則如之何孔子曰不遷於祖不袝於皇姑壻不杖不菲不次歸葬於女氏之黨菲扶義反示未成婦也曾子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之曾子問曰喪有二孤廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也喪之二孤則昔者衛靈公適魯遭季桓子之喪衛君請弔哀公辭不得命公為主客入弔康子立於門右北面公揖讓升自東階西鄉客升自西階弔公拜興哭康子拜稽顙於位有司弗辨也今之二孤自季康子之過也考春秋魯哀公二年衛靈公卒三年秋七月季孫斯卒蓋桓子康子即位然則非靈公乃出公也傳録之誤曾子問曰古者師行必以遷廟主行乎孔子曰天子巡狩以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣當七廟五廟無虛主虛主者唯天子崩諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而後主各反其廟君去其國太宰取羣廟之主以從禮也祫祭於祖則祝迎四廟之主主出廟入廟必蹕老聃云曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而後就舍反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也子遊問曰諸侯之世子喪慈母如母禮歟孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有昔魯孝公少喪其母有慈母良及其死也公弗忍也欲喪之孔子家語魯孝公小戴記作魯昭公按昭公居喪而不哀在戚而有嘉容比及葬三易衰年十九而即位猶有童心則安能不忍於慈母即位十一年其母齊歸始薨則公已年三十矣不為少鄭康成亦謂必非昭公康成未見家語有司曰禮國君慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以示後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯孝公始也曾子問曰諸侯旅見天子入門不得終禮廢者幾孔子曰四請問之曰太廟火日食后之喪雨霑服失容則廢如諸侯皆在而日食則從天子救日各以其方色與其兵太廟火則從天子救火不以方色與兵周禮有救日之弓是射以救之也日有食之隂侵陽也然則射其所食之方之隂也凡兵皆攻其所食之方之隂也夫隂氣之食日疑非人力之所能救而古先聖王不廢斯禮知其有此理也三才同此一氣此感則彼應不明者以為遠不相及明者信其相應之速君德不善故日食亦猶腹心有疾疾見首面天子之於日食也誠能知過痛改則已足以感天地之和氣而又率諸侯諸臣以兵救之則隨兵所指隂邪退伏陽光亟復實有此理天者吾之陽地者吾之隂日亦吾之陽月亦吾之隂此心無體天地日月皆在吾範圍之中何遠何近各以方色者以五色五行之和氣正氣感天地不和不正之氣為和為正也救火不以方色與兵者火人也當以人事救不可以氣感也曾子問曰諸侯相見揖讓入門不得終禮廢者幾孔子曰六請問之曰天子崩太廟火日食后夫人之喪雨霑服失容則廢曾子問曰天子嘗禘郊社五祀之祭簠簋既陳天子崩后之喪如之何孔子曰廢曾子問曰當祭而日食太廟火其祭也如之何孔子曰接祭而已矣鄭云不迎尸如牲至未殺則廢天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啓至于反哭五祀之祭不行已葬而祭祝畢獻而已唯五祀之祭不行則郊社之祭山川及餘羣神之祭行故王制曰喪三年不祭唯祭天地社稷為越紼而行事不敢廢大祀也唯宗廟不祭天子崩諸侯薨祝取羣廟之主藏諸太廟禫月雖吉祭猶未配則三年不祭宗廟甚明餘祭非盡廢也唯殺禮耳既葬漸吉故至於獻祝畢曾子問曰諸侯之祭社稷俎豆既陳聞天子崩后之喪君薨夫人之喪如之何孔子曰廢自薨至于殯自啓至于反哭奉帥天子謂上所言五祀之祭曾子問曰大夫之祭鼎俎既陳籩豆既設不得成禮廢者幾孔子曰九請問之曰天子崩后之喪君薨夫人之喪君之太廟火日食三年之喪齊衰大功皆廢外喪自齊衰以下行也其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣室中之事謂賔長獻士之所以異者緦不祭所祭於死者無服則祭曾子問曰三年之喪弔乎孔子曰三年之喪練不羣立不旅行君子禮以飾情三年之喪而弔哭不亦虛乎曾子問曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服於身不敢私服又何除焉於是乎有過時而弗除也君之喪服除而後殷祭禮也曾子問曰父母之喪弗除可乎孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過於制也故君子過時不祭禮也觀此節辭旨殆承上文勿字疑後人觀之不審者加之上言有君不敢除私服至君服除雖殷祭終不備除喪之禮曾子以父母之喪至重疑不可不再行除喪之禮孔子答以過時弗舉又曰過時不祭皆以明除喪之時已過則不復行除喪之禮曾子問曰君薨既殯而臣有父母之喪則如之何孔子曰歸居于家有殷事則之君所朝夕否曰君既啓而臣有父母之喪則如之何孔子曰歸哭而反送君曰君未殯而臣有父母之喪則如之何孔子曰歸殯反于君所有殷事則歸朝夕否大夫室老行事士則子孫行事大夫內子有殷事亦之君所朝夕否賤不誄貴幼不誄長禮也唯天子稱天以誄之鄭云纍列生時行迹讀之以作諡諡當由尊者成春秋公羊説天子讀誄制諡於南郊諸侯相誄非禮也曾子問曰君出疆以三年之戒以椑從椑蒲歷反君薨其入如之何孔子曰共殯服服事也凡殯事咸共之以待鄭云謂已大斂則子麻辨絰疏衰菲杖菲扶畏反禮殯後方成服此未成服之服也疏衰齊衰之衰不言裳舉其略也鄭謂布深衣未必然也菲草屨也杖輔病也鄭云麻辨絰者布辨而加環絰也入自闕升自西階毁垣而入者重君喪備重棺扶護者衆欲寬便也其葬也亦毁宗躐行升自西階者已大斂已成喪正尊者之位也殯于西階之上尊之也尊者居室常東面為人子者居不主奧奧室中之西南隅也親居室奧而面東故人子不敢居奧其在堂則主人升降自阼階賔升降自西階者尊賔也如小斂則子免而從柩鄭云不括髮者行遠不可無飾入自門升自阼階士喪禮尸在柩則已大斂此在柩而未為大斂者國君重棺未備則猶未為大斂歟未備重棺故可不毁牆垣而自門入升自阼階者未大斂未成喪未忍遽以死事之也君大夫士一節也曾子問曰君之喪既引聞父母之喪如之何孔子曰遂既封而歸不俟子封謂實土而崇之也鄭改讀為窆非也蓋因檀弓篇縣棺而封康成不善屬文謂縣棺而窆窆而後封土故注云封當為窆不知言縣棺則窆可知已康成不善屬文每每而見子嗣君也曾子問曰父母之喪既引及塗聞君薨如之何孔子曰遂既封改服而往曾子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏音墮祭不配鄭云皆辟正主厭厭飫神也尸謖之後徹薦俎敦設于西北隅是也但鄭又謂迎尸之前祝酌奠奠之且饗為隂厭未安豈有迎尸之前一奠而遂可為厭飫乎蓋誤認孔子隂厭陽厭之説而差其義也下曾子問曰祭必有尸乎若厭祭亦可乎曾子之旨謂尸謖之後設俎敦于西北隅是為厭祭是無尸故云也孔子曰祭殤必厭蓋弗成也孔子之旨謂殤不成喪故祭必無尸如厭也孔子又曰有隂厭有陽厭宗子為殤而死其祭是謂隂厭已祭宗子之殤於奧奧西南隅幽奧不當室之白故曰隂也凡殤與無後者祭於宗子之家當室之白是為陽厭孔子於此所謂隂厭陽厭皆謂無尸為厭非謂迎尸之前未厭飫之時為厭也鄭因迎尸之前祝酌奠奠之之時無尸亦比於隂厭則差其義矣不旅不旅酬也假者嘏字之訛也蠟賔篇是謂大假亦嘏字之訛也此不假不嘏主人也綏者妥字之訛妥者墮之音而字非也士虞禮祝命佐食墮祭周禮曰既祭則藏其墮鄭謂下祭曰墮士虞禮記無尸則不綏祭鄭注亦云綏當作墮特牲饋食禮祝命挼祭又云佐食授妥祭少牢饋食禮皆作綏祭皆轉而訛異皆本於墮也不配不言以某妃配某氏皆辟正主不敢備禮也布奠於賔賔奠而不舉鄭云布奠謂主人酬賔奠觶于薦北賔奠謂取觶奠於薦南也此酬之始也奠之不舉止旅不歸肉鄭云肉俎也謂與祭者留之共燕其辭于賔曰宗兄宗弟宗子在他國使某辭此辭謂其初宿賔及此不敢歸肉而留燕皆有辭辭不同故總曰辭曾子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而為壇以時祭若宗子死告於墓而後祭於家宗子死稱名不言孝身沒而已鄭云至子可以稱孝子遊之徒有庶子祭者以此若義也今之祭者不首其義故誣於祭也曾子問曰祭必有尸乎若厭祭亦可乎孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取於同姓可也祭殤必厭蓋弗成也祭成喪而無尸是殤之也孔子曰有隂厭有陽厭曾子問曰殤不祔祭何謂隂厭陽厭鄭云祔當為備聲之誤也雜記云有父母之喪尚功衰而祔兄弟之喪則練冠附於殤稱陽童某甫不名神也考此則鄭説誠有理然古書異同或難牽合冠禮有醴不醴昏禮有親迎不親迎祭禮有尸有無尸喪禮或曰嫂叔無服或曰夫之所為兄弟服妻降一等禮有古今之異俗有彼此之殊不可必也喪服小記殤與無後者從祖祔食豈殤唯從祖祔食不特設祔祭歟殤不祔祭是為禮略何謂隂厭陽厭疑其説之反詳也孔子答以宗子為殤而死其祭謂隂厭隂以居奧不當室白也厭者無尸之稱也其非宗子而殤與無後者祭於宗子之家則不於奧當室之白故謂陽厭宗子殤死不告利成則不改饌西北隅不為厭飫此則謂隂厭者言其無尸故曰厭非謂厭飫也其謂陽厭亦然鄭因曾子之問遂曲推迎尸之前為隂厭殊為贅辭孔子曰宗子為殤而死庶子弗為後也其吉祭特牲祭殤不舉無肵俎無玄酒不告利成鄭云舉肺脊是謂隂厭釋見上凡殤與無後者祭於宗子之家當室之白不於奧尊于東房是謂陽厭曾子問曰葬引至于堩日有食之堩古鄧反則有變乎且不乎鄭云堩道也變謂異禮孔子曰昔者吾從老聃助葬於巷黨及堩日有食之老聃曰丘止柩就道右止哭以聽變既明反而後行曰禮也反葬而丘問之曰夫柩不可以反者也日有食之不知其己之遲數則豈如行哉鄭云已止也數讀為速按醫書遲數數音朔義猶速也又哀公問禮疏數數猶近也亦音朔然則亦不必改讀矣老聃曰諸侯朝天子見日而行逮日而舍奠鄭云舍奠每將舍奠行主大夫使見日而行逮日而舍夫柩不蚤出不莫宿見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也且君子行禮不以人之親痁患吾聞諸老聃云曾子問曰為君使而卒於舍禮曰公館復私館不復凡所使之國有司所授舍則公館已何謂私館不復也孔子曰善乎問之也自卿大夫士之家曰私館公館與公所為曰公館公館復此之謂也凡公所造為之宇舍雖非賔客之正館或以賔多而館焉亦曰公館公館無所嫌惡故可以行臯某復之禮卿大夫士之家則有妨嫌故不敢復曾子問曰下殤土周葬于園遂輿機而往塗邇故也鄭云土周堲周也周人以夏后氏之堲周葬下殤於園中機輿尸之牀也以繩絙其中央又以繩從兩旁鈎之禮以機舉尸輿之以就園而斂葬今墓遠則其葬也如之何孔子曰吾聞諸老聃曰昔者史佚有子而死下殤也墓遠召公謂之曰何以不棺斂於宮中史佚曰吾敢乎哉不敢違禮召公言於周公周公曰豈不可聖人達禮之道故能變以從宜史佚行之下殤用棺衣棺自史佚始也鄭康成謂史佚失指康成固矣康成失指非史佚失指史佚豈輕率而行者使孔子以為非禮則當曰下殤之不復輿機于園自史佚始也辭情無譏意禮緣人情豈有墓遠而可以不棺斂輿尸而往乎周公曰豈不可亦猶孔子曰祭哉曾子問宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉哉者猶豫審度而決之辭禮所未有聖人以道心起義從容審度而決故其辭情如此康成不知道又不善屬文屢見康成有此蔽今不取曾子問曰卿大夫將為尸於公受宿矣而有齊衰內喪則如之何孔子曰出舍於公館以待事禮也君事既迫而齊衰情微殺則出舍公館以待事此情理之自然非私心之所為也孔子曰尸辨冕而出卿大夫皆下之尸必式必有前驅子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與鄭云疑有司初使之然孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事周人既卒哭而致事記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無辟也者非與孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也鄭謂徐戎作難卒哭而征之作費誓及考書序魯侯伯禽宅曲阜徐夷並興東郊不開作費誓是伯禽始受封之國之時也時周公未薨論語云周公謂魯公曰君子不使大臣怨乎不以是伯禽已就國臨臣民史記云伯禽受封之魯三年而後報政周公然則伯禽卒哭而親金革未必作費誓之時康成之言亦難遽信王肅謂伯禽有母之喪不言作費誓今以三年之喪從其利者吾弗知也檀弓第十三公儀仲子之喪檀弓免焉仲子舍其孫而立其子檀弓曰何居我未之前聞也趨而就子服伯子於門右曰仲子舍其孫而立其子何也伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也子遊問諸孔子孔子曰否家語於此有周制二事字立孫夫檀弓之問必其孫之未有大惡可立而不立故問也其孫若有大惡則禮雖立孫亦當權而從宜檀弓必不疑而問孔子亦必不曰立孫觀書必通其道達其情今以私情而不立孫故孔子云康成謂子服伯子蓋仲孫蔑之玄孫子服景伯檀弓趨而就之於門右則知同姓門自外入為左右同姓位在東方故康成謂公儀蓋魯同姓喪服記云朋友皆在他邦袒免免象冠廣一寸康成知同姓則非他邦禮不當免檀弓免遂謂檀弓故為非禮以非仲子然喪服記失之所為兄弟服妻皆降一等而禮嫂叔無服喪服傳婦人不杖而喪大記則杖異代異禮則亦未可盡據喪服以為一定不易之制檀弓重為哀痛之禮以哀其不立孫而發其問則亦不可知而不可必也謂之故為非禮則非康成謂居讀為姬姓之姬齊魯之間語助也然箋詩於日居月諸不改讀為姬何也簡曰越人方言亦有何居其音如京語之飢姬其字則作居今正音居九魚反非方音有居云語助子張有父之喪公明儀相焉問稽顙於孔子孔子曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也鄭云先觸地無容哀之至三年之喪吾從其至者夫子之母名徵在言在不稱徵言徵不稱在夫子少孤不知其墓殯於五父之衢人之見之者皆以為葬也其愼也蓋殯也雖略知其墓而未審未敢遽合葬以其愼重故也鄭云孔子之父郰叔梁紇與顏氏之女徵在野合而生孔子徵在恥焉不告殯於五父之衢欲有所就而問之孔子亦為隱焉五父衢名蓋郰曼父之鄰鄭意可從容審問歟問於郰曼父之母然後得合葬於防郰又作鄒將葬子曰古者不祔葬為不忍死者之復見也詩云葬則同穴自周公已來祔葬矣衛人之祔也離之魯人之祔也合之善夫吾從魯合葬於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺子先反門人後雨甚至子問焉曰爾來何遲也曰防墓崩子不應三孔子泫然流涕曰吾聞之古不修墓及二十五月而祥五日孔子彈琴而不成聲十日過禫而成笙歌魯人有朝祥而莫歌者子路笑之夫子曰由爾責於人終無已夫三年之喪亦已久矣夫子路出夫子曰又多乎哉踰月則其善也子路與子羔仕於衛衛有蒯聵之難孔子在魯聞之曰柴也其來由也死矣既而衛使至曰子路死焉孔子哭於中庭有弔者孔子拜之既哭進使者而問故使者曰醢之矣遂命覆醢南宮縚之妻孔子之兄女喪其姑誨之髽曰爾毋從從爾爾毋扈扈爾諸儒謂從從高也扈扈廣也鄭於從字不改讀而陸音總又音崇又士江反簡竊意從本叢字以從字記音古書多此類事作士截作節我作卬皆記音也唯方音不同古異方則莫曉唯士江反近之非也潨字音崇音琮又有士江反簡越人方言有何居亦以從為叢音作檀弓者方音同歟後世求其説而不獲撰字作鬃唐韻附潨音云高髻也正謂此從從爾從字正音疾容反故諸儒莫曉陸集音凡三無一中理叢叢謂高也方言謂叢而起實高髻之狀方言率以從為叢音唯士子觀韻書者從疾容反耳蓋榛以為笄長尺而總八寸喪服傳於斬衰布總箭笄傳曰總六升長六寸觀此則知齊衰榛筓總長八寸鄭云總束髮垂為飾孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣孔子既祥五日彈琴而不成聲十日過禫而成笙歌則知獻子過於禮曰比御而不入則知禫後可以御婦人矣而獻子猶不入獻子雖過於禮而夫子不言其非為善辭曰獻子加於人一等矣以其過於厚也魯人有朝祥而莫歌者子路笑之夫子曰夫三年之喪亦已久矣又多乎哉踰月則其善也當時魯人朝祥莫歌其在月終乎故曰踰月則善孔子唯以此心行之以此心言之此心即道故舜曰道心此心即禮既禫而樂如四時之變萬世中制不拘於必踰月也若是時踰月在既祥十數日之外則孔子必不曰踰月則善學者當原情達旨聖人豈有自處以十日笙歌之禮而使人必行十日外踰月之制乎必不然也後儒不達聖人之情唯執踰月之言遂謂祥而縞是月禫踰月樂使孔子之意不問祥後日數之多寡必拘踰月則於孟獻子不曰禫縣而不樂當曰踰月而不樂筮喪事先遠日吉事先近日卒哭以吉祭易喪祭禫祭非喪事故筮禫用近日在十日之內歟三年問曰三年之喪二十五月而畢間傳曰又期而大祥居復寢中月而禫禫而牀士虞禮記曰又期而大祥中月而禫中月者祥之中也亦猶詩之中逵謂逵中也中林謂林中也書無逸云文王受命中身謂身之中也鄭康成必曰二十七月而禫二十八月而作樂者蓋以雜記曰期之喪十一月而練十三月而祥十五月而禫由是通之於三年之喪也又戴德喪服變除禮二十五月大祥二十七月而禫康成據此又喪服小記中一以上而袝又學記中年考校皆謂中為間故鄭謂間一月而禫二十五月大祥間一月則二十七月而禫不思雜記喪服變除非孔子之言厚則厚矣而非萬世之中制古今異禮衰世則異國異禮異學異説而康成必欲牽合而為一説故反違聖人之旨孔疏又從而為之解曰夫子五日彈琴而不成聲十日而成笙歌並此獻子禫縣之屬皆省樂忘哀非正樂也其八音之樂工人所奏必待二十八月其朝祥莫歌亦非正樂嗚呼曲矣唯達道者可與言禮子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而弗忍也孔子曰先王之禮行道之人皆弗忍也子路聞之遂除之伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之伯高之喪孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯高伯高死於衛赴於孔子孔子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野於野則已疏於寢則已重夫由賜也見我吾哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之知伯高而來者勿拜也據奔喪篇哭師於廟門外而孔子曰哭於寢者何也大哉孔子孔子由道心而行之言之無不中節夫師者所以傳道也道非自外至所以啓吾心之所自有也此心即道舜曰道心孔子曰心之精神是謂聖易大傳曰百姓日用而不知所謂日用者心也然則哭師於寢良為宜其哭於廟門外者不知道者之所為也世習行之遂傳以為禮自古及今不知道者滔滔皆是也孔子得道故不從聾俗之所為孔子大聖職當破百世之昏昏垂萬代不易之法最其至妙超出乎規矩繩墨之上隨宜時措哭伯高於賜氏蓋禮文之所無以心而揆之此心即道故無適而非道無適而不中節如四時之錯行也嗚呼至矣而不知道者惑於世禮異説則曰此殷禮此周禮奚足以知聖人之心其知伯高者自當往弔伯高之家不當弔子貢子貢不當受其弔故使勿拜孔子之衛遇舊館人之喪入而哭之哀出使子貢説驂而賻之子貢曰於門人之喪未有所説驂説驂於舊館無乃已重乎夫子曰豫鄉者入而哭之遇於一哀而出涕豫惡夫涕而無以將之小子行焉驂旁馬騏騮是中騧驪是驂錢財曰賻聖人遇於一哀而出涕出涕而説驂猶天地之變化四時之錯行隂陽寒暑不無過差而皆妙也皆神也皆不可測也皆善也此不可測之神不惟聖人有之愚夫愚婦咸有之而不自知也孔子曰心之精神是謂聖小戴記曰豫惡夫涕之無從也不如家語曰惡夫涕而無以將之孔子在衛有送葬者而夫子觀之曰善哉為喪乎足以為法矣小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑子貢曰豈若速反而虞乎子曰小子識之我未之能行也速反而虞遂於禮文者也雖欲速祭以定死者之神猶為失其本心也故孔子曰我未之能行若夫道心之常則其往如慕其反如疑雖已迎精而反而其體則藏諸彼故疑疑者人情之常道心變化之妙而非放逸於外者也顏淵之喪饋祥肉孔子出受之入彈琴而後食之祥之鼓素琴若喪子而無服孔子之哀樂若天地之節孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左吉事尚左凶事尚右然特牲少牢吉祭皆載右胖士虞禮記凶事載左胖者何也取義不同也自尊者主奧奧為右故人子居不主奧尊賔故賔位亦在右故吉祭右胖而反用左胖者則凶也亦猶吉洗當東營至虞禮則反之設于西階西南子夏問於孔子曰居父母之仇如之何夫子曰寢苫枕干不仕干盾弗與共天下也遇諸市朝不反兵而鬬鄭云雖適市朝不釋兵曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬬曰請問居從父昆弟之仇如之何曰不為魁主人能則執兵而陪其後子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也逐於文為則去道遠哀敬者道心也卞人有其母死而孺子泣者家語辨作卞小戴記作辨孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也故哭踊有節而變除有期仲憲言於曾子家語仲憲作原思曰夏后氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也曾子曰其不然乎其不然乎夫明器鬼器也祭器人器也夫古之人胡為而死其親乎子遊問於孔子孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也為明器者知喪道矣備物而不可用也是故竹不成用王肅云謂籩之無緣瓦不成膝此據孔子家語其謂無下體乎小戴記膝作味木不成斫琴瑟張而不平竽笙備而不和有鐘磬而無簨簴鄭云不縣之也橫曰簨植曰簴其曰明器神明之也哀哉死者而用生者之器也不殆於用殉乎哉以人從死而葬曰殉子遊問於孔子曰葬者塗車芻靈自古有之然今人或有偶木人小戴作俑是無益於喪孔子曰為芻靈者善矣為偶者不仁小戴記偶作俑不殆用人乎季桓子死魯大夫朝服而弔子遊問於孔子曰禮乎夫子不答他日又問夫子曰始死羔裘玄冠者易之而已女何疑焉子遊問喪具夫子曰稱家之有亡子遊曰有無惡乎齊夫子曰有毋過禮苟亡矣斂首足形還葬縣棺而封人豈有非之者哉孟獻子之喪司徒旅歸四布鄭云旅下士也司徒使下士歸四方之賻布孔疏云歸還之夫子曰可也鄭云善其能廉孔疏云賻布本助喪用今既有餘故歸之子夏問於孔子曰居君之母與妻之喪如之何孔子曰居處言語飲食衎爾衎者和平之貌於喪所則稱其服而已敢問伯母之喪如之何孔子曰伯母叔母疏衰期而踊不絶地姑姊妹之大功踊絶於地若知此者由文矣哉由文矣哉期宜踊絶於地而不絶者義親而情殺者大功而踊絶地者本期而降情本親也不知道者之於禮率執文而不通至此期而踊不絶地則斷不可以文論矣故曰若知此者由文矣哉再言之者所以甚言禮文之不可執當通其道也道不在外心而已矣此心即道故舜曰道心心之變化不可勝窮重中有輕輕中有重如四時之錯行故曰深而通茂而有間連而不相及也嗚呼妙矣穆伯之喪敬薑晝哭文伯之喪晝夜哭孔子曰知禮矣喪夫不夜哭子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂手足形還葬而無椁稱其財斯之謂禮仲遂卒於垂壬午猶繹萬入去籥孔子曰非禮也卿卒不繹春秋魯宣公八年辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥猶者寓其可己之意也左傳亦曰襄仲卒而繹非禮也萬舞也去其有聲者亦以著人心之不忍也齊師侵魯小戴記云戰于郎公叔務人小戴記作禺人鄭王皆曰昭公之子遇負杖入保者息務人泣曰使之雖病任之雖重任上稅賦君子弗能謀士弗能死不可也我則既言之矣敢不勉乎與其鄰重汪錡乘往奔敵死焉皆殯魯人欲勿殤重汪錡小戴記錡作踦問於仲尼仲尼曰能執干戈以衛社稷雖勿殤也不亦可乎禮者人心之所自有也工尹商陽與陳棄疾追吳師及之孔子家語首言楚伐吳魯昭公八年楚公子棄疾帥師滅陳楚封戍為陳公史記楚使棄疾定蔡因為陳蔡公此曰陳棄疾者其以滅陳之功最著故楚人稱之歟小戴記無楚伐吳三字魯昭十二年楚圍徐以懼吳楚靈王次于乾溪以為之援鄭康成謂於時有吳師陳或作陵陳棄疾謂工尹商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人每斃一人掩其目不忍視之止其御曰朝不坐燕不與殺三人亦足以反命矣孔子聞之曰殺人之中又有禮焉子路怫然進曰人臣之節當君大事唯力所及死而後已夫子何善此子曰然如女言也吾取其有不忍殺人之心而已延陵季子適齊於其反也其長子死葬於嬴博之間孔子曰延陵季子吳之習於禮者也往而觀其葬焉其坎深不至於泉其斂以時服既葬而封廣輪掩坎其高可隱也既封左袒右還其封且號者三三還其封曰骨肉歸復於土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之於禮也其合矣乎自執文者觀之必以為不合故孔子特曰合破其固孔子往觀其葬而知其斂服者其聞而知之歟曰骨肉歸復于土命也若魂氣則無不之也再言之者其警魂而招之歟不招之使歸而唯曰無不之者神魂之妙無所不通廣大靈明唯昏故小故拘此啓之通之孔子之畜狗死使子貢埋之曰吾聞之也敝帷不棄為埋馬也敝蓋不棄為埋狗也丘也貧無蓋於其封也亦豫之席毋使其首陷焉陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也孔子聞之曰善哉覘國乎詩云凡民有喪扶服救之雖微晉而已天下其孰能當之孔子之故人曰原壤其母死夫子助之沐椁治之光澤如沐原壤登木曰久矣豫之不託於音也歌曰貍首之斑然木之文采如貍首執女手之卷然夫子為弗聞也者而過之從者曰子未可以已乎夫子曰丘聞之親者毋失其為親也故者毋失其為故也孔子過太山側有婦人哭於墓者而哀夫子式而聽之使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也子貢問於孔子曰殷人既窆而弔於壙周人反哭而弔於家如之何孔子曰反哭之弔也哀之至也反而亡焉失之矣於斯為甚故弔之死人卒事也殷已慤吾從周殷人既練之明日袝于祖周人既卒哭之明日祔于祖祭神之始事也周已戚吾從殷卒哭而遽以神事之戚然不忍也衛司徒敬子死子夏弔焉主人未小斂絰而往子遊弔焉主人既小斂子遊出絰反哭子夏曰聞之也與曰聞諸夫子夫人未改服則不絰子夏問於孔子曰客至無所館夫子曰於我乎館客死無所殯夫子曰生於我乎館死於我乎殯敢問禮與仁者之心與孔子曰吾聞諸老聃曰館人使若有之有之而不得殯乎夫仁者制禮者也故禮不可不省也禮不同不異不豐不殺稱其義以為之宜故曰我戰則克祭則受福蓋得其道矣禮者大道之文為不可以同異豐殺言也以同異豐殺言禮者不知禮者也是故禮本於大一分而為天地變而為四時列而為三百之經用而為三千之儀又有三百三千所不能盡者心通此道謂之知常覺常明謂之仁故唯仁者為能制禮禮雖先王未之有可以義起也不知道者之習於禮不知其所以然也故禮不可不省也達之則天地自我而生四時自我而變萬物自我而成鬼神自我而行九州四海九夷八蠻自我而安則無不得其道矣戰必克祭必受福此事之必至者也至於以我為言者師弟子之間開誠而明告之也有子問於曾子曰問喪於夫子乎曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曾子曰參也聞諸夫子也有子又曰是非君子之言也曾子曰參也與子遊聞之有子曰然然則夫子有為言之也曾子以斯言告於子遊子遊曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之為愈也死之欲速朽為桓司馬言之也南宮敬叔反必載寶而朝夫子曰若是其貨也喪不如速貧之為愈也喪之欲速貧為敬叔言之也曾子以子遊之言告於有子有子曰然吾固曰非夫子之言也曾子曰子何以知之有子曰夫子制於中都四寸之棺五寸之槨以斯知不欲速朽也昔者夫子失魯司寇將之荆蓋先之以子夏又申之以冉有以斯知不欲速貧也周公第十四子夏問曰記云周公相成王教之以世子之禮有諸孔子曰昔者成王嗣立幼未能蒞阼周公攝政而治抗世子之法於伯禽欲王之知父子君臣之道所以善成王也夫知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人是故抗世子法於伯禽使之與成王居欲令成王知父子君臣長幼之義也君之於世子親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不愼也能親父尊君然後可以兼天下而君之矣行一物而三善皆得者唯世子而已其齒於學之謂也一物謂齒於學善謂父子君臣長幼之義故世子齒於學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治語曰樂正司業父師司成一有元良萬國以貞世子之謂也聞之曰為人臣者殺其身有益於君則為之况于其身以善其君乎周公優為之于即迂字曲也以臣攝政非正也權也故曲也冉求曰昔臧文仲知魯國之政立言垂法於今不亡可謂知禮矣孔子曰臧文仲安知禮夏父弗忌逆祀而不止春秋文公二年八月丁卯大事于大廟躋僖公左氏傳曰於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小孔子曰臧文仲縱逆祀燔柴於竈以祀焉小戴記竈作奧鄭云奧當作爨夫竈者老婦之祭也盛於瓫小戴記作盆同尊於瓶非所柴也故曰禮也者由體也體不備謂之不成人設之不當猶不備也子路為季氏宰季氏祭逮暗而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎户堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎孔子觀鄉射喟然歎曰射之以樂也何以射何以聽循聲而發發而不失正鵠者其惟賢者乎百姓日用而不知者皆道心之妙也而於是乎益昭曰循聲而發既聽且射一心而兩應非由擬議不思而捷應嗚呼妙矣而人猶莫之覺孔子喟然而歎曰以何而聽也以何而射也嗚呼妙矣雖孔子於此亦唯能發其問端而已卒不能言其所以聽所以射之者為何物何狀何道也人於是往往皆謂之心而此心無體無所不可得而執不可得而思借曰其思可思思有時而息而此心不思而常清明者非思為也如日月之明無所不照而非思也賢者無思無為而自不失其正鵠不賢者雖思雖為而反失其正鵠彼習乎射之精者雖非賢而亦不假思為而自中何也曰方不假思為而自中之時即賢者之心也若夫不肖之人則彼將安能以中詩云發彼有的以祈爾爵祈求也求中以辭爵也酒者所以養老所以養病也求中以辭爵辭其養也是故士使之射不能則辭以疾懸弧之義也於是退而與門人習射於矍相之圃蓋觀者如堵牆焉季桓子將祭齊三日而二日鐘鼓之音不絶冉有問於孔子子曰孝子之祭也散齋七日慎思其事三日致齋而一用之小戴記作一日用之猶恐其不敬也而二日伐鼓何居衛莊公之反國也改舊制變宗廟易朝市高子臯問於孔子曰周禮繹祭於祊祊在廟門之西前朝而後市今衛君欲其事事一更之如之何孔子曰繹之於庫門內祊之於東市朝於西方失之矣小戴記作朝市孔子食於季氏食祭主人不辭不食亦不飲而餐子夏問曰禮與孔子曰非禮也從主人也吾食於少施氏而飽少施氏食我以禮吾食祭作而辭曰疏食不足祭也吾餐作而辭曰疏食不敢以傷吾子之性主人不以禮客不敢盡禮主人盡禮則客不敢不盡禮也言樂第十五周賔牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也武周舞備戒擊鼓警衆鄭康成王肅皆云對曰病不得其衆也詠歎之淫液之何也對曰恐不逮事也發揚蹈厲之已蚤何也對曰及時事也武坐致右軒左何也右膝至地左膝軒起對曰非武坐也聲淫及商何也對曰非武音也孔子曰若非武音則何音也對曰有司失其傳也孔子曰唯丘聞諸萇𢎞亦若吾子之言是也若非有司失其傳則武王之志荒矣商殺音其聲寖及於殺非武音也非武王之志也武王伐紂愛民之志也非殺也必無殺音賔牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也子曰居吾語女夫樂者象成者也總干而山立武王之事也發揚蹈厲太公之志也奮武必伐仁心所發武亂皆坐周召之治也且夫武始而北出周師始由北出再成而滅商三成而南四成而南國是疆周既北滅商餘諸侯多在南皆聽命盡在疆域之中五成而分周公左召公右家語分下有陜字然則周公所統廣矣況鎬京亦𨽻於周公關雎太姒之詩首周南周公所分其由周而東至陜又分其東歟六成復綴以崇天子為尊崇天子之容王肅亦云衆夾振之而四伐盛威於中國也王肅云四伐者伐四方與紂同惡也分夾而進事蚤濟也久立於綴以待諸侯之至也且女獨未聞牧野之語乎武王克殷反商政未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞封殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位武成云式商容閭此謂使御王車者行商容之閭以式之以禮其賢而又復其位也庶民弛政鄭云弛去紂時苛政庶士倍祿濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲釁而藏之府庫家語釁作釁字同而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜家語建作鞬建具展反然後天下知武王之不復用兵也散軍而修郊射郊射左右學為禮射左射貍首右射騶虞而貫革之射息也裨冕搢笏裨冕羣臣禮服六服大裘為上其次皆為裨裨冕者衣裨衣而冠其冕也裨有副義曾子問太宰太宗太祝皆裨冕而虎賁之士説劒也祀乎明堂而民知孝朝覲然後諸侯知所以臣耕藉然後民知所以敬親王肅云親耕藉所以奉祠祀之粢盛五者天下之大教也食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干鄭云冕而總干親在舞位所以教諸侯之弟也如此則周道四達禮樂交通則夫武之遲久不亦宜乎子路鼓瑟孔子聞之謂冉子曰甚也由之不才也夫先王之制音也奏中聲以為節流入於南不歸於北夫南者生育之鄉北者殺伐之域故君子之音溫柔居中以養生育之氣憂愁之感不加于心也暴厲之動不在于體夫然者乃所謂治安之風也小人之音則不然亢麗微末以象殺伐之氣中和之感不載於心溫和之動不存于體夫然者乃所以為亂亡之風昔者舜彈五絃之琴造南風之詩其詩曰南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮唯修此化故其興也勃焉德如泉流至于今王公大人述而弗忘殷紂好為北鄙之聲其廢也忽焉至於今王公大人舉以為戒夫舜起布衣積德含和而終以帝紂為天子荒淫暴亂而終以亡非各所修之致乎由今也匹夫之徒曾無意于先王之制而習亡國之聲豈能保其六七尺之體哉冉有以告子路子路懼而自悔靜思不食以至骨立夫子曰過而能改其進矣乎孔子學琴於師襄子十日不進襄子曰可以益矣孔子曰丘未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰有所穆然深思焉有所怡然高望而遠眺焉曰丘逮得其為人矣黯而黑頎而長眼如望羊家語眼作曠王肅云視遠奄有四方史記作如王四國非文王其孰能為此師襄子辟席葉拱而對曰吾子聖人也其傳曰文王操心清明而神或者昏亂之故有所不知聖人不失其清明故其知如神王肅曰葉拱兩手薄其心孔子吹律自吹殷後少連第十六孔子曰少連大連善居喪三日不怠三月不解期悲哀三年憂東夷之子也子貢問喪子曰敬為上哀次之瘠為下敬非不哀本體敬爾敬與哀非有二心顏色稱其情戚容稱其服顏色由情而發非特致其顏色為偽也戚容一不稱其服則其心之放失也孔子之言皆所以明道心之本有請問兄弟之喪子曰兄弟之喪則存乎書策矣是時古書未散亡亦謂功之喪殺矣子夏問曰凡喪小功已上虞祔練祥之祭皆沐浴於三年之喪子則盡其情矣孔子曰豈徒祭而已哉三年之喪身有瘍則浴首有瘡則沐小戴記瘡作創病則飲酒食肉毁瘠而病君子弗為也毁而死君子謂之無子且祭之沐浴為齊潔也非為飾也子貢問曰管仲失於奢晏子失於儉與其俱失也二者孰賢孔子曰管仲鏤簋而朱紘旅樹而反坫山節藻棁賢大夫也而難為上鄭云言其僭天子諸侯冠有笄者為紘紘有纓處兩端上屬下結旅樹門屛也反坫反爵之坫也山節刻欂櫨為山棁侏儒柱畫之為藻文爾雅疏云山節者刻柱頭斗栱形如山晏平仲祀其先人豚肩不掩豆賢大夫也而難為下君子上不僭上下不逼下孔子在齊齊大旱春飢景公問於孔子曰如之何孔子曰凶年則乘駑馬力役不興馳道不修王肅云馳道君之行道祈不幣玉祭祀不懸不作樂祀以下牲此賢君自貶以救民之禮也子貢觀於蠟孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也蠟黃衣黑冠而祭息田夫也迎貓迎虎山服草笠饗農咸醉故曰若狂孔子曰百日之蠟一日之澤非爾所知也農百日勤一日息之使蠟而醉之張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也子夏問曰官於大夫既升於公而反為之服禮與孔子曰管仲遇盜取二人焉上以為公臣曰其所與遊辟也可人也管仲死桓公使為之使官於大夫者之為之服也自管仲始也有君命焉小戴記於是有爾也二字孔子嘗奉薦而進其親也慤其行也趨趨以數已祭子貢問曰子之言祭濟濟漆漆然今子之祭無濟濟漆漆何也孔子曰濟濟者容也遠也漆漆者容也自反也容以遠若容以自反也夫何神明之及交夫何濟濟漆漆之有乎鄭云漆漆讀如朋友切切自反猶言自修整也陸佃云漆讀如字陸意謂靖歟今方言有之濟濟者間遠之容漆漆者沉靜不外用之容故曰自反也若猶及也容以遠及容以自反者平居無事之容也非奉薦於神明之容反饋樂成祭終徹其所饋而反之樂於是節止進其燕俎此據家語序其禮樂備其百官於是君子致其濟濟漆漆夫何慌惚之有乎夫言豈一端而已夫各有所當也於是乎燕則濟濟然漆漆然歟孔子平居與祭之時其容不同此道心之變化如四時之錯行宰我曰吾聞鬼神之名不知其所謂孔子曰人生有氣有魄氣也者神之盛也魄也者鬼之盛也衆生必死死必歸土此之謂鬼魂氣歸天此之謂神合鬼與神教之至也骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則聖人以是為未足也築為宮室設為宗祧以别親踈遠邇教民反古復始不忘其所由生也衆之服自此故聽且速也二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也以教衆反始也薦黍稷羞肝肺首心間以俠甒俠古洽反甒音武加以鬱鬯以報魄也教民相愛反始上下用情禮之至也君子反古復始不忘其所由生是以致其敬發其情竭力從事不敢不盡也此之謂大教人道大矣通三才貫萬古分而言之有氣有魄合而言之一也魂氣輕清其死也復于天體魄則降而復于土天地之分也志曰天地之道其為物不二天者吾之清明非特吾之魂氣歸于天而已地者吾之博厚非特吾之體魄復于地而已人心虛明無體廣大無際天地人物變化萬狀不出吾心量之中其曰範圍天地又曰發育萬物不特聖人如此聖人先覺我心之所同然爾無二道也此道昭然而不可亟語此衆人之前唯曰合鬼與神教之至也情知魂氣歸天如彼其高體魄歸地如此其下斷斷乎不可合而為一而今曰合者疑在甚難而明者觀之未始不一也合之為言猶為教誘之漸也人之骨肉斃于下隂為野土此吾之地其氣發揚于上為昭明焄蒿悽愴此吾之天百物皆具此地皆有此天天地之精妙名之曰鬼神曰祖曰考焉則於民黔首民也使民知祖考之精神終不泯滅制為祭祀之禮聖人以是為未足又築宮室以為廟設宗祧以序親踈遠近順人心親愛等殺所以教民反念古始追思祖考不忘其所由生也皆因乎人之本心之孝故衆心咸服其聼命從教也速二端謂鬼神早朝祭事有燔燎羶薌蕭光見焉以此報氣氣神也此教衆反始所以通祖考之神也即人心之清明無體範圍天地發育萬物者也至於薦黍稷羞肝肺首心間以俠甒齊酒加以鬱鬯臭隂所達此以報魄魄鬼也此教民相愛及通祖考之魄上下用情孝事其親鬼神合一氣魄無二是謂禮之至君子反念古始祖考不忘其所由生是以致敬發情竭力從事不敢不盡此不惟行吾道心之孝而其教民也大矣鄭謂俠甒兩甒也子曰禮也者理也樂也者節也君子無理不動無節不作不能詩於禮繆不能樂於禮素薄於德於禮虛由道心而行自有倫理其名曰禮心有説樂播諸八音未嘗放逸是謂節其名曰樂二者正心之所發正心即道心心不正何以為禮樂也行禮而樂中心樂而行之則成矣素者徒有質素而未全之稱徒禮而未至於樂則非本心之所自有之禮薄於德而為禮虛文而已德即道心子曰制度在禮文為在禮行之其在人乎子貢越席而對曰敢問夔其窮與子曰古之人與古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏夫夔達於樂而不達於禮是以傳於此名也古之人也子張問政子曰師乎前吾語女乎君子明於禮樂舉而錯之而已子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘鼓然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南面而立夫是以天下太平也諸侯朝萬物服體易曰聖人作而萬物覩人亦曰物萬物謂九州四夷之人不惟其心服從而以身服事致敬而聽命也而百官莫敢不承事矣德之流行速於置郵而傳命德之感人如神故易曰聖人以神道設教而天下服矣故先言諸侯萬物後乃言百官禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奧阼鄭云但用巧目作室不由法度猶有奧阼席則有上下車則有左右行則有並隨立則有列序古之義也室而無奧阼則亂於堂室矣席而無上下則亂於席次矣車而無左右則亂於車上矣行而無並隨則亂於階塗矣列而無次序則亂於著矣著明也爾雅中庭之左右謂之位中庭明著故位曰著歟小戴記著作位昔者明王聖人辨貴賤長幼正男女內外序親踈遠邇時莫敢相踰越者皆由此塗出也夫貴賤長幼男女內外親踈遠近非人之所能為也皆天道也故天性之所自有也天性中自有三百之經禮自有三千之曲禮是性至善至正至大先聖大訓卷二
