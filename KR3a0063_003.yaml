body:
  text: 先聖大訓卷三宋楊簡撰主言第十七孔子間居曾子侍孔子曰參今之君子惟士與大夫之言之聞也其至於君子之言者甚希矣於乎吾主言其不出而死乎哀哉此取諸大戴記家語曰吾以王言之其不出户牖而化天下家語多改作翦截就文記者不知道多失聖人本旨記者唯見孔子多言王罕言主故改曰王然孔子之時周室衰微諸侯盛強孔子豈不欲興周知其難輔多遊侯國覬其一遇主者王侯之通稱故曰主言歟此孔子與門人私言其中心故云孔子言此之時衰老道終不行深憫斯民之無以安全之教養之故嘆而哀之自是曾子屢請問主言孔子再不應是主言未發不應先遽告以不出户牖而化天下之道曾子起曰敢問何謂主言孔子不應曾子懼肅然摳衣下席曰弟子知其不遜也得夫子之間也難是以敢問也孔子不應曾子懼退負序而立孔子曰參女可語明主之道歟曾子曰不敢以為足也得夫子之間也難是以敢問孔子曰居吾語女道者所以明德也德者所以尊道也是故非德不尊非道不明道德非二道者通達之謂至妙不可名姑假道路以明其無所不通天地人物通此一道人心之善謂之德此德即道也茍不通達則已雖有德而不自知故曰道所以明德非德外復有道道外復有德也然人亦有雖明乎道而已德猶有不善則衆志終未服故孔子曰知及之仁不能守之雖得之必失之又曰不在乎善而皆在於凶德雖得之君子所不貴君子行思可樂德義可尊是以其民畏而愛之則而象之原壤孔子之故人母死而歌蓋方外之士未必無道而德之不修故人咸賤之雖有國馬不教不服不可以取千里雖有博地衆民不以其道治之不可以霸主言霸則知孔子亦有志於輔諸侯以霸尊王是故昔者明主內修七教外行三至七教修可以守三至行可以征七教不修雖守不固三至不行雖征不服是故明主之守也必折衝乎千里之外其征也袵席之上還師是故內修七教而上不勞外行三至而財不費此之謂明主之道也曾子曰敢問不費不勞可以為明乎孔子愀然揚麋曰麋一作眉參女以明主為勞乎昔者舜左禹而右臯陶不下席而天下治夫政之不中君之過也政之既中令之不行職事者之罪也唐虞之時猶有黜幽明主奚為其勞也昔者明主關譏而不征市鄽而不稅稅十取一使民之力歲不過三日入山澤以時有禁而無征一作入山澤以時而不禁夫圭田無征此六者取財之路也明主捨其四者而節其二者明主焉取其費也曾子曰敢問何謂七教孔子曰上敬老則下益孝上順齒則下益悌下民本有孝弟上有以導之則益興起上樂施則下益諒人性本善本直諒上樂施實心愛民故下實心感服無敢飾偽上親賢則下擇友上好德則下隱慝惡慝隱伏皆上感之上惡貪則下恥爭上強果則下亷恥民皆有别則貞則正上強立果實則下亷恥有别貞正皆強果之類也家語作上亷讓則下恥節雖與上文相似齊整而非孔子當日實語之詳亦不勞矣總言上修德而下自應是不勞此謂七教七教者治民之本也教定是正矣上者民之表也表正則何物不正是故君先立於仁則大夫忠而士信民敦工璞商慤女憧婦空空七者教之至也七者布諸天下而不窕內諸尋常之室而不塞孔子於此明七者之即道學者只知七者之為教不知即道道無精粗無大小無廣狹不可以思不可以執道心常明曰仁仁即忠信之心無二心也孔子於此破惑者之固蔽窕逺也是故聖人等之以禮立之以義行之以順而民棄惡也如灌曾子曰弟子則不足道則至矣前言仁為教本此言等之以禮則及施教之詳矣孔子曰治國不以禮猶無耜而耕為禮而不本於義猶耕而弗種禮本於義禮義人心之所自有上之人舉而導之則人心之所有者自明而況又行之以順而不拂乎人性有善而無惡此心本清明無滓因物有遷而動乎意故流入於惡惡非清明性中本有之物也今善心興起則其非本有之惡自然消止矣孔子曰參姑止又有焉昔者明主之治民有法必别地以州之分屬以治之然後賢民無所隱暴民無所伏使有司日省如時考之如而通音歲誘賢焉賢者靜重無求唯以禮禮之乃就是謂誘則賢者親不肖者懼使之哀矜寡養孤獨恤貧窮誘孝悌選賢舉能此七者修則四海之內無刑民矣上之親下也如腹心則下之親上也如保子之見慈母也上下之相親如此然後令則從施則行民懷其德邇者服悅逺者來附然後布指知寸布手知尺舒肘知尋十尋而索百步而堵三百步而里千步而井三井而句烈三句烈而距家語三井而埒埒三矩五十里而封百里而有都邑乃為畜積衣裘焉處者恤行者有與亡自布指知寸以往言由己以達人即近而知逺雖積至於甚逺皆由是以達之我欲飲食則使人必有飲食我欲衣裘則使人必有衣裘我欲畜積則使人亦有畜積以至於恤行者之有亡則使處者恤之舉此一事而餘可以咸通矣而其幾自我分屬而治之由近而達之前言其略此及其詳周官職方氏周知邦國都鄙四夷八蠻七閩九貉五戎六狄人民與其財用九榖六畜之數要與其利害者即孔子之意也小行人以邦國及萬民利害逆順禮喪凶荒康樂和親安平類而為五書者亦此意也又遺人有郊里之委積以待賔客有野鄙之委積以待羈旅有縣都之委積以待凶荒者亦此意也凡六官之屬其詳曲不可具述皆所以養之教之古明主之治天下也如此是以蠻夷諸夏雖衣冠不同言語不合莫不來至朝覲於王故曰無市而民不乏無刑而民不違畢弋田獵之得不以盈宫室也徵斂於百姓非以充府庫也懮怛以補不足禮節以損有餘故多信而寡貌其禮可守為禮不出於誠則具文而已終於廢其信可復其迹可履其於信也如四時春秋冬夏其博有萬民也如飢而食渴而飲下土之人信之若夫暑熱凍寒逺若邇非道邇也及其明德也人信其上如飢必食渴必飲其不疑如此又如暑則逺邇皆熱凍則逺邇皆寒明民信之無逺邇之異逺方非道邇也而民咸信之者明德之所及也是以兵革不動而威用利不施而親此之謂明主之守也折衝乎千里之外此之謂也世謂敵之來衝我能折之曰折衝此則不動而威其折衝也逺矣曾子曰敢問何謂三至孔子曰至禮不讓而天下治至賞不費而天下之士説至樂無聲而天下之民和明主篤行三至故天下之君可得而知也天下之士可得而臣也天下之民可得而用也曾子曰敢問何謂也孔子曰昔者明主必盡知天下良士之名既知其名又知其數數謂詳也謂知其德行才藝之詳既知其數又知其所在明主因天下之爵以尊天下之士此之謂至禮不讓而天下治風由道而行皆謂之禮此禮之大不在乎揖讓之間而天下治矣因天下之祿以富天下之士此之謂至賞不費而天下之士説天下之士説則天下之名譽興此之謂至樂無聲而天下之民和故曰所謂天下之至仁者能合天下之至親者也所謂天下之至知者能用天下之至和者也所謂天下之至明者能選天下之至良者也此三者咸通然後可以征是故仁者莫大於愛人知者莫大於知賢政者莫大於官賢有土之君修此三者則四海之內拱而俟言有土之君者通稱王侯然後可以征明主之所征必道之所廢者也彼廢道而不行然後誅其君致其征弔其民而不奪其財也故曰明主之征也猶時雨也至則民説矣是故行施彌博得親彌衆此之謂袵席之上乎還師行施並如字所行所施彌博則德之感人也彌深故得民之親愛彌衆故師行周還乎天下如在袵席之上言雖彼被征之國其民亦仰我如父母簞食壺漿以迎我師敢有敵我害我者哉茍非明主則人心未咸服師行他境多罹此害用師者深以為慮孔子知其情狀故於是有袵席之上還師之言君子第十八孔子曰君子之道譬則防與大戴記作譬小戴記作辟夫禮之塞亂之所從生也猶防之塞水之所從來也故以舊防為無用而壞之者必有水敗以舊禮為無所用而去之者必有亂患故婚姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬬之獄繁矣聘射之禮廢則諸侯之行惡而盈溢之敗起矣喪祭之禮廢則臣子之恩薄而倍死亡生者衆矣子云貧而樂富而好禮衆而以寧者天下其幾矣鄭云大族衆家多為亂子云夫禮者所以章疑别微以為民防者也子云天無二日土無二王家無二主尊無二上子云君不與同姓同車與異姓同車不同服子云君子辭貴不辭賤辭富不辭貧則亂益亡子云小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡鄭云慊恨不滿之貌子云觴酒豆肉讓而受惡民猶犯齒袵席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君子云君子貴人而賤己先人而後己則民作讓子云利祿先死者而後生者則民不偝先亡者後存者則民可以託子云有國家者貴人而賤祿則民興讓尚技而賤車則民興藝子云上酌民言則下天上施子云善則稱人過則稱已則民不爭善則稱人過則稱已則怨益亡子云善則稱人過則稱已則民讓善子云善則稱君過則稱已則民作忠子云善則稱親過則稱己則民作孝子云君子弛其親之過而敬其美子云睦於父母之黨可謂孝矣子云於父之執可以乘其車不可以衣其衣子云父子不同位子云父母在不稱老言孝不言慈閨門之內戲而不嘆子云長民者朝廷敬老則民作孝子云七日戒三日齊承一人焉以為尸過之者趨走子云禮之先幣帛也欲民之先事而後祿也子云君子不盡利以遺民子云夫禮坊民所淫章民之别使民無嫌以為民紀者也子云取妻不取同姓故買妾不知其姓則卜之子云禮非祭男女不交爵子云寡婦之子不有見焉則弗友也子云好德如好色諸侯不下漁色故君子逺色以為民紀子云婚禮壻親迎見於舅姑爾雅云妻之父為外舅妻之母為外姑舅姑承子以授壻恐事之違也中庸第十九孔子曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也子曰中庸其至矣乎民鮮久矣至矣乎聖人之為中庸之名也中庸者道之異名人之求道率求諸高逺聖人名之以中則謂不必求諸過高也又名之以庸庸常也平常也易繫辭又曰易簡而天下之理得矣孔子又曰誰能出不由戶何莫由斯道也舜曰道心知夫心之即道也此心無體質無鄉域忽焉思天至于九霄之上則即至于九霄之上忽焉思地至于九地之下則即至于九地之下其無思也則無畔無際無始無終非內非外既無體質則千萬載之已往猶是也千萬載之未來亦猶是也思非動無思非靜以此事親以此事長上以此事君以此與妻子以此交朋友以此涖官臨民應酬萬務何逺之有捨其內已之靈而乞靈於彼鉤深於外者冥冥之徒也捨其平常而求竒於高上者甚卑者也時中者無時而不中也亦猶論語時習無時而不習也無時不習即無時不中是心平平何思何慮起而私意始流於邪是心平平何偏何倚起而私意始倚而著小人不可大受或略窺其無所不通之妙知喜怒哀樂之皆妙遂流而至於無忌憚故孔子曰小人不可大受知其有是患也不思孔子十五而學三十而立四十不惑五十知天命六十耳順七十而從心之所欲不踰矩嗚呼百姓日用此道而知者寡也雖知而行者又寡也孔子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也子曰道其不行也夫至哉聖言其善於明德如此於行當言賢不肖於明當言知愚今也反之茍非洞達大通奚以至此所以洗人心之固礙也曰道曰中庸姑假以啓人心皆所以去人之礙破人之意意破礙去而吾本有清明無思無為無意無我之妙昭昭矣愚不肖罔然不自明固為不及賢知又加之意故又過之聖人歷觀自古及今人心不失之不及即失之過故為之屢言再嘆而深念之也愚不肖之不及不足多論賢知之過是當辨明賢知之過皆於清明無體無思無為之中而加之意或有此意或有彼意或有內意或有外意或有難意或有易意或有異意或有同意或有虛意或有實意或有動意或有靜意或有博意或有約意或有繁意或有簡意或有精意或有粗意或有古意或有今意或有可之意或有不可之意或有知之意或有行之意意態萬狀不可勝窮故孔子每每止絶羣弟子之意亦不一而足他日記者欲記則不勝其記故總而記之曰絶四毋意毋必毋固毋我必如此必不如此固滯而不通行我行坐我坐衣我衣食我食塊然有我者存凡此皆意中之變態不省中虛牢執血氣堅持意態守焉而不知其非固焉而不省其妄雖賢雖知難以逃此顔子自知其受命之所曰仰之彌高鑽之彌堅瞻之在前忽焉在後雖欲從之末由也已蓋自知欲從之意去道猶逺至於三月不違仁則脫此患矣默覺寂然不動之妙何思何慮自清自明何高何堅無勞鑽仰何今何曩無體無移夫如是故三月而如一日莫究厥始莫窮厥終變化云為如四時之錯行如日月之代明渾渾融融又如萬象畢見于水鑑之中夫是之謂仁又謂之道謂之中庸此道可以默識而不可思可以略言而不可指議自覺自信則終日思為而實無所動未覺未信則雖終日靜默而未嘗少間易曰百姓日用而不知孔子於此曰人莫不飲食也鮮能知味也視聽言動聖人與他人同一明一不明聖人與他人異孔子雖諄誨如此知心通者大難其人終非告語之所及故良久而復歎曰道其不行矣夫或者終疑孔子曰知之者不如好之者好之者不如樂之者是明者不如行者簡將應之曰書不盡言言不盡意孔子則云孔子所謂知者好者皆非言其至者至於此之所謂明則直言其明道非未至者大明非思至行非為無為即無思無思即無為曰明曰行皆明也非道之實也道尚不可以言而況於明行之間乎於是大通則通三才貫萬古舉形氣名言事交錯之紛紛非同非異非一非二而尚可以置明行之意乎子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎世俗以下問於人為無能無知而舜則好問孔子乃稱其大知舜中心虛無我是以好問世俗率好高而忽近而舜則好察平近之言知道不必求諸幽逺惟至近者實甚逺事理一貫而事不可以不戒謹而忽易故有問有察人心本善而無惡起而為意斯流於惡舜之治每隱人之惡臨以簡御以寬而惟揚人之善者知其本有之善心興起則外起之惡自不留矣愚不肖之不及為邪為惡固舜之所不與其讒説殄行雖高怪足以驚衆而舜亦堅執不容其縱而遏絶之堯之治民匡之直之輔之翼之使自得之其以道治天下與舜同子曰人皆曰豫知驅而內諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣日用逐逐縱好肆惡皆足以召禍敗取死亡是謂罟擭陷阱擇乎中庸而不能期月守此語為日至者設也日至者已至乎道衆人心放意逸頃刻無定而日至者終日未嘗轉移亦可謂萬中無一萬萬中無一矣惟繼以怠惰故不能期月孔子於此痛誨之顔子好學故三月不違仁此心清明不動三月而不違夫中庸大矣而曰得一善何也嗚呼惟深入其中者知之等曰知道而知有淺深有偏全德有大小有備不備故顔子之中庸猶為一善而已宗廟之美百官之富惟聖人有之如天地之無不持載無不覆燾如四時之錯行如日月之代明萬物並育而不相害道並行而不相悖惟孔子備之中庸之善不可能也人之為道而逺而此曰拳拳服膺而弗失者何也孔子大聖而曰我學不厭惟知道惟知學之不可已舊習尚深應物易昏孔子曰用力於仁舜命禹曰惟精惟一允執厥中學道每難於精一故戒之勉之拳拳者所以用非思非為之力惟學道者自知之而未知所以用力者不知也孟子謂勿忘勿助長者此也易所謂默而成之者此也孔子告子張以言忠信行篤敬立則見其參於前在輿則見其倚於衡者此也忠信無意説之可言篤敬亦無意説之可言孔子所以誨學者至詳明易曉矣而學者肯用其力者寡也故孔子謂顔子死後未聞好學者朱云罟網也擭機檻也陷阱坑坎也孔子曰天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也論語載孔子之言曰中庸之為德也其至矣乎民鮮久矣及子思所記則曰民鮮能久矣加一能字殊為失真已為起意有意則必有所倚非中庸夫事親從兄事君事長上蒞官從政日用萬務心思力行無非中庸而曰不可能者何也是心即道故曰道心心無體質無限量神用無方如日月之無所不照而非為也如四時寒暑錯行而非為也如水鑑萬象具有而非為也曰我能則意起矣孔子曰君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也孔子非偽實心以為未能謙不敢伐人之同心而況於聖人乎故謙為有道務伐無道謙則不立我伐則生於我意我消盡本心常虛曰我能則失之微起意則失之不起意亦失之道心如日神用獨妙道心如火蚊蚋不可泊止孔子曰吾有知乎哉無知也孔子猶無所知而況於能乎子路問強子曰南方之強與北方之強與抑而強與而爾也寬柔以教不報無道南方之強也君子居之袵金革死而不厭北方之強也而強者居之南方陽和之氣北方肅殺之氣先教後刑彼以無道加我我不報之此道也世所罕儷是謂南方之強周禮犀甲兕甲至孔子時有以金為甲袵衣也左右袵勇於殺人雖已死猶未厭足故君子和而不流強哉矯中立而不倚強哉矯國有道不變塞焉強哉矯國無道至死不變強哉矯子路北方之強也而能事孔子有志乎君子之道故誘而進之曰抑而強與既以寬柔以教不報無道啓之此又詳明其道子路往往以和則有隨流之失故自以強為是和則多流今不流豈不甚強矯者勉子路矯而歸此道也有意則必有所倚著惟無意無思無為斯無倚豈不甚強夫矯非無思無為用力以矯去倚著之意虛明博照乃矯乃道心之變化易曰變化云為此非大通者不達此妙子路以窮通為二故雖德行多虧而出仕國雖無道而亦仕道心虛明本無窮通之異雖國有道可仕而已德未修德雖修而上之人不我用雖義當仕而仕皆不動其心與窮塞之時無變改豈不甚強孔子以季氏無道而不仕於季氏仲弓德行微虧故為季氏宰而況於子路其不能不動心也固然而況於至死其心略不變改豈不甚強孔子所言每每導子路矯而歸諸道道心子路所自有一日覺之動靜一致有不學而能之妙子曰素隱行怪後世有述焉吾弗為之矣君子遵道而行半塗而廢吾弗能已矣君子依乎中庸遁世不見知而不悔惟聖者能之履卦之初曰素履謂窮在下孔子謂之素王亦以道不行無文明之業然孔子之出處無意無必此素隱之意則必於隱處而不出非道也行怪非常舜謂之殄行為絶異之行足以震驚師衆皆作意為之非道也高怪驚衆故後世容有述焉而孔子弗為聖王所禁此謂過之至於遵道而行半塗而廢則又不及孔子亦弗為進進而弗敢已是故中庸民鮮久矣君子依乎中庸亦猶論語依於仁依猶由也此心自中非外依中言不盡意當通其道舉世不見知惟聖者則不悔此無它聖則中虛無我固自有無窮之至樂知不一常一本文於此有君子之道費而隱夫婦之愚可以與知及其至也雖聖人亦有所不知云云詩云鳶飛戾天魚躍于淵言其上下察云云簡深疑皆子思之辭孔子曰心之精神是謂聖初無至不至之分費即隱上即下何必加察此惟覺者心通非告語所可及子思分喜怒哀樂之未發為中為大本發而皆中節為和為達道夫子未嘗如此分裂曾子謂夫子之道忠恕而子思曰忠恕違道不逺末又特指無聲無臭為至不知孔子言哀樂相生明目不可見傾耳不可聞即喜怒哀樂未嘗不至何必特指無聲臭為至故此疑皆子思之言豈子思以意會而誤記歟或自為之歟疑故闕亦深恐誤後學子曰道不逺人人之為道而逺人不可以為道詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止至哉聖言破萬世學者心術之蔽可謂切中矣人心即道學者自以為逺易曰百姓日用而不知惟其不知故以道為逺反求道於心外求則為此心即道而求諸彼道不俟於為而求諸為夫是以愈求愈逺愈為愈逺此萬世學者之通患也孔子曰心之精神是謂聖易又曰百姓日用奚俟復為棄心而他求棄道而生意意慮紛然作為雜然而益昏益妄矣是謂日用而不知是終日懷玉而告人以窶終日飲食而自謂飢渴也至近而自以為逺自有而自不認其有吾心清明無體廣大無際神用無方加之意則如雲氣之翳太虛矣如塵之積鑑矣意生為為生逺為之害道也如此為道如執柯伐柯終於與道為二然而有過不可不改過改即止無庸他求如有病斯用藥病去則藥可止然而為過失者此人也治其過失而改者亦此人也人則一改過乃變化亦無二茍過已改而猶不止則反亂其心孟子亦謂必有事焉而勿正心縱有揠苗耘苗之喻有事耘苗勿正心不可揠苗助長孟子又曰天下之不助苗長者寡矣以為無益而舍之者不耘苗者也助之長者揠苗者也非徒無益而又害之子曰君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也事父事君事兄先施朋友人皆以為己能而聖人自謂未能非真不能也謙德由中而發實不敢自以為能也中庸不可能而曰我能者皆己私也非道也孔子曰吾有知乎哉無知也知尚不可有而況於能乎能生於意意生如霧之興矣庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾道不外乎庸常特百姓日用而不知孔子自謂為之不厭為行也南容三復白圭孔子取焉又曰君子謹言學者多不知中庸即道而求之空虛寂滅故去道愈逺而自道心已明者觀之即日用庸常其行其謹皆變化云為乃道心之神用不可度思矧可射思此惟洞達大道者自知自信有餘不敢盡亦慮不可以傳於後言之必可行可行必可言言行相顧人自謂有思有為實非思非為皆大道之變化君子胡不即此庸常慥慥而行君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉素質也本也位者我所居之處也願乎外則為動心放逸違天言及夷狄則天下事理盡包括矣道一而已無入而不自得者虛明變化其樂不可言也在上位不陵下在下位不援上正已而不求於人則無怨上不怨天下不尤人故君子居易以俟命小人行險以徼幸陵下援上求人怨尤皆動乎意意不動則平易小人設術徼幸至於行險傾危君子反之惟平易安於天命子曰射有似乎君子失諸正鵠反求諸其身君子之道譬如行逺必自邇譬如登高必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻孥子曰父母其順矣乎射而不中反求諸己已盡射之道則發無不中矣君子行而不中節亦反求諸己已盡其道則行無不中節矣道不必求諸逺求諸身足矣求諸閨門之內足矣蓋邇者逺之始孔子引妻子好合兄弟和樂曰父母其順矣乎明其道一也子曰鬼神之為德其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫生則為人死則為鬼神孔子言鬼神之德如此其盛所以明人心之神其盛德亦若是初無死生之殊初無幽明之間人心出入無時莫知其鄉心無體質則亦不可見不可聞無體無方之神萬物以此發育四時以此運行非體物而不可遺乎洋洋乎如在其上如在其左右以明有無莫測之妙而人心出入應用之神其有無莫測之妙一致詩曰神之格思不可度思矧可射思人之心神亦然忽焉而視忽焉而聽又忽焉而言忽焉而動莫究厥始莫窮厥終莫執厥中非不可度不可射乎思語助此言鬼神而曰誠者誠即鬼神誠亦視不見聽不聞體物即誠之顯一以貫之子曰舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之言福祿之盛大以驗其德之大故大德必得其位必得其祿必得其名必得其夀故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子顯顯令德宜民宜人受祿于天保佑命之自天申之故大德者必受命材質也其質善固培之保佑命之宜民宜人即大德故舜得位得祿得名得夀周公位冢宰名垂萬世孔子稱王萬世祀之名垂無窮子曰無憂者其唯文王乎以王季為父以武王為子父作之子述之舜禹則不能無憂矣舜父瞽母嚚弟象傲禹之父鯀孔子無他意武王纘太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟享之子孫保之武王末受命周公成文武之德追王太王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也因言祭之達禮遂及喪之達禮期之喪達乎大夫此據周禮而言未必孔子深以為然古者不降上下各以其親子曰武王周公其達孝矣乎文王事殷武王伐之周公誅管蔡達孝之道故通變如此天下後世皆以武王周公為聖人信其大公無私之誠也夫孝者善繼人之志善述人之事者也春秋修其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也三昭三穆父為昭則子為穆子為昭則父為穆面南曰昭面北曰穆以太祖居奧面東而坐左昭右穆序爵所以辨貴賤也序事所以辨賢也以其賢可任以職事旅酬下為上所以逮賤也旅酬於下下亦得獻於上燕毛所以序齒也既祭而燕乃序齒尊老毛髮白位于上踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也備盡衆義皆大道之妙用不可度思惟達之者寡郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎郊社之禮禘嘗之義即治國之道一也至易至簡如示諸掌子曰愚而好自用賤而好自專生乎今之世反古之道如此者災及其身者也生乎亂世雖善猶恐不免況反古道乎非天子不議禮不制度不考文今天下車同軌書同文行同倫言上下無别雖有其位茍無其德不敢作禮樂焉孔子曰古之治天下者必聖人後世無其德則必求盛德之士而作禮樂雖有其德茍無其位亦不敢作禮樂焉子曰吾説夏禮杞不足徵也吾學殷禮有宋存焉語云宋不足徴恐傳之差孔子殷人當隱吾學周禮今用之吾從周王天下有三重焉其寡過矣乎謂三王上焉者雖善無徴無徴不信不信民弗從謂五帝文籍罕存無徴驗下焉者雖善不尊不尊不信不信民弗從謂五霸故君子之道本諸身徴諸庶民民之所欲天必從之民言可徴考諸三王而不繆建諸天地而不悖凡所建立不悖天地質諸鬼神而無疑百世以俟聖人而不惑質諸鬼神而無疑知天也百世以俟聖人而不惑知人也是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也詩云豫懷明德不大聲以色子曰聲色之於以化民末也子曰為政以德譬如北辰居其所而衆星拱之又曰德之流行速於置郵而傳命又曰君子之德風小人之德草草上之風必偃其繫易曰聖人以神道設教而天下服此心之神無所不通其應也如響蓋三才同此一道舉天下之人同此一心此心即道故曰道心君由道心以行而下民之道心靡不畢應矣斯道之神自然若此禮樂刑政所以行君心之德使禮樂刑政具備而君失其道民亦不化故聲色之可聞見皆末也道德為本隱而第二十孔子曰君子隱而顯不矜而莊不厲而威不言而信矜與厲道心所無動乎意則有之吾心虛明意慮不作唯有自然之莊敬自然之德威雖無所思為至隱矣而有自然之光自然之文顯著于外故不言而人自信彼中心之放逸者雖諄諄告人曰我善我誠人終不信子曰君子不失足於人不失色於人不失口於人君子至於此則純矣以曾子之戰戰兢兢終其身而猶失口於出祖失口於裼裘而弔而況不逮於曾子者乎必進於舜之精一文王之純而後能每每無所失此心神明如日月自無所不照自無所失其有失者皆因乎舊習未之消意欲之或起故本明之或虧必也又進乎顔子之三月不違仁至於百年如一日融融純純神光四達靡不照矣孔子曰事君不下達不尚辭非其人弗自子曰事君欲諫不欲陳鄭云陳其過於外詩云心乎愛矣瑕不謂矣中心藏之何日忘之子曰事君難進而易退則位有序自可循序而進不至無位易進而難退則亂也故君子三揖而進一辭而退以逺亂也子曰事君三違而不出竟則利祿也子曰事君可貴可賤可富可貧而不可使為亂子曰事君軍旅不辟難朝廷不辭賤處其位而不履其事則亂也故君使其臣得志則慎慮而從之否則孰慮而從之終事而退臣之厚也易曰不事王侯高尚其事子曰君子不以辭盡人彼辭有所隱不可窮盡其言故天下有道則行有枝葉天下無道則辭有枝葉言致曲不敢太直而隱是故君子於有喪者之側不能賻焉則不問其所費於有病者之側不能饋焉則不問其所欲有客不能館則不問其所舍故君子之接如水小人之接如醴君子淡以成小人甘以壞小雅曰盜言孔甘亂是用餤鄭注餤進也子曰君子不以口譽人則民作忠子曰口惠而實不至怨災及其身是故君子與其有諾責也寧有己怨鄭注己不許也子曰君子不以色親人情疏而貌親在小人則穿窬之盜也與子曰情欲信辭欲巧子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私褻事上帝是故不犯日月不違卜筮卜筮不相襲也鄭注襲因也大事則卜小事則筮大事有時日小事無時日有筮外事用剛日內事用柔日子曰君子敬則用祭器上不瀆於民下不褻於上已上皆出表記皆稱子所言其可疑者多今録如前其害道之甚著人皆可曉知斷非孔子之言者如曰仁天下之表夫仁不可得而言也仁覺也醫書謂四體不仁不知覺也孔子欲言仁者之所樂不可得而言姑取象於山使人默覺而可以表言乎覺非思慮之所及故門弟子問仁者不一而孔子答之每不同以仁即人心人心自仁唯動意生過故昏今隨羣弟子動意生過而啓之使過消則心自明實無可言者不可生微意奚可言表又曰畏罪者強仁仁豈可強為也又曰仁者右也道者左也仁言覺道言通名殊而實一豈可分仁有用道無為裂而為二又曰以德報怨寬身之仁也夫仁不可思不可言不可知而可以寬身言哉以德報怨孔子不取而謂子言之乎誣聖人太甚又曰以怨報怨則民有所懲孔子曰以直報怨聖言奚可改以怨報怨小人之亂也而以誣聖人乎餘不甚明著姑置不備論入官第二十一子張問入官於孔子論語曰子張學干祿蓋鄙之之辭此言入官子張自言故其辭婉孔子答以政從矣其情可睹孔子曰安身取譽為難也子張所以未能入官者譽之不善也安身明其未免於獄子張曰安身取譽如何孔子曰有善勿專子張有專善於己之失聖人設教因人而啓之教不能勿搢搢進也搢亦進之使入也故通用家語搢作怠者家語多以疑而輒改勿搢勿強進也己過勿發人既已有過勿復發之失言勿踦王肅云有人失言勿掎角之不善辭勿遂人有言辭不善勿遂之遂謂成之也彼辭不善猶未十分明著不可又從而發明之使無隱此意成人之惡也行事勿留子張有怠惰稽留之失已上六者皆子張之過故致毁而無譽衆多不樂之則身亦將不得安矣而況於政乎君子入官自行此六路者則身安譽至而政從矣六者亦人之通患故泛言君子入官之道特亦默中子張之心過且夫忿數者獄之所由生也距諫者慮之所以塞也慢易者禮之所以失也怠惰者時之所以後也奢侈者財之所以不足也專者事之所以不成也歷者獄之所由生也君子入官除七路者則身安譽至而政從矣此篇始略指六路今切指七路皆使子張求諸己季康子問從政唯及子路子貢冉求得非子張有前所陳之過失譽故與孔子言不虛施皆有所啓門人問同所答輒異因隨其蔽而啓之故異與子張忿厲繁數故縲絏於獄距諫不受故知慮蔽塞逺想子張堂堂之容則慢易距諫往往有之怠惰人之通患堂堂者多專不肯咨謀自任故多失事多不成歷者獄事之經歷戒其凡百於事宜務省約子張以多事致獄辭所經歷故戒之若夫公冶長則無俟乎致戒矣故君子南面臨官因問入官故此始言臨官之道大城而公治之家語作臨官大城之中家語多以疑而改作殊未安城者殆誠字之訛與孔子誨子張多曰忠信蓋其所少焉精知而略行之孔子知子張以太察失民譽故教之以知察精詳無害唯當略行之行之不可詳合是忠信考是大倫存是美惡進是利而除是害而無求其報焉而民情可得也修己主於忠信臨民亦當由忠信行之凡萬事悉當由忠信以行之總合盡由忠信其考察唯當及其大倫類不亂辨其美惡大槩而興利除害足矣不必責其詳不必責其報寬裕而民情斯得矣故臨之無抗民之志勝之無犯民之言民吾之赤子不可有抗拒之意今以忠信寬裕行之則無抗民之志矣蓋官與民交貢賦征役爭辨鬬訟之間不能一一皆順聽故或有抗民之志卒於民理屈而服是謂勝之勝之而又自矜而有犯民之言則失民情矣今以忠信寬裕行之則無是失矣是皆求子張之過也量之無狡民之辭民未從服唯大體量度之不復以狡譎之辭取其服大抵好察者或未得民之情往往或施狡之術此亦中子張之隱與養之無擾於時忿數者急躁往往使民多非其時愛之勿寬於刑子張雖忿數至於當刑又或寬縱大抵人欲用事不失之猛則失之寬言此則身安譽至而民自得也言其如此則身安譽至而民心自得矣故君子南面臨官所見邇故明不可蔽也家語作蔽大戴作弊邇者逺之始書曰邇可逺在兹孔子所告子張之言皆使子張求諸己是謂邇所見邇則明白易見求諸逺則渺茫難明矣所求邇故不勞而得也所以治者約故不用衆而譽至也約亦邇之意求諸己唯治己之過豈不甚約故行不用多端而譽自至矣法象在內故不逺周禮曰乃縣治象之法昧者求治於外唯明者知法象在內而不在外民唯從上之心上心不善雖有法象民弗從也源泉不竭故天下積也源泉亦在內之意謂吾之道心也心動乎意則為人欲則有竭則不常唯不動乎意無諸過失是為道心故常故不竭亦猶源泉不竭則天下積水甚廣且深道心不動乎意故應用不竭此心常一布諸事業無不咸善而木不寡短長人得其量而繼辭也又為之喻也亦猶木材不寡則或短或長人皆得而用之滿足其意量有大小隨其量之所容而滿足之曰得其量不寡猶不竭稱物而施大小多寡輕重人心咸得而悅矣故治而不亂故六者貫乎心藏乎志六者六言云爾亦猶孔子間居五至三無五起其實一也志猶心也貫通也既曰貫乎心又曰藏乎志非有二也暢而明之故重復也今人之常言亦多此類形乎色發乎聲言自心志而發誠而非偽若此則身安而譽至而民自得也故君子南面臨官不治則亂至亂至則爭爭之至又反於亂前言故治而不亂謂如孔子之言則有道則治而不亂若臨官不治則亂至矣亂至則爭者以行事不合乎民情民不從故辨而爭前言勝之無犯民之言者謂與民辨而勝之也後言民不辨法謂民聽而不爭也爭之至甚將以辨其理直而治之也而民愈不從反亂是故寬裕以容其民慈愛以優柔之而民自得也己故躬行者政之始也前所言皆教子張躬行也政本於躬行不必求諸後調説者情之道也和調説豫者人情之道也不可忿數爭辨善政行易則民不怨易者平易和樂言調説則民不辨法爭辨多因於激言辭調説則民自順聽不復辨矣仁在身則民顯以佚之也仁者躬行調説之道顯者民咸譽之尊之故榮顯也佚者政簡民説不爭辨故佚也財利之生微矣貪以不得善政必簡矣茍以亂之善言必不聽矣詳以納之財利之生微矣憫民之貧也子張奢侈則財不足將貪而取於民曰不得者戒之也善政必簡知子張茍然亂之矣善言民必聽子張必徒詳言而民不聽以子張未明在我之道心而動於人欲求諸外求諸詳也前言奢侈者財之所以不足又言略行之于以知子張奢侈又失之太詳大抵本心未明多有此患家語多好改作乃供已而不節財則財利之生者微矣貪以不得則善政必簡矣茍以亂之則善言必不聽也詳以納之則規諫日至屢見家語於辭旨稍疑輒以意改作此類甚多規諫日至煩以不聽矣規諫日至顧煩躁不聽而遂已矣者遂己之辭言其不復咨問言之善者在所日聞行之善者在所能為勉子張以聽善言行善行以改過故上者民之儀也有司執政者民之表也邇臣便辟者羣臣僕之倫也便者近便也辟者側也謂近便辟側左右之臣也故儀不正則民失誓表弊則百姓亂邇臣便辟不正亷而羣臣服汚矣誓戒勑之也上不正則不能誓民雖誓之民亦不從是謂失誓服事也邇臣不正亷則羣臣咸從事乎汙下矣蓋邇治則逺治源清則流清故不可不慎乎三倫矣故君子修身反道察説而邇道之服存焉修身也反道也察説也是謂三倫修身言其大略反道言其精至修身而未反乎道雖善而未至亦未能以感化下民雖修身雖反道而不能察言説知人則雖有善道為小人所障蔽不得下達矣道者人心之所自有此心即道故曰反言其非外也三倫皆在我者為邇近之道服事也三倫備而邇道之事存矣存謂不失也是故夫工女必自擇絲麻良士必自擇齎財齎謂資也賢君良上必自擇左右始故佚諸取人勞於治事勞於取人佚於治事故君子欲譽則謹其所便順便適意之處易於迷惑而失欲名則謹於左右故上者辟如緣木者務高而畏下者滋甚六馬之離必於四面之衢民之離道必於上之佚政也故上者尊嚴而絶百姓者卑賤而神民而愛之則存惡之則亡也亡謂逃去故君子南面臨官貴而不驕富而能恭有本能圖不驕不侈富恭敬一道也記者不善為辭而不明白歟抑有闕文歟不驕不侈富恭敬唯有本者能圖之本者道也修業居久而談談者覃字之訛歟日用云為皆事也業也不驕不侈富恭敬皆業也修業居久則誠純浸深廣而及逺矣情邇暢而及乎逺察一而關乎多一物治而萬物不亂者以身為本者也修身邇道也本乎心故曰情一者本也即身也即所謂一物治者也故君子蒞民不可以不知民之性達諸民之情既知其以生有習然後民特從命也民生有血氣目視耳聽口之於味鼻之於臭四肢之於安佚有喜有怒有哀有懼有愛有惡有欲有習於善習於惡習於俗習於學有習於正有習於怪有習於富貴有習於貧賤紛紜萬狀不可殫述必咸知其性情順以導之故民從命也特有甚義故世舉則民親之謂舉世之民親之言辭有如此者政均則民無怨故君子蒞民不臨以高不道以逺不責民之所不能今臨之明王之成功則民嚴而不迎也子張堂堂故孔子告之以恭敬以不驕戒其尊嚴而絶此又曰不臨以高逺者邇之反前屢言邇此又曰不道以逺子張不寬周衰世亂俗壞遽欲責民如明王已成功之時不以漸圖之故民嚴憚而不迎承也迎順也道以數年之業則民疾數年而後可成之業今遽導之使即成則民疾怨疾則辟矣疾其上則亂其心邪辟矣故古者冕而前旒所以蔽明也紘紞塞耳所以弇聰也故水至清則無魚人至察則無徒故枉而直之使自得之優而柔之使自求之揆而度之使自索之民枉矣固當直之然未可遽絶其枉唯當隨其所枉而直之使民自得之優而柔之優裕也寬也柔者不加之以嚴也臨官者固當揆度人情事理必使民自索之索猶求也書曰御衆以寬民有小罪必以其善以赦其過既有罪雖小亦不可徒赦也必以其有善補其過而赦之如死使之生其善也如殺人罪當死然其情有出於誤殺偶然而非其本情者則不可置之死是謂宥過是亦小罪其有如此類則甚善也善猶美也是以上下親而不離故惠者政之始也政不正則不可教也不習則民不可使也子張嚴而不惠故孔子告以惠子張於修身反道有未至焉其於政則有不正不正則民不服不可教矣民情不相親不相習則難使故君子欲言之見信也者莫若先虛其內也欲政之速行也者莫若以身先之也欲民之速服也者莫若以道御之也言之不見信於民由立己私而不虛也虛其內而後能修身以先民是謂道故不先以身雖行必僯矣説文僯行難也引易曰以往遴僯音吝不以道御之雖服必強矣故非忠信則無可以取親於百姓矣外內不相應則無可以取信者矣四者治民之統也此言四者亦猶前言六者言雖有四其道實一欲暢而明之故重復而言之子張堂堂用志多外故外內不相應故多過尤故未得道故民多不信服定公問郊第二十二定公問於孔子曰古之帝王必郊祀其祖以配天何也孔子對曰萬物本於天人本乎祖郊之祭也大報本反始也故以配上帝天垂象聖人則之郊所以明天道也公曰寡人聞郊而莫同何也孔子曰郊之祭也迎長日之至也冬至而日漸長大報天而主日配以月祭義亦云郊之祭大報天而主日配以月郊特牲唯言郊之祭大報天而主日不言配以月故周之始郊其月以日至其日用上辛至於啓蟄之月則又祈榖于上帝此二者天子之禮也魯無冬至大郊之事降殺於天子是以不同也公曰其言郊何也孔子曰兆丘於南所以就陽位也於郊故謂之郊焉曰其牲器何如孔子曰上帝之牛角繭栗必在滌三月在者觀察也滌者洗濯之后稷之牛唯具有牛足以具禮斯已矣不必繭栗也具猶備也今人有曰備禮足矣亦有降殺之意所以别事天神與人鬼也牲用騂尚赤也周禮牧人職云凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之郊陽祀尚赤故用騂用犢貴誠也掃地而祭於其質也器用陶匏以象天地之性也萬物無可稱之者故因其自然之體也誠者如斯而已一無所知犢似之質猶誠也不文之謂也古者質而已矣陶亦質以匏瓜為器亦質而又因其自然而非人為之器於掃地而祭已明其質故於此不復再言而發其自然之旨自然猶質也天地之性道之異名也此郊天而并言地者因以明天地無二性也曰誠曰質曰自然一也皆所以明道也夫道一而已矣人之所以違道者以失其本然誠實之性而起意也起意則支則離則變詐則浮外趨文而失其質君子之文質彬彬者由質而生文非逐外也起乎意則作則為非自然也不起乎意雖視聽言動如日月之照臨如四時之錯行如水鑑中之萬象交錯而非思也非為也是謂自然又謂之誠謂之質天以此健行地以此發生日月以此明四時以此行故亦謂之天地之性三才同此一道君以此尊臣以此卑父以此慈子以此孝夫婦以此别朋友以此信一也今將以祭天而不以天道行之安能格天陽位尚赤蓋因古始公曰天子之郊其禮儀可得聞乎孔子對曰臣聞天子卜郊則受命于祖廟而作龜於禰宫尊祖親考之義也卜之日王親立于澤宫以聽誓命受教諫之義也射義云天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宫射中者得與於祭不中者不得與於祭既卜獻命庫門之內所以誠百官也小戴記郊特牲不言定公孔子問答無此既卜之文誠作戒戒百官也之下又曰太廟之命戒百姓也孔疏云有司獻王所以命百官之事百姓王之親屬孔子不言射以擇士豈略之耶抑孔不欲以中不中擇士耶孔子嘗曰射不主皮為力不同科古之道也孔子於禮亦有所變有所略孔子之時周衰王政不行故孔子得以申其本志以明道與將郊則天子皮辨以聽報示民嚴上也郊特牲將郊作祭之日郊之日喪者不敢哭凶服者不入國門汜掃清路行者畢止弗命而民聽敬之至也郊特牲無郊之日三字掃作掃清作反無行者畢止四字而有鄉為田燭四字鄭云田首為燭聽下有上字無敬之至也四字天子大裘以黼之被裘象天乘素車貴其質也旗十有二旒龍章而設以日月所以法天也既至泰壇王脫裘矣服衮以臨燔柴戴冕藻十有二旒則天數也郊特牲作王被衮以象天無天子大裘以黼之七字而繼曰戴冕璪十有二旒則天數也乘素車貴其質也旗十有二旒龍章而設日月以象天也天埀象聖人則之郊所以明天道也無既至泰壇王脫裘矣服衮以臨燔柴之文按周官司服王之吉服祀昊天上帝則服大裘而冕祭五帝亦如之享先王則衮冕夫周官周公所作之書道明義詳非他人所能為而與此所記孔子之言不合何耶燔柴正所以祀上帝而不以大裘至泰壇而脫裘服衮竊有疑焉詳考家語諸書所記至疑阻則輒以意改作以大戴記參驗則家語多人改為今唯存疑以俟聖哲王肅注云大裘為黼文也簡觀以黼之之文知大裘本無黼然則黼之者謂裳黼者白與黑之文西白北黑西北乾之次其明天道歟大裘無文正合天道而王肅曰大裘其有象天之文殊未安臣聞之誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝是以君子無敢輕議於禮也自誦詩以下亦見於禮器首孔子曰夫道一而已矣而等級有若是不同者何也道則一而人自不一人心即道故曰道心因物有遷起而為意始蔽其本心所蔽寡者則於道所失亦寡所蔽多者則於道所失亦多故衆人不如賢人小賢不如大賢大賢不如聖人鬼神若是不同唯道同而後可祭人君之道未與上帝同則亦安能饗上帝祭義曰惟聖人為能饗帝孝子為能饗親是亦孔子之旨孔子自言我祭則受福蓋自知其道大無所不通故知必受福喪禮第二十三孔子曰禮之所以象五行也其義四時也故喪禮有舉焉有恩有理有節有權取之人情也恩者仁也理者義也節者禮也權者知也仁義禮知人道具矣其恩厚者其服重故為父母斬衰三年以恩制者也門內之治恩掩義門外之治義掩恩小戴記載諸喪服四制無孔子曰作義斷恩資於事父以事君而敬同貴貴尊尊義之大也故為君亦斬衰三年以義制者也三日而食三月而沐期而練毁不滅性不以死傷生也喪不過三年苴衰不補墳墓不修除服之日鼓素琴示民有終也凡此以節制者也資於事父以事母而愛同天無二日國無二君家無二尊以一治之故父在為母齊衰期者見無二尊也百官備百物具不言而事行者扶而起言而後事行者杖而起身自執事而後行者面垢而已此以權制者也親始死三日不怠三月不懈期悲哀哀或作號三年憂哀之殺也聖人因殺以制節也喪服四制於百官備之上有曰杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰喪服篇而喪大記曰君之喪三日子夫人杖五日既殯授大夫世婦杖大夫之喪三日之朝既殯主人主婦老皆杖士之喪二日而殯三日之朝主人杖婦人皆杖由是觀之則與四制及喪服異禮四制及喪服其衰世之禮歟二篇皆無孔子曰非孔子言歟孔子曰杖而起者輔病也而曰爵者非人子之情也顔淵死魯定公弔焉使人訪於孔子孔子對曰凡在封內皆臣子也禮君弔其臣升自東階向尸而哭其恩賜之施不有算也公西華問曰大夫以罪免其葬也如之何孔子曰大夫廢其事終身不仕死則葬之以士禮老而致仕者死則從其列子罕問曰始死之設重也何為孔子曰重主道也殷主綴重焉周人徹重焉祔而作主殷練而祔神之依重也久矣故雖作主而綴重周卒哭而祔神之依重也未久故作主而遂徹重神即依主不患其猶戀重也問喪朝子曰喪之朝也順死者之孝心故至於祖考廟而後行殷朝而殯於祖周朝而遂葬子路問曰魯大夫練而杖禮與孔子曰吾不知也子路出謂子貢曰吾以為夫子無所不知夫子亦有所不知也子貢曰子所問何哉子路言之子貢曰止吾將為子問之止子路以待遂趨而庭曰練而杖禮與孔子曰非禮也子貢出謂子路曰子謂夫子而弗知之乎子問非也禮居是邦則不非其大夫叔孫武叔之母死既小斂舉尸者出户武叔從之出户乃袒投其冠而括髮子路嘆之而問孔子孔子曰是禮也子路曰將小斂則變服今乃出户而夫子以為知禮何也子曰由女問非也君子不舉人以質事齊晏桓子卒平仲粗衰斬苴絰帶杖菅屨食粥居倚廬寢苫枕草其老曰非大夫喪父之禮也當時大夫廢禮者多老習見以為常故謂平仲非大夫喪父之禮晏子曰唯卿大夫其意謂唯卿大夫故當如此盡禮無禮何以為卿大夫而其言婉而隱曽子以問孔子子曰晏平仲可謂能逺害矣不以己之是較人之非遜辭以避咎義也夫季平子卒將以君之璵璠斂贈以珠玉孔子初為中都宰聞之歷級而救焉曰送死而以寶玉是猶暴尸於中原也其示民以姦利之端而有害於死者安用之且孝子不順情以危親忠臣不兆姦以陷君乃止孔子之弟子琴張與宗魯友衛齊豹見宗魯於公子孟縶孟縶以為參乘焉及齊豹將殺孟縶告宗魯使行宗魯曰吾由子而事之今聞難而逃是僭子也僭差也使子言差失子行事乎吾將死之以周事子而歸死於公孟其可也齊氏用戈擊公孟宗魯以背蔽之斷肱中公孟皆死琴張聞宗魯死將往弔之孔子曰齊豹之盜而孟縶之賊也於齊豹之盜宗魯實為孟縶之賊罪其不忠告公孟雖以背蔽而死之實通謀共殺之故曰賊公孟即縶女何弔焉君子不食姦宗魯自言公孟雖不善以利故不能去是吾過也不受亂不為利疚於回家語疚作病夫齊豹之殺公孟是回邪也宗魯聞其謀而不忠告公孟是又回邪也大體在回邪之中尚何謀利謀害為哉疚病害也不以回待人知公孟不善而不諫知齊豹之不善而以事周之皆待人以回邪不救不蓋不義齊豹怨孟縶奪司寇與鄄有役則反之無則取之不能去而為亂是不義宗魯蓋之不諫豹又不告公孟如公孟不善不諫而蓋之既已事公孟而與齊豹通謀而共殺之是大不義又蓋覆之不明告不犯非禮女何弔焉琴張乃止魯昭公夫人吳孟子卒不赴于諸侯孔子既致仕而往弔焉適于季氏不絰孔子投絰而不拜子遊問禮與孔子曰主人未成服則弔者不絰焉禮也孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退蘧伯玉請曰衛鄙俗不習喪禮煩吾子辱相焉孔子許之掘中霤而浴毁竈而綴足襲於牀及葬毁宗而􅀈行出于大門及墓男子西面婦人東面既封而歸本於是有殷道也孔子行之簡謂非孔子之志故不敢書孔子不私於殷子遊問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而已矣禮非自外至人心之所自有也喪事從其質者生乎人之哀也綴足欲今不僻戾也毁宗􅀈行者已飾柩設披屬引毁宗則寬便專於死者祭猶廢之則宗可毁也所毁其宗廟之墻垣歟周衰有婦人從男子皆西向之俗時禮四十待盈坎則主人不待封之既而歸孔子葬母雖曰先反然已既封矣以既封故謂門人曰女來何遲也季桓子之喪康子練而無衰子遊問於孔子曰既練服可以除衰乎孔子曰無衰衣者不以見賔何以除焉邾人以同母異父之昆弟死將為之服因顔克而問禮於孔子曰繼父同居者則異父昆弟從為之服不同居繼父且猶不服況其子乎子路問曰臧武仲率師與邾人戰于狐鮐遇敗焉師人多喪而無罰古之道然與孔子曰謀人之軍師敗則死之謀人之邦邑危則亡之古之正也其君在焉者有詔則無討問康子疾第二十四孔子適季氏康子晝居內寢孔子問其所疾康子出見之言終孔子退子貢問曰季孫不疾而問其疾禮與孔子曰禮君子不有大故則不宿於外非致齊也非疾也則不晝處於內是故夜居外雖弔之可也晝居於內雖問其疾可也衛公使其大夫求婚於季氏桓子問禮於孔子子曰同姓為宗有合族之義故繫之以姓而弗别綴之以食而弗殊雖百世婚姻不得通周道然也桓子曰魯衛之先雖寡兄弟寡者謙辭也王侯自稱孤寡不榖今已絶逺矣可乎孔子曰固非禮也夫上治祖禰以尊尊之下治子孫以親親之旁治昆弟所以敦睦也此先王不易之教也有若問曰國君之於同姓如之何孔子曰皆有宗道焉故雖國君之尊猶百世不廢其親所以崇愛也雖族人之親而不敢戚君所以謙也戚親也不敢親者君自卑謙而尊君不敢盡如其親也公父文伯之母季康子之從祖母康子往焉側身而與之言曰皆不踰閾婦人不可專故立門之側國語則作䦱闢也音蒍慮康子不知禮或踰門限故曰皆不踰閾庸情於此往往不敢如此言恐忤康子然皆者彼此之辭矧敬言之宜無怨文伯祭其祖悼子康子與焉進爼而不授王肅云進爼康子而不親授徹俎而不與燕宗老不具則不繹王肅云不具不在也繹又祭也繹不盡飫而退國語韋昭解曰立曰飫坐曰宴繹畢而飲不盡飫而退王肅曰飫厭神其義未安孔子聞之曰男女之别禮之大經公父氏之婦動中德趣度於禮矣季康子朝服以縞曾子問於孔子曰禮乎子曰諸侯皮辨以告朔然後服之以視朝若此禮者也皮辨色素其服亦素孔子隱之恐傷康子諸侯服以視朝則卿大夫朝服不可以縞明矣云若此禮者為辭甚婉矣孔子為大司寇國廏焚子退朝而之火所鄉人有自為火來者則拜之士一大夫再子貢曰敢問何也子曰其來者亦相弔之道也吾為有司故拜之孔子在宋見桓魋自為石椁三年而不成工匠皆病夫子愀然曰若是其靡也死不如速朽之愈冉子僕曰禮凶事不豫此何謂也乎夫子曰既死而議諡諡定而卜葬既葬而立廟皆臣子之事非所豫屬也況自為之哉南宫敬叔以富得罪於定公奔衛衛侯請復之載其寶以朝夫子聞之曰若是其貨也喪不如速貧之愈子遊侍曰敢問何謂如此孔子曰富而不好禮殃也敬叔以富喪矣而又弗改吾懼其將有後患也敬叔聞之驟如孔氏而後循禮施散焉孔子適季孫季孫之宰謁曰君使求假於田將與之乎季孫未言孔子曰吾聞之君取於臣謂之取與於臣謂之賜臣取於君謂之假與於君謂之獻季孫色然悟曰吾誠未達此義遂命其宰曰自今以往君有取一切不得復言假也子産第二十五子遊問曰夫子極言子産之惠也可得聞乎孔子曰惠在愛民而已矣子遊曰愛民謂之德教何翅施惠哉子遊在孔門猶未知愛與德教之異子曰夫子産猶衆人之母也能食之弗能教也子遊曰其事可言乎子曰子産以所乘之車濟冬涉是愛而無教也遵道而行則無非德教子産愛民如此知其未得道故知其無德教況使庶人而用大夫之車非正是教之為不正也公父文伯退朝朝其母其母方績文伯曰以歜之家而主猶績懼干季孫之怒也其以歜為不能事主乎其母嘆曰魯其亡乎使童子備官而未之聞邪而爾也見洪範居吾語女昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生佚則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也是故天子大采朝日周禮典瑞王搢大圭執鎮圭繅藉五采五就以朝日與三公九卿祖識地德陽為德隂為刑故日食修德從其氣類也此宜曰天德而曰地德何也天地之德一也知天而不知地則不特不知地亦不知天矣故此特曰地德祖者本也徇末者不足以識地德孔子曰古之治天下者必聖人三公論道經邦燮理隂陽其朝日也所以行順天之禮使民之敬也茍不知天地日月一貫之妙徒日朝其至陽之精則實不知朝日之道亦不識天地之德也日中考政與百官之政事師尹惟旅牧相宣序民事旅衆也師尹則甚衆矣謂考政亦有下關師尹之事牧州牧也相凡輔相之官也其職亦大凡卿大夫任其職者為相歟以其大故復異其辭少采夕月韋昭曰少采其三采也與太史司載糾虔天刑月食修刑刑隂類太史掌六典掌法掌則凡辨法者考焉不信者刑之凡邦國都鄙及萬民之有約劑者藏焉以二六官之所登若約劑亂則辟法不信者刑之司載謂司盟載之官周官司盟掌盟載之法邦國有疑會同則掌其盟約之載凡民之有約劑者其二在司盟有獄訟者則使之盟詛司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之凡大約劑書於宗彜小約劑書於丹圖若有訟者則珥而辟藏其不信者服墨刑若大亂則六官辟藏其不信者殺鄭康成注云珥讀曰釁謂殺雞取血釁其户司約司盟總謂之司載日入監九御使潔奉禘郊之粢盛九御即九嬪周禮九嬪凡祭祀贊玉齍世婦帥女官而濯溉為齍盛然則九嬪使世婦以下為之歟溉許既反取也一曰拭也而後即安諸侯朝修天子之業命晝考其國職夕省其典刑夜警百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安士朝而受業晝而講貫夕而習復夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠王后親織玄紞説云紞冠之垂前後者韋昭謂紞所以縣瑱當耳者王肅云紞冠垂者公侯之夫人加之以紘綖韋昭曰冕曰紘紘纓之無緌者也從下而上綖冕上之覆也卿之內子為大帶韋云卿之適妻曰內子大帶緇帶也命婦成祭服韋云命婦大夫之妻也祭服玄衣纁裳列士之妻加之以朝服韋云列士元士也朝服天子之士皮辨素積諸侯之士玄端委貌司服士之服自皮辨而下自庶士以下皆衣其夫社而賦事蒸而獻功男女效績愆則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業況有怠惰其何以避辟吾冀而朝夕修我曰必無廢先人爾今曰胡不自安以是承君之官余懼穆伯之絶祀也孔子聞之曰弟子志之季氏之婦不淫矣國語作仲尼郯子朝魯昭公與之宴昭子問焉曰少皥氏以鳥名官何故也郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名太皥氏以龍紀故為龍師而龍名我高祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏厯正也杜預云鳯鳥知天時玄鳥氏司分者也杜云玄鳥燕也以春分來秋分去伯趙氏司至者也杜云伯趙伯勞也以夏至鳴冬至止青鳥氏司啓者也青鳥倉庚也以立春鳴立夏止丹鳥氏司閉者也杜云丹鳥鷩雉也以立秋來立冬去上皆厯正之屬官祝鳩氏司徒也爾雅釋某氏引此鳲鳩氏司徒鳲鳩即隼其夫不者故為司徒也郭璞云今䳕鳩詩曰翩翩者隼毛傳云隼夫不也一宿之鳥陸璣云今小鳩也幽州人或謂之瞗凰梁宋之間謂之佳揚州亦然杜云祝鳩鷦鳩也鷦鳩孝故為司徒主教民雎鳩氏司馬也鷙而有别故為司馬主兵兵法嚴而有别詩雎鳩在河洲鳲鳩氏司空也爾雅鳲鳩鴶鵴郭璞謂布榖非也杜云鳲鳩平均司空平水土爽鳩氏司寇也杜云爽鳩鷹也鷙故為司寇謂鷹能逺視取小物甚精故曰爽歟用刑宜明鶻鳩氏司事也杜云鶻鳩鶻雕也春來冬去故為司事爾雅鶌鳩鶻鵃郭云多聲似山鵲而小短尾青黑色簡謂鶌音始長而緩終急音似鶻雕事必緩審無失卒不可不敏爾雅邢疏謂舊説及廣雅皆云班鳩也非某見班鳩色褐頸班非青黑又不為小五鳩鳩民者也五雉為五工正爾雅雉南方曰􅔧東方曰鶅北方曰鵗西方曰鷷杜預并取爾雅伊洛而南素質五采皆備成章曰翬為五雉利器用正度量夷民者也九扈為九農正爾雅春鳸鳻鶞夏鳸竊玄秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹行鳸唶唶宵鳸嘖嘖郭云諸鳸皆因其毛聲色以為名竊藍青色杜預以此八鳸并上鳸鷃為九鳸鳸作扈郭謂諸鳸皆因其毛色聲音以為名謂竊藍青色而注竊脂又謂之青雀邢疏云諸儒説竊脂皆謂盜人脂膏下云竊玄竊黃者豈復盜竊玄黃乎案下篇釋獸云虎竊毛謂之虦貓魋如小熊竊毛而黃竊毛皆謂淺毛竊即古之淺字但此鳥其色不純竊玄淺黑也竊藍淺青也竊黃淺黃也四色皆具則竊脂淺白也爾雅鶨鶀老鳸鷃也舍人李巡孫炎郭氏皆斷老上屬鳸下屬唯樊光斷鶨鶀為句以老下屬賈逵云春鳸分五相五土之宜趣民耕種者也夏鳸竊玄趣民耘苗者也秋鳸竊藍趣民收斂者也冬鳸竊黃趣民蓋藏者也棘鳸竊丹為果驅鳥者也行鳸唶唶晝為民驅鳥者也宵鳸嘖嘖夜為農驅獸者也桑鳸竊脂為蠶驅雀者也老鳸鷃鷃趣民收麥令不得晏起者也舍人樊光注爾雅其言亦與賈同夫農官相五土之宜非每春為之者賈此言未安邢疏以郭杜皆不用賈説故盡謂賈説為非又太過亦不詳觀賈旨郭杜以疑故不載其説未必全非之簡謂竊者淺音之輕急者爾亦猶忌者居音之重輕音之重者止又截音節則音曾扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也孔子聞之見於郯子而學之考史記及左傳是年孔子年二十七蓋以世家言孔子七十三而終年表魯襄公二十二年孔子生推之世考孔子家語終記則謂孔子終而言七十二矣審如終記則孔子於是年二十六而杜預謂年二十八既而告人曰吾聞之天子失官學在四夷猶信晉治兵于邾南甲車四十乘遂合諸侯于平丘及盟子産爭承曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢杜云言鄭在甸服外懼弗給也敢以為請諸侯靖兵好以為事行理之命杜云行理使人通聘問者也無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中爭至于昏晉人許之既盟子太叔咎之曰諸侯若討其可瀆乎子産曰晉政多門二偷之不暇何暇討國不競亦陵何國之為詩云無競維人競強意也以強者好爭競故世以競為強此亦強立無懦云爾孔子謂子産於是行也足以為國基矣詩曰樂只君子邦家之基子産君子之求樂者也且曰合諸侯藝貢事禮也子産不茍於承貢而爭懼國不給而亡不亡則樂矣子産求是樂也孔子因是言晉合諸侯制貢事於王禮也時晉奉王人劉子為會齊景公第二十六齊景公田于沛杜預云沛澤名招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之孟子及孔子家語皆作招虞人以旌不至唯左氏傳旌作弓簡思齊景公雖未為賢然能用晏子能釋虞人則亦未為甚昏何至以大夫之招招虞人左氏傳春秋乃據諸國史而孟子家語或得之世傳而失實邪嘗詳驗家語所記多失實而孟子言禹排淮泗而注之江與禹貢不同亦非實孔子聞之曰善哉守道不如守官君子韙之觀書當觀其旨夫道一而已矣守官即守道而夫子别而言之何也道有善其大體者有隨事而言者此隨事而言君命召即往此道也然齊景公先失其道使虞人遂從其失道之招是上下相與為亂故孔子取虞人之不往晉魏獻子為政魏舒分祁氏之田以為七縣鄥祁平陵梗陽塗水馬首盂分羊舌氏之田以為三縣銅鞮平陽楊氏司馬彌牟為塢大夫太原塢縣賈辛為祁大夫太原祁縣司馬烏為平陵大夫魏戊為梗陽大夫戊魏舒庶子梗陽在太原晉陽縣南知徐吾為塗水大夫塗水太原榆次縣韓固為馬首大夫孟丙為盂大夫太原盂縣樂霄為銅鞮大夫上黨銅鞮縣趙朝為平陽大夫僚安為楊氏大夫平陽楊氏縣謂賈辛司馬烏為有力於王室辛烏帥師納敬王故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也非適子曰餘子其四人者皆受縣而後見於魏子以賢舉也賈辛將適其縣見於魏子魏子曰辛來昔叔向適鄭鬷蔑鬷子紅反惡惡貌醜欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不揚子若無言吾幾失子矣言之不可以已也如是遂如故知今女有力於王室吾是以舉女行乎敬之哉毋墮乃力孔子聞魏子之舉也以為義曰近不失親逺不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也魏子之舉也義其命也忠其長有後於晉國乎晉趙鞅荀寅帥師城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉孔子曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子之刑夷之搜也晉國之亂制也若之何以為法被廬之法既正矣而又易之非正則亂矣趙盾雖有善而未盡正道故終亂中都宰第二十七孔子初仕為中都宰制為養生送死之節長幼異食強弱異任男女别塗路無拾遺器不雕偽為四寸之棺五寸之槨因丘陵為墳不封不樹行之一年而四方之諸侯則焉定公謂孔子曰學子此法以治魯國何如孔子對曰雖天下可乎何但魯國而已哉於是二年定公以為司空乃别五土之性周官大司徒辨五地之物生一曰山林二曰川澤三曰丘陵四曰墳衍五曰原隰而物各得其所生之宜先時季氏葬昭公于墓道之南至是孔子溝而合諸墓焉謂季桓子曰貶君以彰己罪非禮也今合之所以掩夫子之不臣貶君者季平子至是已卒六年矣季氏益衰政在陽虎由司空為司寇設法而不用無姦民定公與齊景公會于夾谷地名孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公從之至會所為壇位土階三等以遇禮相見犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之使萊人以兵鼓謲劫定公孔子歷階而進以公退曰士兵之王肅曰雷鼓曰謲史記孔子歷階而進不盡一等舉袂而言無以公退士以兵之之文此據家語所謂以兵之者以兵禦之歟吾兩君為好裔夷之俘敢以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯心怍麾而辟之家語辟作避將盟齊人加於載書曰齊師出境而不以甲車三百乘從我者有如此盟孔子使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將設享禮孔子謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合享而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其己乃不果享齊侯歸責其羣臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使得罪於魯為之奈何有司進曰君子有過則謝以質小人有過則謝以文君若憚之則謝以質於是齊侯乃歸鄆歡龜隂之田孔子言於定公曰家不藏甲大夫無百雉之城王肅曰高丈長丈曰堵三堵曰雉杜預同又云雉長三丈古之制也今三家過制請皆損之乃使季氏宰仲由墮三都於是叔孫州仇帥師墮郈侯犯以郈叛叔孫州仇仲孫何忌再圍郈左傳云武叔懿子圍郈弗克秋二子反齊師復圍郈弗克至是墮郈孔子蓋因其情季孫斯仲孫何忌帥師墮費史記及家語皆云公山弗擾或作不狃叔孫輒率費人襲魯孔子以公與季孫叔孫孟孫入于季氏宫登武子之臺費人及臺側孔子命申句須樂頎勒士衆下伐之費人北遂墮費而論語公山弗擾以費畔召子欲往與此事情矛盾史記載公山不狃以費畔召子時夫子未為中都宰將墮成公斂處父謂孟孫墮成齊人必至於北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮公圍成弗克初魯有沈猶氐者常朝飲其羊以詐市人有公慎氏者妻淫不制有慎潰氏者奢侈踰法鬻六畜者飾之以儲價及孔子之為政也則沈猶氏不敢朝飲其羊公慎氏出其淫妻慎潰氏越境而徙三月則鬻牛馬者不儲價賣羔豚者不加飾男女行者别於塗塗不拾遺男忠信女貞順四方客至於邑者不求有司皆如歸焉先聖大訓卷三
