body:
  text: 先聖大訓卷一宋楊簡撰蜡賓第一小戴記家語並名此篇曰禮運此名學者所加非聖人本言蓋謂禮其迹爾必有妙者運之不悟道實無二孔子言禮本大一分為天地轉為陰陽變為四時列為鬼神行之以貨力辭讓飲食冠昏喪祭射御朝聘又言夫孝天之經地之義民之行皆謂名殊而實一道無精粗今名蜡賓庶不分裂害道孔子為魯司寇與於蜡賓事畢出游於觀之上喟然而嘆小戴記於是曰仲尼之嘆蓋嘆魯也殊為害道孔子曰吾道一以貫之孔子之心即道其言亦無非道舉六合通萬古一而已矣無他物也喟然而嘆嘆道之不行也後雖言魯之郊禘非禮亦所以明道也為道而嘆非為魯而嘆小戴不知聖人之心今無取取家語所載言偃侍曰夫子何嘆也言偃字子游孔子曰昔大道之行與三代之英丘未之逮也而有志焉志願也家語誤以為記不承上文家語多誤大道之行也天下為公選賢與能堯舜與賢不與子公也諸侯大夫亦然講信脩睦故人不獨親其親不獨子其子老有所終壯有所用幼有所長矜寡孤獨廢疾皆有所養男有分女有歸貨惡其棄於地也不必藏於己力惡其不出於身也不必為己是故姦謀閉而不興盜竊亂賊不作故外户而不閉是謂大同今大道既隠天下為家非謂禹湯武王也禹薦益於天湯未必不授伊尹武王未必不授周公蜀先主尚能屬之諸葛孔明而况於三代之英乎書序曰啓與有扈戰于甘之野不曰夏王啓其以不能遜于益而致有扈之戰故貶歟下言禹湯文武由此而選明其特異各親其親各子其子貨力為己大人世及以為常家語人作夫小戴記常作禮城郭講池以為固禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以立田里自天下為家以來風俗寖不如古故禮制益立以防民之非聖王制禮皆因人心著其本義紀言其詳矣以其有不正不篤不睦不和者故立禮以正之篤之睦之和之以人欲滋熾故制度滋設以侵爭者衆故立田里以息爭以賢勇知以功為己故謀用是作而兵由此起侵爭不已必有殺伐故勇能去害知能見幾者見謂賢至於以功為己不及彼則私矣禹湯文武周公成王由此而選小戴記有也字而作其今從家語以小戴記文勝失眞後同此六君子者未有不謹於禮者也以著其義以考其信著有過刑仁講譲示民有常如有不由此者在勢者去衆以為殃是謂小康禮而著其人心之本義則禮非虚文皆道心之正用又考察其忠信則禮出於誠而非偽其過失違禮不義不誠則著之謂懲之刑罰之其有仁者則儀刑之使居位為則於民使民有所懲而不為非有所慕而歸於正又自其閨閫發諸朝廷以達於閭里冠婚喪祭賓射田狩軍旅所講之事無非禮讓以示其民有常而無改純而不雜如有不由此者雖居位勢必去之衆咸以為殃禍至是道亦明矣亦可謂治矣雖不及大同之世亦謂小康言偃復問曰如此乎禮之急也孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死相視也遄疾也視鼠猶有儀體鼠有能拱者人無禮則不如鼠何不速死言生不如死人心惡無禮如此則失禮者誠有死之理孔子以明禮之急禮即天之道人性之所同有情動於邪始失本有之正故先王治之使復其正是故夫禮必本於天殽於地列於鬼神達於喪祭射御冠婚朝聘故聖人以禮示之故天下國家可得而正也必者確定無疑之辭人深疑禮無與乎天地故孔子為必定之辭痛掃其疑禮者乃道之見於品節文為之名即道也故天地鬼神無所不通曰本於天殽雜於地列於鬼神孔子以為必然洞見六合之間無二道也是道之清明健行不息名曰天是道之化生萬物殽雜名曰地是道之變化感應不測名曰鬼神是道之見諸人事名曰喪祭射御冠婚朝聘其為道一也庸衆以喪祭射御冠婚朝聘為粗近以天地鬼神為幽遠失其所自有者矣失其道矣禮者人心之所自有聖人因其所自有而還以示之故人心默感而化言偃復問曰夫子之極言禮也可得而聞歟孔子曰我欲觀夏道是故之杞而不足徵也吾得夏時焉杞夏后氏之後徵驗也無所考證惟得夏時之書今存者亦有小正見大戴記我欲觀殷道是故之宋而不足徵也吾得坤乾焉宋殷之後坤乾熊氏云殷易以坤為首周官大卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四鄭康成云殷坤乾之書其存者有歸藏據康成此言則坤乾之書不止於歸藏豈康成不審其詳而姑為疑辭歟杜子春云連山宓戲歸藏黃帝其以殷人用之故曰殷易歟坤乾之義夏時之等吾以是觀之事有等倫義無不通一也夫禮之初始諸飲食燔黍捭豚家語捭作擘汙尊而抔飲蕢桴而土鼔猶可以致其敬於鬼神鄭康成云中古未有釡甑釋米捭肉加於燒石之上而食之今北狄猶然汙尊鑿池為尊也抔飲手掬之也摶土為桴築土為鼓孔穎達云築地以當鼓節皇氏云桴擊鼓之物杜註周禮籥章云以瓦為匡不須築土蕢塊也以蕢音之誤歟小戴記猶下有若字家語無及其死也升屋而號告曰臯某復然後飯腥而苴孰苴或為俎臯發聲招之於上飯含也腥謂珠貝歟謂奠饌歟苴包也取遣奠有苴歟然朝夕奠其薦熟乆矣故天望而地藏也體魄則降䰟氣則上小戴記䰟作知未安䰟者凡衆之通稱知則神聖同之清明無所不通無所不在何止於在上今從家語作䰟故死者北首生者南鄉皆從其初已上皆從古初則然昔之王者未有宫室冬則居營窟夏則居橧巢鄭康成云寒則累土暑則聚薪柴居其上王肅云掘地而居謂之營窟有柴謂橧在樹曰巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有麻絲衣其羽皮後聖有作然後脩火之利鄭康成云孰治萬物世本云燧人出火鄭六藝論云燧人在伏羲之前凡六紀九十一代廣雅云一紀二十六萬七千年後聖脩之其利用備笵金合土家語作範笵金謂鑄金於模範之中而成利用合土燒成器用瓦瓴甓及甒大之屬以為臺榭宫室牖户爾雅釋宫無室曰榭四方高曰臺然則臺者巧於橧巢榭則屋之唯無室爾至於宫室牖户則詳備矣以炮以燔以亨以炙鄭康成謂炮裹燒之也燔加於火上亨煑之鑊也炙貫之火上家語亨作煑以為醴酪鄭康成云烝釀之也酪酢酨王肅云醴醴酒酪漿酢治其麻絲以為布帛以養生送死以事鬼神上帝皆從其朔朔猶初也後聖脩火利為宫室為醴酪治麻絲雖不同古初而養生送死事鬼神上帝則從其初矣故𤣥酒在室醴醆側眼反在户粢醍在堂醍音體澄酒在下儀禮有𤣥酒無明水周禮無𤣥酒有明水然則明水即𤣥酒歟孔穎達云𤣥酒謂水也大古知飲水而已後世始造酒逐於味矣聖王不忘古始尊𤣥酒於堂置醴醍於外澄酒於下深賤逐味之去道逺也周禮五齊一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊三酒一曰事酒二曰昔酒三曰清酒周禮之泛齊其古禮歟曲禮稷曰明粢江東呼粟為粢而鄭康成讀粢為齊引周禮五齊為證鄭説未安孔子曰黍可為酒禾為醴也古先以黍為醴醆故尚之在户後又以稷為醍故次之在堂本草粟米在中品稷米在下品則粟與稷二物矣本草唐註云本草有稷不再穄穄即稷也今觀粟穄相似唯穄大而粟小陳其犧牲備其鼎俎列其琴瑟管磬鐘鼓脩其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜天人無二道同于一正作其祝號周禮大祝辨六號一曰神號二曰鬼號三曰祗號四曰牲號五曰齍號六曰幣號𤣥酒以祭薦其血毛腥其俎孰其殽與其越席越音活字書作趏春秋𫝊大路越席杜元凱云結草疏布以冪衣其澣帛鄭康成王肅皆云練染以為祭服醴醆以獻醴醆雖不如古之𤣥酒然後世用之安之聖王不得而違薦其燔炙君與夫人交獻以嘉魂魄嘉者敬愛之謂是謂合莫與㝠莫合然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羮薦孰則體解説文簠黍稷圜器也簋黍稷方器也從竹則知古以竹為之後更以木矣鉶器也或作鈃實羮焉祝以孝告嘏以慈告是謂大祥此禮之大成也家語自言偃問夫子之極言禮至是乃再請問禮詳觀上下文不類今從小戴記特牲饋食禮祝東面告利成少牢饋食禮尸命祝嘏主人是祝亦以慈告然則此惟言大略歟抑此言君禮故異歟孔子曰嗚呼哀哉我觀周道幽厲傷之吾舎魯何適矣魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也家語於是有天子以杞宋二王之後周公攝政致太平而與天子同是禮也簡觀上言魯之郊禘非禮殆後人誤加小戴記無此故天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大假假嘏字之訛曽子問不旅不假亦謂嘏也古書之傳訛若此類多家語作大嘉今使祝嘏亂説徒藏於宗祝巫史非禮也此從家語文小戴記作辭説明堂位成王命魯公世世祀周公以天子之禮樂此命已失其常而魯君又因縁僭郊禘祝嘏之説初以不安而隠藏是謂幽國醆斚及尸君非禮也是謂僭君鄭康成云僭禮之君也醆斚先王之爵也惟天子與王者之後得用之耳其餘諸侯用時王之器而已魯僭用醆斚冕弁兵革藏於私家非禮也是謂脅君魯君僭故其臣亦僭周禮司服卿大夫得服𤣥冕士得服皮弁而此謂非禮者其以僭鷩冕或衮冕不敢明言歟季康子朝服以縞曽子問曰禮乎子曰諸侯皮弁以告朔然後服之以視朝若此然則皮弁亦有僭者大夫具官祭器不假聲樂皆具非禮也是謂亂國與子游私言故直指魯君大夫之非非言於廣衆也亦并言當時之大夫僭管仲官事不攝孔子謂不儉曲禮問大夫之富曰有宰食力祭器衣服不假凡家造祭器為先然則祭器可造而不可備歟曲禮雜後世之文家語造祭器或後世之禮歟周禮閭共祭器州共賓器鄉共吉凶禮樂之器鄉有大夫州黨皆有大夫故仕於公曰臣仕於家曰僕三年之喪與新有昏者期不使以衰裳入朝與家僕雜居齊齒非禮也是謂君與臣共國家語臣與君共國有三年之喪者期不使則無以衰裳入朝者矣并及新婚者以本禮同條故因及之禮公門脱齊衰者敬君也而士喪禮三日成服杖拜君命及衆賓豈獨此時為可而常事則不可歟抑公門脱衰禮之常士喪禮不復别言歟其成服杖拜君命者不於朝歟臣與僕雜居齊齒不分尊卑不尊公卑家故天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度言其有以處之而己非必任之以政也默譏魯任三桓以政失制度故亂其國故天子適諸侯必舎其祖廟而不以禮籍入是謂天子壞法亂紀諸侯非問疾弔喪而入諸臣之家是謂君臣為謔此總言上之人先亂其禮制故亂從之是故禮者君之大柄也所以别嫌明微儐鬼神考制度别仁義所以治政安君也君得禮則得其柄矣安上治民莫善於禮且子孫惟當有以處之養之不可以私愛而任之以政其始甚微至末流則不可救矣敬鬼神足以感人之敬心敬則治慢則亂禮即心心即道即大一即天清明無所不照考制度則是非自明至靜常明曰仁其間固自有别等殺曰義其間亦自有别家語作立政教安君臣上下也故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常而禮無列禮無列則士不事也刑肅而俗敝則民弗歸也是謂疵國倍背也音同而字訛大臣公然背畔小臣則竊有妄作一失正禮庶事皆亂刑亂而過於嚴肅俗愈亂而敝法失其常禮亂其列士當任事今不安分故廢職不事故政者君之所以藏身也惟天生民有欲無禮則亂而君據其崇高富貴豈不危哉漢高觀秦皇帝喟然而嘆曰大丈夫當如此矣此乃生於秦焚詩書棄禮樂人欲肆行而不已故至此也惟禮行義明人心安於禮義惟有尊君敬上之心無犯分干正之意故聖人謂政者君之所以藏身也政即禮周以禮廢故衰魯以禮廢故亂是故夫政必本於天郊以降命命降於社之謂教地此據家語小戴記郊作殽敎亦作殽未安郊以祀天明有尊也社以祀地明有敬也王者行尊敬之禮于上而天下皆尊敬矣恭敬之心人皆有之惟上有以感動之則下默然而應矣此非王者之私術也此天下之大義也自郊而始皆天命也命降于社又因地以致敎天命即天道三才之道一降於祖廟之謂仁義親親之道仁也禮節之制義也降於山川之謂興作降於五祀之謂制度天地祖廟之禮人心斷斷不能自已者至於山川之祀乃作而為之敬心之廣也故曰興作至於五祀詳矣故言制度皆天命也天命人心名異道同此聖人所以藏身之固也故聖人參於天地並於鬼神以治政也處其所存禮之序也玩其所樂民之治也孔子憫衰周之際人君廢禮以危其身故此發藏身之義非聖人私其身而為是術也遵道而行參於天地並於鬼神言其與天地鬼神為一以是而治政也處其所存尊尊卑卑各安其義有序而不亂移風易俗莫善於樂中正之音足以感民善心民安其禮而至於樂焉則治矣禮樂刑政一道而四達也天生時地生財人其父生而師教之四者君以正用之所以立於無過之地君者人所明非明人者也人所養非養人者也易曰觀民書曰養民而此曰君者非明人非養人何也此明乎君道也人君清明在躬無所不照中心無為而人民皆視上之所好惡而從之矣君失其清明無為而汲汲乎外則反不能觀民養民矣清明照臨自能觀養聖言當通其旨人所事非事人者也故君明人則有過養人則不足事人則失位故百姓明君以自治養君以自安事君以自顯故禮達而分定故人皆愛其死而患其生人心安於禮義其有義在於死則愛死義不在於生則患生以此甚難以明人心之安義故用人之知去其詐用人之勇去其怒用人之仁去其貪故國有患君死社稷謂之義大夫死宗廟謂之變不得行其道則去位何至於死然禮有變焉義有不得而去至於亂不可救而至於死故曰變聖人耐以天下為一家以中國為一人非意之也鄭康成云耐古能字家語作能簡疑方音有以能為耐者能耐音近同母必知其情辟於其義明於其利達於其患然後能為之何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義講信脩睦謂之人利爭奪相殺謂之人患聖人之所以治人七情脩十義講信脩睦尚辭讓去爭奪舎禮何以治之禮者天下之大順人心之所同有因其所同有順以道之故翕然順聽如一家如一人飲食男女人之大欲存焉死亡貧苦人之大惡存焉欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉心之惡者於禮必不能行人者其天地之德隂陽之交鬼神之會五行之秀也此用家語小戴記作秀氣夫人與天地隂陽鬼神五行一體殊名人形則小其性則無限量古志有云生天生地易曰範圍天地曲成萬物天地施生之德隂陽交合之妙鬼神感通之㑹五行參錯之秀無二道也無二物也故歸妹天地之大義哀樂相生不可得而見不可得而聞此皆孔子之言可以證吾心之同然人皆有此至廣至大至神至明之性而自不知不信也故天秉陽垂日星地秉陰竅於山川播五行於四時和而後月生是以三五而盈三五而闕即三五之數有以驗月者五行和而後生聖人於是明天地陰陽日月星辰四時五行一氣通融因人心疑其殊異不一故指其事實以騐其一五行之動共相竭也小戴記共作迭迭有異義共有同義故從家語作共五行四時十二月還相為本也五聲六律十二管還相為宫也五味六和十二食還相為質也五色六章十二衣還相為主也故人者天地之心也五行之端也食味别聲被色而生者也至哉聖言其循循善誘善啓道人心如此將發揮人與天地隂陽五行本一之妙故言天陽地隂同播五行於四時則天地一矣五行和而後月生即三五十五之數證月即五行之和則五行與月又一矣木氣動則水氣竭盡火氣動則木氣竭盡五行雖相竭而回旋無窮則知實不竭盡繼言五行四時十二月還相為本則五行未始不一而四時十二月亦一矣又推之於五聲六律十二管還相為宫則五聲六律十二管又一矣又推之於五味六和十二食還相為質則五味六和十二食又一矣又推之於五色六章十二衣還相為主則五色六章十二衣又一矣又言人者天地之心則古志所云生天生地於是益信矣人者五行之端端猶本也自天地由我以生而况於五行乎繼言人食味别聲被色而生則人又與五聲六律十二管五味六和十二食五色六章十二衣通合而為一矣此皆助明乎一循循漸誘至於此自此而推則萬殊無不通一嗚呼人自生而執如此者為我如此者為物如此者為天為地自此紛然牢不可解不悟吾心之本無際畔天地日月四時鬼神人物萬化萬事萬理通一無二孔子曰吾道一以貫之鄭康成云五聲宫商角徵羽也其管陽曰律隂曰呂布十二辰始於黃鍾管長九寸下生者三分去一上生者三分益一終於南事更相為宫凡六十也五味酸苦辛鹹甘也和之者春多酸夏多苦秋多辛冬多鹹皆有滑甘是謂六和漢元帝使韋𤣥成等親試問京房於樂府房對受學故小黃令焦延壽等六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南事六十律畢矣王肅云十二食十二月之食考工記畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黃攷此則五色青赤白黑黃加𤣥而為六章歟十二衣諸儒皆無説孔穎達云似月别衣食故聖人作則必以天地為本以陰陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜以天地為本故物可舉也天地為我之本體則其中之萬物盡舉之矣其作則治政則職方氏辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九穀六畜之數要周知其利害觀此則周官之所以維持化育於覆載之内者可知矣鳥獸魚鼈咸若斧斤以時入山林仁及草木無一民一物不被其德澤矣以陰陽為端故情可睹也萬化萬慮非陰即陽以四時為柄故事可勸也四時各有可舉之事勸諭趨赴柄者執以用物此使人趨事如之以日星為紀故事可列也月以為量故功有藝也考日之運而昏旦之中星寖移如月令所紀紀時益詳隨時趨事事可敘列矣至於積日紀事則人事益有敘列月生與日異行積二十九日半有奇復與日㑹是為一月量者限則也藝猶作為也事功程限宜稍寛故月以為限日星時月具在乎聖王政事之中于以助證天人一貫之道也鬼神以為徒故事有守也百神受職各有守也五行以為質故事可復也五行即聖人之質故聖人於事無所不通終而復始五行循環無端禮義以為器故事行有考也考成也人情以為田以禮義治人情猶以器治田故起器與田之喻禮義人心之所有耘去放逸之稂莠而良苗暢達矣故人以為奥也奥主也室西南隅曰奥尊者所居禮為人子者居不主奥故此取主義四靈以為畜故飲食有由也鳯凰麒麟皆在郊棷龜龍在宫沼則極和極順聖王可以享天下之大奉矣鱗羽毛介之屬皆可飲食故因以云明不素食何謂四靈麟鳯龜龍謂之四靈故龍以為畜故魚鮪不淰鳯以為畜故鳥不獝麟以為畜故獸不狘鄭康成云淰之言閃也獝狘飛走之貌也龜以為畜故人情不失龜知吉凶與人情通歟自聖人作則云云亦明人者天地之德鬼神之會五行之秀縱言橫論靡不貫通萬化萬物萬理通一無二亦猶自天秉陽而下皆助明一致故先王秉蓍龜列祭祀聖人因言四靈其後言龜於是因及祭祀之禮其初卜筮祭日與尸故曰先王秉蓍龜列祭祀蓋聖人縱言因縁接續人之常言亦有此類瘞繒宣祝嘏設制度禮祭為大瘞繒祝嘏舉其大略孝慈之情略見於此繼乃總言凡禮之制度以綂包之故國有禮官有御事有職禮有序此詳言制度條理人或疑禮之不足以包事故言官言事至於各有職則事詳矣末又總言禮之有節序則詳備矣先王患禮之不達於下故饗帝於郊所以定天位也天子必有尊則尊卑長幼之禮達於下矣祀社於國所以列地利也禘祖廟所以本仁也旅山川所以儐鬼神也祭五祀所以本事也國皆有社故曰列地利養人祀社所以報德也孝者人心之所發是謂仁山川稍降於天地矣儐猶賓也五祀則有降矣中霤門行户竈皆有事焉所以報之也夫道惟其正而已矣郊社祖廟山川五祀事雖不同而皆正也義也義行於事而禮達於下矣未知道者以靜為本用為末故此言禘祖廟本仁明其非末未知道者以五祀之祭為小為末故此言本事明其非末觀此則萬事可通矣定天位列地利儐鬼神皆本而不言可知矣互舉參明屬辭之法故宗祝在廟宗人與祝三公在朝三老在學王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉故郊社祖廟山川五祀義之脩而禮之藏也廟中之事委諸宗祝朝廷之事聽諸三公於學乞言則受之三老王弔則巫前内史為王左右手左右史書王言動凡國事有卜筮鄭康成謂侑四輔未安與卜筮瞽非類瞽樂吏御瞽幾聲之上下亦幾察王之音聲侑勸尸飯者卜筮瞽侑皆祭祀執事於王左右者此泛言王左右前後皆有輔佐王中心可以無為無為即至正無為即守無思無為天地自此生鬼神自此行萬物自此生人心自此化萬事自此理故百神於是受職百貨於是可極孝慈於是服法則於是正夫道一而已矣郊社祖廟山川五祀義之所當然而禮在其中矣曰義曰禮曰心曰正曰守曰無為名殊實一難者曰動靜無二何必專於無為曰聖人立言垂教不為聖人設為學聖人之道者設孔子未至從心之妙也自曰我學不厭學無為以守至正也舜命禹曰惟精惟一允執厥中勉以守至正也易曰蒙以養正聖功也蒙即無為也此作聖之功也孔子謂加我數年五十以學易易者萬變不窮之書至五十而後學易則是時未五十正無為以守至正學不厭之時也孔子所學即動靜無二之妙而蒙養之功必熟乃成是故夫禮必本於大一分而為天地轉而為陰陽變而為四時列而為鬼神其降曰命其官於天也必者確定無疑之辭人深疑禮無與乎大一故孔子為是必然之辭痛釋其疑前言禮必本於天政必本於天其旨同大言其至大而無外一言其無二大一所以發明此道道不可名不可言唐虞之際惟曰時是也亦猶易曰此古本無道之名後乃有道之名道若道路明人皆由之無所不通天健行變化即此道故亦曰天此明其至大而一曰大一陸德明音太非也太對少謂道為太則少非道乎孔子必不作太音清濁分是謂天地天地即大一言其運轉流化曰隂陽言其變而為暄凉寒暑曰四時列而為天神地示人鬼與夫四方山川羣神曰鬼神皆禮道也名殊而實一其降曰命則其尊其卑其貴其賤其富其貧其壽其夭其大其小皆命也其綂而司之曰天地在天中而况於餘乎然天未離乎氣不能以通大一故天止言官大一者道之異名不可以形氣言不可以心思索無思無為而大一在我矣人人之所同有也亦不可以有無求而恭敬辭讓撙節文為由是而出造化生成萬事萬化萬理由是而出亦不可以本末精粗論初啓蔽蒙姑言其本姑言次第其實一體無二孔子曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也達乎此則信矣夫禮必本於天動而之地列而之事變而從時協於分藝其居人也曰養聖人諄複發明一貫之道蓋以人情蔽固故于再于三啓諭之覬其或發蓋不至於融明通一而無纖疑則終不知禮分言其殊藝言其事皆此道也鄭康成拘於文類故欲改養作義人有禮則安無禮則危則禮所以養人也于以益明聖言縱橫不拘之妙其行之以貨力辭讓飲食禮不止於辭讓亦不止於飲食姑舉此可以類通冠昏喪祭射御朝聘故禮義者人之大端也所以講信脩睦忠信和睦即禮義而固人肌膚之會筋骸之束也禮義有如此神用人心違禮乖義則放逸惰慢肌膚不固筋骸解弛所以養生送死事鬼神之大端也或謂養生送死事鬼神不可無禮義則失之矣即吾養生送死事鬼神之誠心即禮義已其間有節文名曰禮得其宜名曰義名殊而實一尊而言之曰大端所以達天道順人情之大竇也天道無思無為人情有喜怒哀樂疑不可合而知者知其未始不一也孔子哭顏淵至於慟矣而不自知哂由疾求君召使擯而色勃如升堂屏氣似不息迅雷風烈必變情狀萬態如四時之錯行如日月之代明終年變化云為而未始不寂然此惟心通内明者自知之至於衆人則樂而淫哀而傷怒而暴聖王制禮所以節人情之放逸復天道之正中竇喻通達唯聖人為知禮之不可已也故壞國喪家亡人必先去其禮人自禮而生失禮則危亡壞乎怪反陸音怪乃好異之過乎怪反取也怪音毁也故禮之於人猶酒之有糵也君子以厚小人以薄故聖王修義之柄禮之序以治人情柄喻其本義達於事為禮故人情者聖王之田也修禮以耕之陳義以種之通而言之禮即道之異名為甚大析而論之治人之始修其文為則止可以喻耕未及其本至於訓之以義有以感人之義心則始可喻種立言之道不一而足達之則無所不通講學以耨之本仁以聚之播樂以安之設庠序師儒使之講學講學大要改過而已故喻耨耨除穢也孔子曰君子以人治人改而止孟子取耘苗之喻謂改過也人心本善起意生過過去則本心自善自正自清明此心即道故書曰道心此心雖善過習或有間雜則善猶未咸聚過習不作無間雜則衆善咸聚矣非自外至本心所自有也人心和樂則安矣播諸中正和平之音與道心中正和平之樂合孔子在齊聞韶三月不知肉味曰不圖為樂之至於斯也子游聞諸夫子以弦歌為學道孔子又曰成於樂和樂之妙不知手舞足蹈也故禮者義之實也協諸義而協則禮雖先王未之有可以義起也義者藝之分仁之節藝猶事也仁人心也心之品節合宜曰義得之者强仁者義之本順之體得之者尊仁義道一名二互相發明然學者有得義而未仁者矣非道有二人自不通然得乎義者事無不宜人心無不服故强仁則達禮義之本大一在我矣融明和順心無間斷故不止於人心咸服而已而又敬之尊之如天矣故治國不以禮猶無耜而耕為禮而不本於義猶耕而弗種禮則文為義則發於人心析言則異其道則一為義而不講於學猶種而弗耨講之以學而不合之以仁猶耨而弗穫合之以仁而不安之以樂猶穫而弗食安之以樂而不達於順猶食而弗肥義心初生未能無過差阻蔽故講學以除治之雖除治而心未通悟則衆善未合一通貫仁雖已有猶未至於安而樂則未為深入毫釐之間猶為未食嗚呼聖人之講道也精矣道學之中誠有若是等級淺深之序至於安則在己者盡矣茍達之事用有未順焉則猶有虧焉故喻以弗肥其講也詳矣順亦樂之道又精而析之則又有區别雖然學者之序則爾自道觀之則一不知其為一則終不足以言道百姓日用而不知人自不知道未嘗改嗚呼聖人治國其敎人精至至於此敎官之屬三公為鄉老敎之中敎之和自漢以來不復知有此矣四體既正膚革充盈人之肥也孔穎達云膚是薄皮革是膚内厚皮父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以德為車以樂為御德而至於醇和孫出則可及物諸侯以禮相與孔子曰古之治天下者必聖人然則諸侯賢歟禮賢者之所及通達則一大夫以法相序士以信相考考成百姓以睦相守隨所宜言互相發明德樂禮法信睦道一名殊天下之肥也是謂大順大順者所以養生送死事鬼神之常也故事大積焉而不苑苑如字冗雜也並行而不繆細行而不失深而通茂而有間連而不相及動而不相害此順之至也自上所言衆善庶事庶理離離然若星辰之錯行日月之代明天地之變化水鑑中之萬象誠有大積而不苑並行而不繆深而通茂而有間連不相及動不相害之狀於澄然融一之中雖有曲折條理之細不可勝窮而非思非為此道心之本妙也人人之所同有也聖人不失其全賢者所失輕寡衆人所失多矣苑者冗雜之地不苑不冗雜也繆者兩絲相著也其曰紕繆者絲相比近曰紕猶有間未相著也繆則相著如一矣謂紕繒欲壞者蓋以繒之不善者濯之則絲并比其曰繆戾者以繆者繒之不善絲不正直而繆也大積疑於冗雜今不冗雜而常虚並行疑於繆今不繆所行至於細小疑有失今不失雖無思無為深不可測而亦通物茂密而亦有間禮儀三百威儀三千井井不亂也連者一體無二而亦有不同者是謂别仁義仁雖融一無間而義有可否禮有變常參錯似相反而實不相害此妙用惟明覺通達者自知自信明於順然後能守危也故禮之不同不豐不殺孔子亦嘗答子夏之問有曰禮不同不異不豐不殺稱其義以為之宜所以持情而合危也書曰人心惟危人不能皆聖哲茍無禮以維持之則入於亂人心皆亂則禍不可救矣故禮不在於同異豐殺之間維持人情使無離乎正使危者不危是謂合危故聖王所以順山者不使居川不使渚者居原用水火金木飲食必時冬合男女春頒爵位必當年德皆所謂順也前既言順之大者此又及其詳及其細當無所不順也故三才之氣和災害不生祥瑞畢至如下文所云居山原者安於山原居川渚者安於川渚易之則人心氣血皆失其安用水灌溉有時虞人入澤梁有時司爟四時變國火以救時疾鄭司農説以鄹子曰春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火卝人以時取金玉錫石山虞仲冬斬陽木仲夏斬隂木取用非其時則其氣亂天地萬物同此一氣氣或亂則相感相傷孔子不時不食飲食不時生疾今俗猶有是言月令春食麥與羊夏食菽與雞中央土食稷與牛秋食麻與犬冬食黍與彘孔子曰十二食殆十二月各有食也男三十而娶女二十而嫁過此則失時德有大小爵位有尊卑失其當則不順人心不安不和用民必順用民之力歲不過三日春蒐夏苗秋獮冬狩皆於農隙以講事故無水旱昆蟲之災民無凶饑妖孽之疾昆蟲之災螟螽之屬故天不愛其道地不愛其寶人不愛其情故天降膏露家語甘露地出醴泉山出器車河出馬圖鳯皇麒麟皆在郊棷素口反或作藪龜龍在宫沼其餘鳥獸之卵胎皆可俯而闚也鄭康成云器若銀罋丹甑也王肅亦云出銀罋丹竈簡謂銀瓮不知何祥然今掘山得器瓮亦聞有金銀器者乃宿藏或墟墓中物若夫世傳丹竈乃脩養家幾於仙者煉丹之物小道所為非天地大瑞多聞昔有得器於山者實物於其中即盈亦異矣但此器多以爭取而毁此或是歟銀瓮丹甑雖援神契文未可遽從孔穎達云按禮緯斗威儀云其政太平山車垂鉤注云山車自然之車垂鉤不揉治而自圓曲河出馬圖啓𤣥氏曰河出圖洛出書伏羲演之案中候握河紀堯時受河圖龍銜赤文緑色注云龍而形象馬故云龍馬是龍馬負圖而出夫馬義惟始於注非本文銜非負按大戴禮云洛出服河出圖疑得馬以為車之服馬以祥瑞故貴重之不以為旁驂歟漢曰襄河淮曰淮河洛宜亦曰河則是無故先王能脩禮以達義體信以達順此順之實也此即前言六君子謹於禮以著其義考其信闕也禮由義而達本體於忠信由中心而達和順闕至是則天道人情通一而無間故天地和應祥瑞闕至此和順之事實言有祥瑞之物可驗也此無他闕貫三才通萬物其名曰禮曰義曰信曰順其致一也哀公問第二孔子侍坐於哀公公曰敢問人道誰為大孔子愀然作色而對曰君之及此言也百姓之德也固臣敢無辭而對人道政為大公曰敢問何謂為政孔子對曰政者正也君為正則百姓從而正矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政如之何孔子對曰夫婦别父子親君臣信小戴記信作嚴非三者正則庶物從之矣公曰寡人雖無似也願知所以行三言之道可得聞乎孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大婚為大大婚至矣冕而親迎敬之也敬之也者親之也是故君子興敬為親舍敬是遺親也不敬則遺失親愛之道弗愛不親弗敬不正愛與敬其政之本與至矣哉孔子之善於啓道其君也惟其知道也明故其告君也的道在不逺人心之所自有其發於夫婦父子君臣之間甚著也顧昧者日用而不知夫婦之際人多流於色然有道焉其相親相愛皆道也其流入於色則不敬矣愛而敬則不失其道則夫婦者天地之大義政之大本公曰寡人願有言也然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主孔子嘗言魯郊禘非禮此欲大其義故通言王禮地或作下君何謂己重乎公曰寡人固不固焉得聞此言也寡人欲問不得其辭請少進孔子曰天地不合萬物不生大婚萬世之嗣也君何謂己重乎孔子遂言曰内以治宗廟之禮足以配天地之神明鄭康成云夫婦配天地有日月之象出以治直言之禮夫婦正而不淫則道心不失出而臨朝直心直言以治其禮其心不改茍其閨門之内其心不正則出而臨朝姑為正言乃揉曲為之非直矣足以立上下之敬物恥足以振之國恥足以興之物事也物恥即國恥弑逆淫亂三家專國為諸侯弱此皆可恥欲深感公心故申言更辭為政先禮禮其政之本與得禮即得道正朝廷正國無不正矣振恥興恥乃其緒餘此豈惟魯哀公未知自漢以來此道不明久矣孔子遂言曰昔三代明王必敬其妻子也蓋有道焉妻也者親之主也敢不敬與子也者親之後也敢不敬與是故君子無不敬也敬身為大身也者親之枝也敢不敬與不敬其身是傷其親傷其親是傷其本傷其本枝從其亡三者百姓之象也身以及身子以及子妃以及妃君脩此三者則大化愾乎天下矣聖言深中人心身與子與妃此常情重愛聖人因之以發明道心愛而敬則無邪矣無邪即道愾太息也天下歎服之矣太王之道也太王愛厥妃詩云古公亶父來朝走馬率西水滸至於岐下爰及姜女聿來胥宇如此國家順矣公曰敢問何謂敬身孔子對曰君子過言則民作辭謂議其非過動則民作則民亦則而象之言不過辭動不過則百姓不命而敬恭若是則可謂能敬其身能敬其身則能成其親矣公曰敢問何謂成其親孔子對曰君子也者人之成名也百姓與名謂之君子則是成其親為君而為其子也孔子遂言曰為政而不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能樂天不能成其身不愛人則人怨之甚則害之矣故曰不能有其身不能保有其身則雖有土地不得而安處矣如此則雖有天命不能享其樂矣如此則不特不能有其身亦不成其身言不足以為人也公曰敢問何謂成身孔子對曰不過乎物不過乎物合天道也公曰敢問君子何貴乎天道也孔子對曰貴其不已也如日月東西相從而不已也是天道也不閉而能久是天道也無為而物成是天道也已成而明是天道也公曰寡人惷愚㝠煩幸子志之心也孔子蹴然避席而對曰仁人不過乎物孝子不過乎物家語作孝子不過乎親其旨同言不過事親而已不離乎事物是故仁人之事親也如事天事天如事親此謂孝子成身公曰寡人既聞此言也無如後罪何孔子對曰君之及此言是臣之福也夫成身不過乎事物之間而已不必求之逺所謂事物不過夫婦父子君臣日用政事之間不過乎合天道此世俗易曉之言及公再問天道則言貴其不已恐公未解又曰如日月東西相從而不已是天道也亦甚易曉夫人心自善自正自清明廣大人心即道故舜曰道心孔子曰心之精神是謂聖惟起意生過而本心之善始有間輟而不能不已至是始與天不相似今能不已則合乎天道矣此心之靈本無間斷何止於如日月相從而已而孔子云者知哀公必未遽曉故啓之以漸也若哀公用力乆而純即精神之本聖也常情必閉而不出不動乎思為故靜止而能乆是人為也今雖不閉而明白四達應酬交錯如鑑中之萬象如四時之錯行常一常乆是天道也無所為而物成即此心也雖有思為而實無思為虚明而應庶政自不失其道而國治民安矣即天無為而物成之道也所謂已成者我未始不全成也以昏為虧故以不昏為成曰成曰明皆所以申明此道也天人之道本一哀公昏故姑告以合天道至於不閉而乆無為物成則天人一矣公至是莫曉故自謂惷愚㝠煩孔子又謂雖仁人亦不過事物之間而已孝子亦不過事親之間而已不必求諸幽遠於是又引而通之曰仁人事親如事天事天如事親自此忽通則本一之妙未始不在我矣孔子循循善誘至簡至易明白坦夷故公亦心曉使公自是不失道在公矣惜乎其後昏惰哀公問禮第三哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人不足以知禮公曰否吾子言之也孔子曰丘聞之民之所以生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以别男女父子兄弟之親婚姻疏數之交也君子以此之為尊敬然然後以其所能敎百姓不廢其會節有成事而後治其文章黼黻以嗣其順之既順百姓所能因聚㑹時節因其成事又繼治其文章黼黻以順其情制禮皆因順然後言其喪筭筭數也喪服有輕重之數禮有貴賤之數言以立制備其鼎俎設其豕腊修其宗廟歲時以敬祭祀以序宗族即安其居節醜其衣服即所居而安不務崇大醜類也禮有節有類不亂不踰卑其宮室車不雕幾音奇君不乘奇車音同而字非歟家語作璣器不刻鏤食不貳味心不淫志以與民同利昔之君子之行禮也如此公曰今之君子胡莫之行也孔子曰今之君子好利無厭大戴記作好色小戴記作好實淫行不倦荒怠敖慢固民是盡忤其衆小戴記忤作午以伐有道衆心豈欲伐有道忤其意强使之求得當欲不以其所虐殺刑誅不以其治治理也昔之用民者由前今之用民者由後今之君子莫為禮也五儀第四哀公問於孔子曰寡人欲論魯國之士與之為治敢問如何取之孔子對曰生乎今之世志古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎公曰然則章甫絇屨鄭云絇著屨頭狀如刀衣鼻賈云絇以絛為履頭鼻簡攷禮物罕有特設多因本有古者屨形方左右前後合而成屨所謂絇者以絛組繫兩旁而束之即今之繫鞋世以繫鞋為禮亦曰帶鞋但鞋形如古方履古履無絇後加絇益善繫束亦有刀衣鼻之狀鼻在屨頭喪屨無絇從略紳帶而搢笏者皆賢乎孔子曰不必然丘之所言非此之謂也夫端衣𤣥裳冕而乘軒者志不在於食葷大戴記軒作路斬衰菅菲杖而歠粥者志不在於酒肉大戴記酒肉作飲食生乎今之世志古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎公曰善盡此而已乎孔子曰人有五儀有庸人有士人有君子有賢人有聖人審此五者則治道畢矣公曰何如則可謂庸人孔子曰所謂庸人者口不能道善言而志不邑邑邑邑猶深濳不能選賢人善士而託其身焉以為己憂親近小人故致憂患動行不知所務止立不知所定庸人如醉如夢之狀如此日選於物不知所貴其心日日隨物選擇美者利者自智者觀之乃反取其惡取其害實不知所擇不知所貴從物而流不知所歸五鑿為政心從而壞五鑿五竅也耳二竅鼻二竅與口而五若此則可謂庸人矣公曰何謂士人孔子曰所謂士者雖不能盡道術之本必有率也雖不能備百善之美必有處也是故知不務多必審其所知行不務多必審其所由言不務多必審其所謂知既知之行既由之言既順之若夫性命肌膚之不可易也肌膚未嘗變易此據大戴記大戴記毎驗其不改作家語多更改多誤於此言性命之於形骸非富貴不足以益貧賤不足以損若此則可謂士矣公曰何謂君子孔子曰所謂君子者躬行忠信其心不覺家語作覺大戴記作買皆通書曰厥德修罔覺不覺者純誠亹亹之謂不買者今俚俗亦有之不交攬外物之謂仁義在己不害不知聞不以不知聞於世為害志廣博而色不伐思慮明達而辭不爭舜以不矜不伐稱禹然則不伐人情所難我明彼蔽論辨而必至於爭猶然若將可及也而不可及也如此可謂君子矣公曰敢問何謂賢人孔子對曰所謂賢人者好惡與民同情取舍與民同統賢人則能及物矣好惡取舍無私無我一與民同行中矩繩而不傷於本思為遵規矩繩墨者雖中而傷其本矣本心之妙非思非為而自中繩矩聖人則盡乎此賢人則入乎此言足法於天下而不害其身言雖可法而不免害身者智不周而德不備也躬為匹夫不願富貴為諸侯而無財不願富貴非專好貧賤謂躬為匹夫而心其安焉不起富貴之願孔子曰古之治天下者必聖人然則為諸侯者必賢人矣故此言為諸侯諸侯而無財則心不留於外物如此可謂賢人矣公曰敢問何謂聖人孔子對曰所謂聖人者知通乎天道應變而不窮能測萬物之情性天道者所以變化而凝成萬物者也此再釋天道聖人天道一貫無二言通乎天道非二也哀公知不足以知此故漸啓之通亦通貫無二之義情性也者所謂理然不然取舍者也此再釋萬物之情性萬物情性有然者有不然者有取者有舍者然是也不然非也或好而取之或惡而舍之情性萬狀不可勝言而大略不出然不然取舍之己之情性易知萬物之情性難知雖賢人不能盡知也惟聖人能盡測而理之故其事大配乎天地參乎日月離於雲蜺一本離作雜雲作隂蜺霓通説文屈虹青或曰隂霓也總要萬物穆穆純純其莫之能循若天之司莫之能職百姓淡然不知其善若此則可謂聖人矣聖人之事大矣於事無所不盡則於道無所不盡賢人雖得道而未盡故於事猶有未盡賢人未能測萬物之情性事即道名殊實一人心自神自靈自清明自廣大無際量自無所不通自無所不照孔子曰人者天地之德又曰人者天地之心此心無際生天生地古志亦云云配者言於哀公之前循循善誘也參猶配也孔子於是縱言之及於雲蜺或當時有虹霓就指而言離麗也亦猶參配自天地無二而况於日月乎虹霓乎不惟天地變化盡在吾量中而萬物亦總要於我矣何思何慮穆穆純純無始無終其孰能循究其端緒夫起乎意則有始有終故可得而循不起乎意則穆穆純純何從而循若天然非如士君子特可任一職而已言無所不可公曰善哉非子之賢則寡人不得聞此言也雖然寡人生於深宫之内長於婦人之手未嘗知哀未嘗知憂未嘗知勞未嘗知懼未嘗知危恐不足以行五儀之教若何孔子對曰如君之言已知之矣丘亦無所聞焉公曰非吾子寡人無以啓其心吾子言也孔子曰君子入廟如右謂入廟門而右門以外為主禮客入門而左主人入門而右右則阼階矣如而通用大戴記多見之今俗語如今即而今登自阼階仰視榱桷俯察几筵其器皆存而不覩其人君以此思哀則哀可知矣昧爽夙興正其衣冠平旦視朝慮其危難一物失理物事也亂亡之端君以此思憂則憂可知矣日出聽政至于中㝠㝠昏也諸侯子孫往來為賓哀公繼世之君其所與往來為賓者皆諸侯之子孫行禮揖讓愼其威儀君以此思勞則勞亦可知矣緬然長思出於四門周章遠望覩亡國之墟必將有數焉君以此思懼則懼可知矣夫君者舟也庶人者水也水所以載舟亦所以覆舟君子以此思危則危可知矣君既明此五者又少留意於五儀之事則於政治何有失矣公曰善孔子出公送之孔子燕居第五孔子燕居子張子貢言游侍言至於禮子曰居女三人者吾語女使女以禮周流無不徧也人心之禮本周流無不徧三子未明今啓諭之教之故曰使子貢越席而對曰敢問何如子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁子貢曰敢問將何以為此中者也子曰禮乎禮夫禮所以制中也子貢退言游進曰敢問禮也者領惡而全好者與子曰然子貢問曰何如子曰郊社之禮所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食饗之禮所以仁賓客也子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長幼辨也以之閨門有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功成也是故宫室得其度量鼎得其象味得其時家語味作物下同樂得其節車得其式奇車非式鬼神得其饗喪紀得其哀辨説得其黨黨類也官得其體政事得其施加於身而錯於前凡衆之動得其宜言游退子張進曰敢問禮何謂也子曰禮者即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所錯耳目無所加進退揖讓無所制是故以之居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其策策數也什五有數凡法度皆有數軍旅武功失其制宫室失其度量鼎失其象味失其時樂失其節車失其式鬼神失其饗喪紀失其哀辨説失其黨官失其體政事失其施加於身而錯於前凡衆之動失其宜如此則無以祖洽於衆也祖猶主也君也洽和也君和其衆子曰愼聽之女三人者禮猶有九焉大饗有四焉茍知此矣雖在畎畝之中事之聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武家語作舞夏籥序興陳其薦俎序其禮樂備其百官如此而後君子知仁焉行中規還中矩和鸞中采齊家語作薺客出以雍徹以振羽是故君子無物而不在於禮矣入門而金作示情也升歌清廟示德也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已言以啓人因言而後生名而人以名而致惑天下之名衆矣不可不思其故也曰道曰德曰仁曰義曰禮曰樂悉而數之奚有窮盡所謂道者聖人特將以言夫人所共由無所不通之妙故假借道路之名以名之非有實體之可執也所謂德者特以言夫人之直心而行者即道之在我者也非道之外復有德也所謂直心而行亦非有實體之可執也仁者知覺之稱疾者以四體不覺知為不仁所謂仁者何思何慮人心虚明如月之照是亦非有實體也禮者特理而不亂之名樂者特和樂而不淫之名以是觀上數名者則不為名所惑不為名所惑則上數名者乃所以發明本無名言之妙而非有數者之異也是故道即禮禮即樂樂即詩書易春秋孔子又曰禮本於大一分而為天地轉而為陰陽變而為四時列而為鬼神又曰人者天地之德陰陽之交鬼神之會五行之秀孔子不為名言所惑洞見通貫至一之妙故確然曰禮周流無不徧也人即禮禮即人即人之周流無不徧也夫子貢越席以請孔子當開明無所不徧之説乃惟以中禮為言何也至哉聖言切中機會正足以解人情不能周徧之蔽人之所以不能周徧通達者人欲為之阻也人欲者私意之謂人之所以不中禮者私意實作之也何謂私意人欲野是也給是也逆是也昏而不明故野以口給為恭故奪仁逆之去道也遠矣何謂禮慈仁是也慈仁之心悠然而生而非思也非為也今人乍見孺子將入於井皆有怵惕惻隠之心非所以内交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也此豈私意之為至於為口給則意生矣私作矣失其誠矣舉此一端而言他可通矣是故微作乎意即不中禮孔子所以諄諄與羣弟子言毎毎止絶其意言之多不勝其書故記者總而記于絶四之首意之變態無窮有利之意有害之意有柔之意有强之意有彼之意有此之意有衆之意有寡之意有進之意有退之意有過之意有不及之意又有中之意有意則有所倚雖曰中實無中中非意也所謂慈仁之心者中也所謂誠敬之心者中也孔子於此亦難於言曰禮乎禮難言之辭也曰禮所以制中觀先王之禮皆所以為中人欲私意舉不得而入焉而孔子亦不能指言中之為何狀子游謂禮者領衆惡而入乎道而全其本善者歟好善也子游之言是也故孔子不得不以為然而子游之心未為達者未知皜皜之妙則猶未明乎善也孔子言郊社之禮所以行吾心之仁於鬼神也禘嘗之禮所以行吾心之仁於昭穆也饋奠食饗射鄉之禮皆所以行吾心之仁孟子曰仁人心也仁者吾心之誠是謂道心是謂本善之心心即禮禮即義郊社即禘嘗禘嘗即治國曰指諸掌姑明易簡吾心即禮奚俟他求至哉人心之禮乎心無質體唯有變化無作於意天則自昭天秩自敘居處自有禮長幼自辨三族自和庶事自序此豈人為之所能哉如四時之錯行如日月之代明如星辰之森列深而通茂而有間大積焉而不苑也並行而不繆也嗚呼何其妙也是人心之所同然不唯聖賢有之愚不肖咸有也上之人行其同然之道于上而下之人靡然從之是謂祖洽之道洽合也無所不合也三子者猶未達聖人於是又垂切至之誨使三子愼聽之曰吾語女禮猶有九大饗有四茍知此矣雖在畎畝之中事之聖人也何其巧於啓諭也禮有九節大道於是乎著明大饗之禮於九者之中有四焉兩君揖讓而入門一也縣興二也升堂三也下管象武而下四也夫揖者何物讓者何物入者又何物嗚呼何其妙也縣興金作也鏗然之音何自而發不可以二觀也揖讓而升堂升者又何物也又何其妙也即入門之機也即縣興之機也可言而不可思也於是樂闋而堂下管象武舞夏籥文舞次序而興薦俎陳焉百官備焉禮樂交作又何其至妙而不可以言語道也君子於是而知仁者知其即吾心之妙不知其所以然而然者也行中規中規者可言而不可思還中矩中矩者可言而不可思和鸞車之和鸞也而即吾之中采齊也客出也以雍其徹也以振羽莊敬和樂之妙又何其始始終終而不可致詰也畎畝之中無兩君相見之禮也而即兩君之禮也無金聲之樂也而即金聲之樂也無管象夏籥也而管象夏籥之音舞未嘗不日奏乎其前而昧者不知也耒耜之器耕蓺之勤良苗之欣榮耘耔之親睦兩目散日月之明四體運天地之神步中和鸞之節聲諧韶濩之音此豈説合而强同之哉默而識之當自知自信也不可思也不可言也孔子於是又言入門而金作所以示吾之情也不可以為彼而非我也升歌清廟所以示吾之德也不可以為清廟者所以頌文王之德而非我也天下無二聲也無二德也下而管象所以示吾之事也不可以為管象而已非吾之事也天下無二事也學道者率以言而離默而近此兩君相見之禮不親相與言也以禮樂相示而已禮樂即吾之言也内外一物動靜一體離物我裂語黙判本末者不足以與此也孔子引三子歸之一默之中使默成聖人之德行可謂至簡至要至敏三子者雖未皆領聖人之旨而萬世之下獲見大道之大全何其幸也賔入大門而奏肆夏卒爵而樂闋孔子屢歎之此記與上章之旨同此不可以言語解惟心通者自知自信孔子閒居第六孔子閒居子夏侍子夏曰敢問詩云凱弟君子民之父母何如斯可謂民之父母矣孔子曰夫民之父母乎必達於禮樂之原以致五至而行三無以橫於天下四方有敗必先知之此之謂民之父母矣子夏曰民之父母既得而聞之矣敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天地此之謂五至子夏曰五至既得而聞之矣敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰三無既得略而聞之矣敢問何詩近之孔子曰夙夜其命宥密詩其或作基無聲之樂也威儀棣棣不可選也無體之禮也凡民有喪匍匐救之無服之喪也子夏曰言則大矣美矣盛矣言盡於此而已乎孔子曰何為其然也君子之服之也猶有五起焉子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之喪内恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施及四國無聲之樂氣志既從無體之禮上下和同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純德孔明無聲之樂氣志既起無體之禮施及四海無服之喪施於孫子子夏曰三王之德參於天地敢問何如斯可謂參天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私孔子曰天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私其在詩曰帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍是湯之德也其在詩曰嵩高惟嶽峻極于天惟嶽降神生甫及申惟申及甫惟周之翰四國于蕃四方于宣此文武之德也矢其文德協此四國一本矢作弛協作洽大王之德也家語大作文三代之王也必先其令聞詩云明明天子令聞不已三代之德也子夏蹶然而起負牆而立曰弟子敢不承乎禮樂之原即五至五至即三無三無即五起五起即能先知四方之敗者道不可言孔子欲無言不得已有言曰原足矣何必言五至五至多矣又何必言三無子夏沈溺於文義之淵藪斷非一語之所能曉敷而明之曲而暢之庶幾或觸其機也何謂至人皆有心志即志即至無所復至凡志有所思焉有所感焉倐然而思思無所起思而又思思無所止人自以為止所止者何所厥思亦何物執之而無得視之而無睹莫究厥始莫究厥終莫執厥中是之謂大同倐然而感感無所起感而又感感無所止人自以為止所止者何所厥感亦何物執之而無得視之而無暏或曰氣氣亦中無有或曰心心亦無本體莫究厥始莫窮厥終莫執厥中是之謂大同由志而為詩詩亦然也發諸禮儀禮亦然也播之於樂樂者樂也不知手之舞之足之蹈之樂亦然也人情亦豈能終月樂終年樂亦有哀焉或哀焉或樂焉哀樂相生其變萬狀於戲至哉孔子曰此雖使正明目而視之不可得而見也傾耳而聽之不可得而聞也哀雖至於哭顔淵慟矣而不自知樂雖至於孟子喜而不寐亦不可見不可聞也哀樂必有物非不可見也哭笑必有聲非不可聞也而聖人斷然曰不可見不可聞也衆人之樂皆不可見不可聞也而衆人自以為可見可聞也衆人之哀皆不可見不可聞也而衆人自以為可見可聞也哀與樂名也聞與見亦名也惑其名者失其實也是名即實是實即名名與實亦名也惑其名者失其實也志即詩詩即禮禮即樂樂即哀志氣即天地謂之充塞非過論也謂天地合德可也謂範圍天地可也其曰充塞乃因人心狹固井蛙不可以驟語海為是循循善誘也聖人之言不可以一定論也或曰禮樂之原或曰五至或曰三無或曰致或曰行縱而言之錯而論之無不可者聖人曰五至雖益而曰六曰七可也聖人曰三無雖益而曰四曰五可也詩與禮與樂類也乃先之以志又繼之以哀疑非其類何也深明夫至一無二縱而言之錯而論之無不可者是故無聲之樂即無體之禮無體之禮即無服之喪樂未嘗無聲必曰無聲非無聲也即聲也禮未嘗無體必曰無體非無體也即體也喪未嘗無服必曰無服非無服也即服也聲即無聲體即無體服即無服本無所異何必言同惟人徒執其聲故曰無聲徒執其體故曰無體徒執其服故曰無服詩曰夙夜基命宥密命何所基匪思匪為純明寛宥不可窮際不得而見不得而識是謂至密曰基曰宥曰密皆名也惑其名者失其實也舜曰道心惟微惟精惟一者此也禹曰安汝止者此也伊尹與湯咸有一德者此也文王不識不知者此也聲即無聲天下之至實也而徇名與聲者惑之聖人曰無聲所以破學者牢不可破之定見也非以無聲為定論也無聲即聲無體即體無服即服無本末無精粗威儀實無體其曰不可選也是誠不可選也凡民有喪匍匐救之是固無服之喪也即齊斬功緦之道也於父斬衰於母齊衰兄弟期降而功緦哀誠有等差皆一心之為也即匍匐救喪之心以喪其親則為齊斬為擗踊為毁瘠一也非人之所為也天也天即人人即天即日月即四時即鬼神即禮樂之原原無所本亦無所末本末之名因人心而生本末之實不以人心而異人謂之本則亦姑從而謂之本人謂之末則亦姑從而謂之末人謂之天則亦姑從而謂之天人謂之地則亦姑從而謂之地人曰日月吾亦何得不謂之日月人曰四時吾亦何得不謂之四時人曰禮則曰禮人曰樂則曰樂人曰人則曰人人曰道則曰道曰氣則曰氣曰志則曰志曰有則有曰無則無名號紛然意慮雜然而未嘗不渾然寂然也人自以為紛然雜然也故曰即哀樂之相生而實不可見不可聞也此非徇名者之所知也亦非徇實者之所知也徇無所徇實無所實棄名而求實非實也棄實而言名非名也實非學者之所知也名亦非學者之所知也知則不知不知則知知則亂則昏不知則清明則無所不知孔子曰吾有知乎哉無知也文王不識不知順帝之則子貢以為多學而識之聖人以為非孔子又曰天下何思何慮學者茍有意焉夫子必曰毋有必焉必曰毋有固焉必曰毋有我焉必曰毋微有意象如雲氣之蔽太虚矣四方有敗安能先衆人而知之先知四方之敗者必其不識不知者也孔子曰不逆詐不億不信而亦先覺何也意慮不作而本清本明之性自無所不照也此非口舌之所能道也此非思為之所能到也人心自清人心自明人心自無思無為思未嘗思人自以為思為未嘗為人自以為為清也明也無思也無為也知也皆名也惑其名者失其實也四方有敗何由而知之也舜命龍作納言納四方之讒説殄行而知之也周官訓方氏誦四方之傳道而知之也小行人以諸國之禮俗政事治教逆順為一書而知之也然君心不清明則雖有所聞不知其將有敗也是故四方禍敗之幾雖日至於其前而不悟也大抵日用非憂樂則平而已矣舉樂則凡其所欲可通矣舉喪則凡哀憂惡懼之類可通矣平時所履則禮盡之矣故三無禮樂喪嗚呼孔子五至之論至矣子夏不復致疑遂問三無及是聞三無之論曰言則大矣美矣盛矣言盡於此而已乎是子夏猶未領吾聖人之旨也道無盡不盡故孔子又啓之曰君子之服之也又有五起焉服而事之習而熟之亦不可思亦不可為五起非有五者之不同也今方言談論一節謂之一起五起猶五節加焉而六可也損焉而四亦可也縱而言之無不可者無聲之樂氣志不違氣志即樂匪異匪違無體之禮威儀遲遲威儀遲遲不可度思無服之喪内恕孔悲其恕其悲孰得而知無聲之樂氣志既得得匪有得亦匪無得無體之禮威儀翼翼威儀翼翼熟視莫識無服之喪施及四國三者一旨三者一德無聲之樂氣志既從何異何同昭明渾融無體之禮上下和同此敬此恭何所不通無服之喪以畜萬邦有安無危有福無殃無聲之樂日聞四方人皆聞之而曰不知無體之禮日就月將不勉不强從容有常無服之喪純德孔明皜皜精白禮樂同情無聲之樂氣志既起斯起斯止變化不已無體之禮施及四海此道大通無遠弗届無服之喪施于孫子禮亦如此樂亦如此三王之德如此天地之德如此日月之明如此本無可疑何以復問為子夏復問是又未達也聞志氣塞天地之誨雖自謂不疑而終不無疑故又有三王參於天地之問嗚呼學者多自謂吾已解而其實猶未解心有解意而道非意孔子知子夏之蔽生於私故言無私夫人之蔽皆有我之為害於寂然無體之中而置己私焉則内外裂藩籬固始覺我與天地日月為異矣不立我焉洞然大公本廣本大無私無限凡意皆私無私則無所不通矣曰以勞天下者明無私足以安利天下也商之先王皆無所私帝皆不違至於成湯則德與齊湯降不遲繼繼無違得此為聖聖無不敬敬非人為純誠匪思是謂日躋格假音近格假同辭昭假匪棘上帝是祗帝則在斯故帝不違帝則至近意生則離人惟知申甫輔相穆宣不知乃文王武王之德配合天地故嶽降神而生申甫也天人一道正直是依文德遜讓四國悦隨三代同德匪異匪離實德自孚名不可為令聞之訓應病而施小人之譏西河之疑令聞之虧由實之非子夏曰承吾不知之入其第七孔子曰入其國其教可知也其為人也溫柔敦厚詩教也疏通知遠書教也廣博易良樂教也絜靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂其為人也溫柔敦厚而不愚則深於詩者也疏通知遠而不誣則深於書者也廣博易良而不奢則深於樂者也絜靜精微而不賊則深於易者也恭儉莊敬而不煩則深於禮者也屬辭比事而不亂則深於春秋者也天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也清明在躬氣志如神嗜欲將至有開必先天降時雨山川出雲是章家語載之問玉小戴所記篇曰經解而自天有四時以下乃載之孔子閒居攷孔子閒居大旨已通明無俟復加天有四時以下之言此入其國章至深於春秋者也未至昭明而遽已則未安家語繼載天有四時一章則六學之旨始昭明通達又上言六教繼言天有四時風雨霜露無非教足以明其道文旨相承為宜今從家語家語大凡於文句或改撰而大略則存此小戴所傳盖脱簡斷編之差小戴於文句凡百謹於改撰故今句文從小戴家語改嗜欲將至為有物將至與上下文理不相應小戴以經解名篇失孔子本旨聖人凡言皆以明道今以首文名篇亦猶論語名篇學而為政之類庶不至害道近世學者弗克靜觀遽謂易何止於絜靜精微春秋何止於屬辭比事遂疑非孔子之言而不詳考孔子首言曰入其國其教可知也特言國俗之所教習者然爾非謂六經之道如是也孔子之時未有六經之名自孔子没世益尊尚其道知孔子尊稱詩書推明禮樂贊易作春秋又書與禮出孔壁故後世共尊之曰六經此所謂春秋特國史之通稱而孟子曰晉之乘楚之檮杌魯之春秋一也然晉語云羊舌肹習於春秋楚語申叔時亦云春秋孔子所謂屬辭比事特謂國俗教習為史爾非謂孔子因魯史而筆削者也孔子繼言六學之失愚誣奢賊煩亂則前所言非孔子六經之道昭昭矣嗚呼溫柔敦厚本道心之所著見惟其自知者寡天地之間草木鳥獸無非天地之性惟不自知故為草木鳥獸今人而不自知亦何以異於彼易傳曰百姓日用而不知不知之謂愚然則何以為不愚不愚者非能有所加也能自知爾是知亦非有所思慮有所鉤索道心我所自有忽覺忽明如日月無所不照而非思也非為也又如鑑焉萬象畢見外内不殊而明光渾然澄然變化云為明智察微是謂無思之思無為之為觀往古事變之屢遷則疏通見上古以來之事則知遠然以今揆古以庸愚度聖賢必不能毎事盡得其實每見其多誣天下之道惟聖人知之大賢知之而未盡其次焉者固不得而知也而況於衆人乎古今學者不能皆大聖大賢夫不能皆大聖大賢則不能知道雖有古聖賢言行治化必不能知古聖賢之旨在東後學强以為西古聖賢之旨在南後學强以為北心通則千載可通不通則雖提耳而誨之莫諭故後學觀古聖賢之言行治化多失其實失實之謂誣自子夏之賢既受書於夫子既已油然有樂于中不知憂患與死而夫子猶謂未覩其裏而況於他人乎然則何以不誣不愚則不誣孔子曰成於樂子游聞諸孔子以樂為學道孟子曰樂則生矣故樂之教廣博易良廣博易良幾於道矣或失之奢則幾為小人無忌憚之中庸矣絜靜精微學道者大略則同而實得易之道何止千無一萬無一其溺於意説䧟於虚蕩者往往而是窺見廣大渾一無所不可之境潛起非僻欲肆之情遂至於小人無忌憚之中庸是為賊孔子七十而從心之所欲不踰矩道雖屢遷而實行典禮全體忠信何思何慮全體孝弟焉支焉離恭儉莊敬無非道者至於煩而不一貫則失禮之道矣經禮三百其致一也曲禮三千其致一也是非强合而一之也本一也是一也惟覺者自知其深思力索者不知即心即禮變化云為一猶不知而況於二況於十百千萬自然而不煩譬猶天之變化不可勝窮而天不知地之化生不可勝窮而地不知屬辭比事未為害道若教習止於屬辭比事而已矣則無乃徒溺於文辭事為之紛紛而不知道乎故得其所以不亂則為深於春秋事有似是而非似非而是是中有非非中有是曲折萬狀紛擾萬端茍非聖智必迷必亂褒貶必差不亂即不煩不煩即不愚不愚即不誣不誣即不奢不賊一也是故六經一經也六經一旨也孔子至是謂斯旨猶未昭白又曰天有四時春秋冬夏風雨霜露無非教也知此之為教則知六經一貫之道矣又曰地載神氣神氣風霆風霆流形庶物露生無非教也知此之為教則知六經一貫之道矣或曰孔子惟言其教不詳言其所以教吁已詳矣不可得而又詳矣加詳焉則非矣智者觀之以為其教甚明愚者觀之以為不可解不可解者即教也人以紛紛人欲擾擾思慮之心讀之誠不見其所謂教不知夫道非思慮之所可到可思則可言不可思則不可言故孔子曰黙而識之又曰吾有知乎哉無知也又曰天下何思何慮惟忽覺大通自知自信不可解説視聽言動不可度思終日思為實不微動顔子覺此故三月不違曾子覺此故曰皜皜乎不可尚已曾㸃窺之故欲風乎舞雩詠而歸孔子覺此故亟稱於水曰水哉水哉孟子猶未覺此而曰有本者如是是之取爾嗚呼使水哉之旨果在是則孔子何所嗇於天下後世而不言其曰水哉水哉已自昭白正猶曰春秋冬夏風雨霜露無非教也神氣風霆庶物露生無非教也即不愚不誣不奢不賊不煩不亂之教也即忠信即孝弟即日用百姓日用而不知者此教也是教也孔子謂之禮則曰本於大一分而為天地變而為四時謂之孝則曰夫孝天之經地之義謂之人則曰人者天地之德又曰人者天地之心謂之樂則曰無聲之樂日聞四方謂之哀樂相生則曰正明目而視之不可得而見也傾耳而聽之不可得而聞也謂之心則曰心之精神是謂聖此心誠實無他無作好無作惡無造為無囘曲何思何慮常清常明自靈自神隨世而言姑曰如神嗜欲將至有開必先天欲降雨山川先雲神心將用朕兆先形簡雖末學意有將動自未知其何意而有如雲方興之狀簡不欲興而遽已澄然如初不知此亦有開必先乎亦妙矣無思無為變化神用不可度思矧可射思風霆在斯覺者自知雖知匪思哀公問取人第八哀公問於孔子曰請問取人之法孔子對曰事任於官無取捷捷無取鉗鉗無取啍啍捷捷貪也輕捷貪逐鉗鉗亂也健於鉗制用之生亂啍啍誕也多言寡信故弓調而後求勁焉馬服而後求良焉士必慤而後求智能者不慤而多能譬之豺狼不可邇哀公問於孔子曰寡人欲吾國小而能守大則無攻其道如何孔子對曰使君朝廷有禮上下和親天下百姓皆君之民將誰攻之茍違此道民畔如歸皆君之讎也將與誰守公曰善哉於是廢山澤之禁弛關市之税以惠百姓哀公問於孔子曰吾聞君子不博有之乎孔子曰有之公曰何為對曰為其有二乘公曰有二乘則何為不博孔子曰為其兼行惡道也哀公戄然有間復問曰若是乎君子之惡惡道至甚也孔子曰君子之惡惡道不甚則好善道亦不甚好善道不甚則百姓之親上亦不甚詩云未見君子憂心惙惙亦既見止亦既覯止我心則説詩之好善道甚也如此公曰善哉君子成人之善不成人之惡微吾子言焉吾弗之聞也哀公問於孔子曰夫國家之存亡禍福信有天命非唯人也孔子對曰存亡禍福皆已而已矣天災地妖不能加也公曰善吾子之言豈有其事乎孔子曰昔者殷王帝辛之世帝紂有雀生大鳥於城隅焉占之曰凡以小生大則國家必王而名必昌於是帝辛介雀之德介助也不脩國政亢暴無極朝臣莫救外冦乃至殷國以亡此以己逆天時詭福反為禍者也又其先世殷王太戊之時道缺法圮以致天櫱桑榖生于朝七日大拱占之者曰桑榖野木而生朝意者國亡乎太戊恐側身脩行思先王之政明養民之道三年而遠方慕義重譯至者十有六國此以己逆天時得禍為福者也故天災地妖所以儆人主也寐夢徵怪所以儆人臣也災妖不勝善政寐夢不勝善行能知此者至治之極也唯明王達此公曰寡人不鄙固此亦不得聞君子之教也哀公問於孔子曰知者壽乎仁者壽乎孔子對曰然人有三死而非其命也行己自取也寢處不時飲食不節逸勞過度者疾共殺之下位而上干其君嗜欲無厭而求不止者刑共殺之以少犯衆以弱侮強忿怒不類動不量力兵共殺之此三者死非命也人自取之若夫知士仁人將身有節動靜以義喜怒以時無害其性雖得壽焉不亦宜乎哀公問政第九哀公問政於孔子孔子對曰文武之政布在方策方板策竹其人存則其政舉有行其政之人人者君臣之通稱其人亡則其政息人道敏政得其道而後可以為人地道敏樹夫政也者蒲盧也待化以成鄭云蒲盧蜾蠃謂土蜂也詩曰螟蛉有子蜾蠃負之螟蛉桑蟲也蒲盧取桑蟲之子以為己子乆而化成故為政在人取人以身在人通言因專言取人之道以身取之身非其身必不能知在彼之人而用之脩身以道脩道以仁非有道又有仁也謂脩身必有其道其道仁而已矣仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也禮者政之本也是故君子不可以不脩身思脩身不可以不事親思事親不可以不知人思知人不可以不知天仁者人而已矣初無遠外亦無奇巧百姓日用而自不知今欲知之乎即親親之心是已莫非仁也而親親為大莫非義也而尊賢為大親親尊賢等殺皆此心之變化其名不同其道則一脩身事親人道也人道即天道不知天必不知人孔子於是漸誘進哀公也天道不可言不可思覬公忽覺天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友也五者天下之達道也知仁勇三者天下之達德也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也孔子能言其一不能言其所以一非嗇之不以告公也不可得而言也可言則可思可為不可思不可為則不可言故易曰無思也無為也孔子曰天下何思何慮又曰吾有知乎哉無知也又曰毋意毋我曾子惟能言其皜皜無義無説老子雖未至於大通亦曰我獨怕兮其未兆夫未兆者意象未起也老子於是怕焉者臯陶所謂兢兢業業也禹所謂克艱所謂安女止者是也孔子所謂為之不厭此所謂行之者皆是也公曰子之言美矣至矣寡人實固不足以成之也孔子曰好學近乎智力行近乎仁知耻近乎勇知即所謂一者即所謂無思無為者知不可言所可言者好學爾好學不已則知之矣知之常不昏常明者謂之仁仁亦不可言所可言者力行爾孔子曰用力於仁此力行亦未易言有知而後可以言仁故孔子曰未知焉得仁力行即兢兢業業即安女止即為之不厭哀公未足以知此然力行有精粗亦足勉公之無怠夫進德至於仁至矣而又曰勇者非仁之外復有道也孔子曰仁者必有勇夫道一而已矣而必又曰勇者進德之初舊習未忘利害或得而移之及其乆也利害雖不得而動而死生之變或得而亂之於是名不動不變者又曰勇此三者皆非心外之物知者此心之明仁者此心之常明勇者此心之不動不亂故曰所以行之者一也此心即道故書曰道心心雖可言而不可思心雖能思而其能思者不可得而思思之始不可得而知思之中不可得而知思之終不可得而知故孔子謂哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也聖人之言通乎上下雖哀公初學亦可與聞三德至於為物所屈無勇又教之以知耻知耻則此心之勇自生其至也雖死生不得而亂嗚呼此道心聖愚之所同也知斯三者則知所以脩身知所以脩身則知所以治人知所以治人則能成天下國家矣公曰政其盡此而已乎孔子曰凡為天下國家有九經曰脩身也尊賢也親親也敬大臣也體羣臣也子庶民也家語子作重來百工也柔遠人也懷諸侯也脩身則道存百姓日用此道而不自知則雖有與亡同存者亡之反小戴記存作立尊賢則不惑得賢共謀則無疑惑親親則諸父兄弟不怨小戴記兄作昆敬大臣則不眩不眩猶不惑體羣臣則士之報禮重孟子曰君之視臣如手足則臣視君如腹心子庶民則百姓勸來百工則財用足柔遠人則四方歸之懷諸侯則天下畏之德懐諸侯諸侯心服則天下之遠未親德者亦觀勢而畏公曰為之奈何孔子曰齊明盛服非禮不動所以脩身也去讒遠色賤貨而貴德所以尊賢也好色與貨其親賢必不固爵其能重其祿同其好惡所以篤親親也小戴中庸篇爵其能作尊其位不如家語爵其能義正親族不必皆賢能擇其能者爵之斯可矣能亦賢能之通稱其餘則重其禄以養之而已同其好惡親親之意非同其邪也官盛任使所以敬大臣也盛其任使之屬不敢勤勞大臣所以尊敬大臣也忠信重禄所以勸士也德之大者為大臣其次賢者為羣臣不忠信者皆不可用故仕必忠信時使薄斂所以子百姓也日省月考既廪稱事所以來百工也鄭云既讀為餼餼廩稍食也槀人職曰乘其事考其弓弩以下上其食送往迎來嘉善而矜不能所以綏遠人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懐諸侯也治天下國家有九經所以行之者一也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮平居無事時不脩習則事變之忽至必敗在下位不獲乎上民不可得而治矣下位非所以言公也孔子不敢正指公而言之將以盡言恐傷公也故汎指下位而言使公默諭倘正指公則其後不信不順不誠不明之論將不敢發何以暢明其旨獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人之定體也誠之者擇善而固執之也夫誠天道又曰明乎善者非復有異道也誠者人心之所同而明者千無一萬無一易曰百姓日用而不知孔門之明善者顔子三月不違仁其餘日月至焉而已有子子夏子張子游子路子貢宰我皆不可以言明曽子明之故曰江漢以濯之秋陽以暴之皜皜乎不可尚已夫誠者誠實無他無竒無巧直心無二而已矣人皆有之而自不知其善知其善則明已通矣一矣大矣無思無為而變化不窮矣然而非於誠實之外有加焉也以明者寡故雖有誠而昏昏則亂故聖人又曰明乎善矣别之至矣哉至矣哉誠實無他之心無較計無思慮如四時之錯行如日月之代明雖動而未嘗動雖靜而未嘗靜是謂一定不移之妙體其從容中節如水鑑中之萬象水鑑未嘗動也故此曰定體易曰寂然不動此寂然不動之心體無内外無始終即人所同有誠實無他之心特聖人明之而無虧賢者明之而有虧衆人不明爾擇得此善斯能固執不明此善雖執不固固而純純而化則全明而無虧矣公曰子之教寡人備矣敢問行之所始孔子曰立愛自親始教民睦也立敬自長始教民順也教之慈睦而民貴有親教以敬而民貴用命民既孝於親又順以聽命措諸天下無所不可誠者公所自有孔子告以不思不勉慮公忽覺而無先證也公既未覺問行之所始故孔子於是又云愛敬即道愛親敬長已行其道而民從之矣曰民順聽命欲以切公之心知民之從違國之安危在此而不在他也曰措諸天下導公以莫大之業覬公喜而勉行也公曰寡人既得聞此言也懼不能果行而獲罪咎哀公問曰二三大夫皆勸寡人使隆敬於高年何也孔子對曰君之及此言將天下實賴之豈唯魯哉公曰何也其義可得聞乎孔子曰虞夏商周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也是故朝廷同爵則尚齒七十杖於朝君問則席八十不俟朝君問則就之而弟達乎朝廷矣行肩而不併不錯則隨鄭云錯鴈行也兄弟之黨鴈行父黨則隨行見老者則車徒辟班白不以其任行乎道路而弟達乎道路矣居鄉以齒而老窮不遺强不犯弱衆不暴寡而弟達乎州巷矣古之道五十不為甸徒言古之道則知今不然四井為邑四邑為丘四丘為甸甸六十四井也以為出役之法五十始衰不從力役之事頒禽隆諸長者而弟達乎獀狩矣軍旅什伍同爵則尚齒而弟達乎軍旅矣孝弟發諸朝廷行乎道路至乎州巷放乎獀狩脩乎軍旅衆以義死之而弗敢犯也公曰善哉寡人雖聞之弗能成嗚呼孔子言之如此明白如此平易如此切於治亂安危而公曰弗能成孟子曰不仁者可與言哉安其危而利其災樂其所以亡者不仁而可與言則何亡國敗家之有哀公之時國雖甚危三家雖强而猶未盡廢事君之禮人性皆善公能行道則感化之妙黙然轉移可以易危而安易亂而治而公不悟也昭公之出季孫懼焉叔孫死焉孰謂其不可感化先聖大訓卷一
