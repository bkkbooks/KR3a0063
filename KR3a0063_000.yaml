body:
  text: 先聖大訓儒家類提要臣等謹案先聖大訓六卷宋楊簡撰簡有慈湖易傳已著録是編搜輯孔子遺言排比成五十五篇而各為之注錢時作簡行狀曰其歸自胄監也家食者十四載築室德潤湖上更名慈湖始取先聖大訓間見諸雜説中者刋訛别誣萃六卷而為之解即此書也簡之學出陸九淵其嘉泰二年陛辭劄子稱臣願陛下即此虛明不起意之心以行勿損勿益自然無所不照嘉定三年面對稱舜曰道心明心即道孔子曰心之精神為聖案此據孔叢子之文其實尚書大傳先有此言不云孔子偽撰孔叢子者剽剟其文駕言先聖耳謹附訂于此孟子曰仁人心也此心虛明無體廣大無際日用云為無非變化無思無為而萬物畢照其立言宗旨已開新會餘姚之派故注是書往往借以抒發心學未免有所牽附然秦漢以來百家詭激之談緯侯怪誕之説無一不依託先聖為重龎雜蕪穢害道滋深學者愛博嗜竒不能一一決擇也簡此書削除偽妄而取其精純刋落瑣屑而存其正大其間字句異同文義舛互者亦皆參訂斟酌歸于一是較之薛據集語頗為典核求洙泗之遺文者固當以是為驪淵矣乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀先聖大訓原序世稱先聖謂孔子簡祗惟先聖大訓自論語孝經易春秋而外散落隱伏雖間見于雜説之中而不尊不特有訛有誣道心大同昏明斯異毫釐有間雖面覿無覩明告莫諭是無惑乎聖言則一而記者不同也又無惑乎承舛聽謬遂至于大乖也夜光之珠久混沙礫日月之明出沒雲氣不知固無責有知焉而不致其力非義也是用參證羣記聚而為一書刋誣闕疑發幽出隱庶乎不至滋人心之惑非敢以是為確也敬俟哲人審訂胥正明州楊簡序
